body:
  text: 楊忠介集附録卷二序遺稿序曾如春號守軒臨川人官禮部郎中如春不佞通仕籍即時時從諸縉紳後聞世廟時斛山楊公云楊公關中富平人也抱志慷昻雅不急仕進而嘗慕汲黯朱雲之為人起家御史便明目張膽上封事觸忌兩下獄幾十年公以言報國獲罪甘之每歌咏歷歷天王聖明操焉時獄禁嚴中公者頻緝公語上之公覺連乎閟恍乎忘與乎常公久困日視赭衣貫三木者慘不出聲無異蚊呻然方晡栅夫守幽關寂燈火邏柝駭聽公恬弗介意朝夕讀易曰易基宓犧氏重之則此中聖人朝聞道何憾夕死哉公玩易愈精動履愈無咎當時一二臣疏援公杖斃公哭之自分圜內首丘怵然為戒者久之人以此多公鎮定學久之諸滑黠窺公者亦垂涕咸呼忠臣夫世廟英睿邁古從諌如流顧急於性公論事懇篤言言經國讀者飛動顧格於行則奚暇誦也公摘時政斥諸大貴人雖寄公錦衣乎全公闕已而方士斥土木罷諂諛誅升遐一詔荒陬忭闕公前所上封事謂公為大遇主非耶公詩文集若干卷大都紀處獄者十之六七侍御陳公一日手茲集示曰此忠臣之所以事其君者余讀之未嘗不流涕盍序而梓之以風世教春受命唯唯竊謂士君子立身大塊間當為其在我不計在人潜也勒一家言藏名山見也依日月末光即蒿目憂時斥奸蠧勷理道危言讜論伸忠臣烈士之氣時能盩我哉不則侈於述作淟涊脂韋覆瓿之誚謂何爾往者賈洛陽陳治安策幾數萬言長沙一謫竟恚憤死司馬子長號良史才漢武皇宫之輒醜詆漢武皇夫文談西漢西漢談二子二子為不遇故爾以方斛山公亡異蜩鷽鳩起而飛搶榆枋覩大鵬盡垂首戢翼控於地已矣亡論二子即汲黯朱雲足多哉且也陳公執直節為名御史於止輦受言之時獨昧乎斛山公一闕山公不朽藉之乎秉彛感人烈於雷霆後讀茲集者孰不駭魄動思旦暮遇之不旦暮遇之非夫也春以陳公刋斛山集揚懿夫昭風夫合刻薛文清楊忠介二先生文集序董光宏號闕人古鄞昔人稱文章大業至列之為三不朽謂其維世風砥士習也而世恆岐求之卑者窮工極變殫才力于雕繪之間以為是固吾道然耳乃其黠者又强推而匿諸理借聖賢之頥頦以文其回矞僞辨之辭試覆而印其人莫肖也嗟嗟文以人傳人以文重凡厥有生靈心靡晦余觀古端人烈士片言隻牘百世而後即走牧下𨽻猶能悚然而式之其文無行者一時非不傾艷也試掩卷而思其人幾欲唾去噫是可以徵人心已我明文清薛公倡學河津凛凛篤行嘗以事左權璫繫獄中怡然讀易不輟所為讀書録二十卷平易簡切皆自體驗中來而關中斛山楊公當世廟時上封事忤旨詔獄前後七年日有九死從幽憂線息中深悟易理所集得之犴狴者强半其言通而詳巽而正懇惻而不誹讀之知為義烈忠厚君子夫權璫挾至尊寵靈所叱咤令天地變容舉世氣奪而文清獨守正不搖當肅皇帝震霆時鑕前鑊後七尺如寄人情固已萬念蹈冥而斛山從容爻象玩理㑹心發為詞章不忘忠愛此非養深而識定脫然于生死之際者其能然乎二公之文河津則如景星慶雲世所快覯富平則嚴霜凛雪太華巋然又若昆崘下注之𣲖百折而愈東總之鍾扶輿之正氣襲箕斗之精英天所篤生以為邦直國紀者也二公舊各有專集嵗久漫漶某君按晉乃合二集而梓之余謂二公生異時産異地乃其器識德行略同其蒙難同其處困而亨又同特文清後受知裕陵駸駸柄用而斛山卒不振以死顯晦稍殊然至今讀兩公之文皆凛然若有生氣神馳志悚願為執鞭而不可得此又非可以顯晦論也噫嘻文清力追太上不言躬行此豈有意于文者斛山忠憤篤摯不得已而抒所耿耿寧忍自附于著作乃秦晉數千里間文章名位後先蔚起者何限而某君惟二公之集是梓又復合而梓之讀是集者其亦可以思矣其亦可以思矣遺稿後序孫化龍號闕州恆山人官廬府同知斛山遺稿刻成寅長曾公以示化龍化龍拜讀再四為之竦然竊深有所感焉夫世廟英明逈出前代矧當勵精圖治之時庶績咸熙賢哲登用寧復有所缺失可言楊公奮然抗疏諤諤數千言犯顔極諌不少避諱憂治世而危明主即古之汲黯朱雲何多讓焉公既下獄前後數載身困縲絏之中日窘辱于吏卒艱苦萬狀與死為鄰人多不堪其憂公獨坦然自得慷慨從容賦詩為文略無芥蒂非所養之素定何以至此故讀公之遺集可以觀事君之忠焉可以觀處困之貞焉若公者真可謂烈丈夫矣夫人之立言凡以關于綱常政治及發揮性靈道體斯為可傳否則雖爭竒競巧不過雕蟲末技耳今觀公所上疏指陳時政明達剴切悉關體要可為君人龜鑑其詩文數十首逢時觸景直寫性真或潜思力探發明道體而補衮之忠誠尤藹然溢于言外其視浮華無當聲律為竒者殆不可同年而語矣是集先刻于關中侍御陳公督賦江北首以是命刋之廬陽俾忠義文章傳播廣逺且使天下後世為人臣者聞風而興起其有功于風教豈淺鮮哉嗟夫秉彛好德人之良心讀是集者可以深長思矣外集序趙桐號嶧山古綘人富平知縣或謂嶧山子曰汝富平令耶汝邑有楊斛山者名則聞之果何人也對曰斛山先生忠義人也先生之忠義天下人孰不知匪直天下知之我聖天子亦深知之但以其諌言時事過于切直故特困之如漢文之于賈生所以挫其英鋭之氣而為之動心忍性將欲大任於後日也既而先生所言事事皆驗而我聖主擢任之意益深切矣不幸天嗇其年早殁于家不惟天下悲之聖主亦悼惜之也然先生雖殁而其忠義之氣見于辭章猶有存者故集而録之以示人人俾觀者接于目感于心而忠憤義烈之氣勃然以生矣噫是氣也浩然之氣也乾坤之正氣也乾坤之正氣多則國家之元氣盛斯豈小補也哉孟軻氏謂古人有聞風而亷頑立懦者豫於先生亦云外集後序魏學曽號確菴闕通人歷官通政司政斛山先生忠節聞天下然未以詩也今讀其詩復工可聞也而顧不聞斯非掇其巨而遺夫小爭傳夫赫赫者而瑣細焉略耶且詩何為者神動斯言言斯永而以音以律詩焉生矣是思形而聲一真機也故觀人莫如詩陶淵明隱逸人也百世下不識其人者讀詩而知隱逸以機真也先生是集獨非獄者耶乃其言誼而不利道而不功貞勵而不怨是故其思也激諸動而機其真矣詎不足以見忠節云夫毛詩詩也而類為經以其思正也先生固有周易辨録中庸講說與他正言格論人業爭傳之矣然則是集當與之類傳無疑也嗚呼將與類傳斯固不以詩聞與集有律有歌行諸體卷一名曰外集蓋以别簡帙耳非內外之也先生殁數年矣集無刻者嘉靖甲寅刻諸嶧山趙子題斛山楊先生集後聶世潤號闕平劍南人富知縣潤自髫年聞長老人道語至先生即知景慕先生比萬厯癸卯丙戌間上試春官兩因梓潼何冏簿知有先生上林孫與之語得詳其行事遂從其請而誨其子正茂居無幾出令紫陽調富平躬禮祠下求遺稿見有周先生都峯楊先生椒山植節一時者其文略有存焉欲申校以傳未遑也時則有若鹽臺吳公巡歷蒲城潤以公謁蒙訊及先生祠宇書籍語在前序中因諭以斛山稿若輩几席間不可少隨檄下云斛山公正氣鍾乾坤之秀貞風萃河嶽之英昭代直臣熙朝名諌其建坊祠前云潤以祠在治為靜地請建坊通衢以永此不朽諭曰可乃建于今之南關拾遺稿合周楊諸先生鴻製竝得恩詔墓表等篇彚為全帙分為五卷别卷周易辨録板在藩司以日久刷多脫去者九求家籍得先生手稿續刻齎補于後題云表揚節義以勵一方風俗以培國家元氣此則觀風者之責亦縣令循良之政其速之於乎敦崇先哲振起後學如公者何切至哉此刋出識者豈惟見有楊先生而因以見維時之有周楊諸先生諸先生之忠節不泯因可以脉脉動天下後世之儋諸先生爵者公之風教逺哉是役也校字則李縣丞從蘭陳教諭王道孫訓導善養督工則楊主簿遇春石典史中元例得竝識云讀楊斛山先生文集說吳楷號闕御曹國人官史自昔志士仁人蒙難砥節吐辭舒憤伸剛大於摧挫之中發英華於沉頓之餘往往與日星爭輝風霆比烈越數百載而感人動物不衰也今夫三尺童子聞龍逢比干之名無不蹶然起立改容屈平之騷武侯之表讀之者輒呻吟咨嗟欷歔若絶流涕而不能自止若是者何也彼其忠義誠足慕尚故接其言而惻愴乎人之心亷頑立懦風後世而不窮也其禆于世亦不小矣明興以來直節敢言之士未易具論論其炳炳者世廟時稱二楊焉斛山椒山竝以言獲重遣下詔獄椒山分死而死斛山分死而竟得不死死不死勿論而其徑節英聲凛凛乎百世猶生則一而已不佞僅能典謁時即聞先輩談二先生之名已慨然有懷想見其槩迄今而常若形諸寤寐也者頃以愚昧徼主上恩拔置西臺今奉命視鹺河東斛山故關中人富平其里也竊有意乎履先生之墟原而吊之既得先生文集于其孫頻原公恆處盥手展讀不覺喟然而嘆曰吁向我未讀先生書意先生骯髒骨鯁古牽裾折檻之流耳乃今而知先生其所養有大過人者夫犯雷霆抗萬鈞先生能之人亦或能之顧得於感激者易渝發自意氣者易摧始未嘗不硉兀而卒苶然也先生處囹圄者十年一日而不忘愛君鈇鉞刀鋸當前而不為動震撼危疑九死而卒不少悔此豈悻悻自負矯焉以近名者之所可幾及哉方是時先生之所憂者在國社之安危而不在一家之榮瘁所懼者在主德之隆汚而不在一身之生死如曰平生不灑身家淚兩眼今為天下澘又曰年來警戒非因禍恐致君王殺諌臣斯可以見先生之心矣夫自登山之歌過湘之賦猶自不免于近傷先生處君父之間獨綢繆係戀婉雅和平困羸已極而用情愈厚曾無幾微忿懟之形于詞氣即所稱國風之好色小雅之怨誹固不足為先生喻也語曰造次必於是顚沛必於是先生不其近之哉嗚呼士君子處世得志則立功不得則立言功以輔世也言以覺來也假先生而得君以展布則明且有伊吕假先生而得年以著述則明且有濓洛奈之何其卒不然也夫書序傳記不足盡先生之文然而其道處困者詳也讀之者識堅志熟仁之定力風律歌行不足盡先生之詩然而其屬悟主者多也使讀之者見仁人孝子之用心易辨中解不足盡先生之學然無一而不切于躬行也使讀之者知性命問學不離夫人倫日用之實則先生兹集豈其小補于世也者哉先是吳君安節代按山西梓先生集行于世真先得我心矣遂為之說以授頻原公庶有所託以不朽云記忠諫流芳坊記吳達可號闕西荆溪人官山御史萬厯戊子夏余奉命按鹺晉東循例巡歷西安府屬富平聶令以公事謁豫於蒲城余首詢以邑之先達楊斛山先生大節皎皎有坊額表揚否令對以穆廟初年以恤典故立坊今漸圮請新之余復訊之有祠祀否令對以建祠春秋具祭遂命之祠前另建一坊題其額曰忠諫流芳云再逾月令具言先生祠宇僻閴往來旌斾所罕經請於本縣南關孔道處竪坊以聳瞻視余然之隨合匠鳩工標以肆石飾以丹雘堅固文彩焕然新矣聶令因請記於余余竊惟先生名滿宇宙芳垂百世兒童孺子咸知其為一代直臣何藉於余之表揚哉又何藉於招揭通衢而後顯先生之譽哉蓋有說矣夫人心忠義原自天賦不假修為晚近世心隨習轉性以俗移獨養元氣而不纍習俗者千百人而僅見者也其次中人之質每以有所勸而興以無所激而阻下愚則勸激之而不能矣上智下愚世不常有天下惟中人為最多故揚忠義以勵末俗夫亦司世教者之責與此余與聶令建坊意也乃先生之心豈以是為輕重哉昔唐虞盛時君臣之間有都俞吁咈而無忠諫維時上下志同精神孚契士生斯世顧不幸與此先生志大道之公心也自都俞吁咈之風邈而始有忠諫之名已非先生之本心矣忠諌不行而至於禁錮禁錮不已而至於械繫痛楚百端流離萬狀即身後有忠諌之芳聲而當時或見以為彰君之過先生之靈不猶有悵悵哉是忠諌流芳固後人所以名先生者而非先生之自有也以是質於先生先生其以余言為然耶否耶遂勒石而為之記祠堂記雒遵號闕卿涇陽人歷官尚寶司吏科都給事中楊公諱爵號斛山關西富平人起家進士行人授河南道監察御史世廟時好直言極諫瀕危數四不少挫抑時則有若太僕楊射洪最車駕楊容城繼盛皆以直聲動天下人號嘉靖間三楊云隆慶改元録恤往忠射洪贈右都御史諡忠節容城贈太常寺卿諡忠愍各祀於鄉公贈光祿少卿崇祀無宇巡撫董公世彥巡按劉公光國檄縣相基鳩工創祀為堂者三楹左右廊各三楹衛以峻垣重門喚張徭編門役日供掃除焚修香火有司春秋饗祀布在功令公廕孫詹事主簿恆問記於遵蓋記祀堂肇修嵗時云祀堂告成事萬厯六年某月也往遵總角時知慕公名髙計走謁門墻覩其耒采至今有遐想焉公忠讜封草備録石室直節正氣服在當時信於後世談者不偉其難即髙其標豈知公見道分明學識其大危言若夷亢志若抑分義在我自盡而已曾少謂竒且難邪初公從遊苑洛韓先生邦竒與容城為同門友師友淵源夙契道真且富平習重氣槩吏部尚書張鷃菴紞以仗節祀公以獻忠祀天植其性益多於習人文世傑不愈靈其地耶嗚呼覩羹墻於廟貌思景行于髙山其足風世也與西安郡守羅公惟垣雅崇先烈捐俸伐石勒碑祭田記蔡靉字闕公寧晉人官御史同年也夫宇宙間孰為貴且榮惟忠臣孝子是為天地之正氣躬行之君子也若夫大孝終身孤忠自許垂百代之清風立臣子之凖極者其惟我斛山先生乎先生家世關西之富平豫進士同榜兄也初受學于苑洛韓先生靉亦先生門下士實有同道之雅嘉靖己丑同登進士同銓授行人後三載同選授監察御史任一載餘斛山謂豫曰老母不任驅馳家在三千里外不能迎養吾當告歸以盡烏鳥之情豫止之曰御史三載例有敕贈之榮寧不少待斛山曰蔬水之歡天性之愛古人不以三公位易一日之養吾志决矣幸成吾速歸計豫為白之宰執部院諸公無不稱重别後以養病違限例不起用豫亦以言事忤旨黜為編氓兩不相聞者七閲寒暑己亥秋以兩京言官之薦豫與斛山及浦竹塘三人同召用豫丁母憂二公先入京竹塘以盡言廷杖而卒斛山亦以罪下獄得與斛山相見時劉晴川正郎亦盡言與斛山同繫劉舊鈞州守豫曾疏其賢又相知故人也在獄同處者二旬餘豫被謫黜獄二公各有詩相送豫亦有詩言别豫歸後復被黜再為編氓斛山蒙恩赦得釋與劉晴川周都峯欲至文登不果復被逮械送入京仍下獄又四載首尾八年復蒙恩赦得歸家居數載而卒癸亥春斛山長子偲以應貢赴京便道來訪詢其家事及歷履曰家君復被逮械送時九月終尚未成衣一門生解衣衣之豫隨之過趙州石橋東指曰此去寧晉四十里昔與汝蔡年叔獄中别時約云過趙州相㑹渠豈知今日豫過此橋家君自居官抵今三十餘載逺近饋遺一無所受以此家無纖積豫兄弟止仰給儒學月廪豫曰斛山兄介正清操朝野知之李石叠曽為豫言廬墓時客至無茶饋豆以代茶湯尚却之况他人乎噫昔道義相期出處略同斛山已矣豫猶碌碌苟全恨衰年不能逺出持生芻一哭墓下今日無以為情聊以務農所積相贈為斛山兄置祭田一區以供時祭刻石墓下以表平生道義之情嗚呼先生天性孝友真誠直諒二親之沒六載廬於墓側哀毁骨立鄉間率化忠信恩義兼程越境徒步從師講明理學敝裘蔬食怡然自得致行峻潔動以聖賢為法躬行實踐苑洛先生重之别時為筮暌大畜二卦知將來之必至此及授使職䝉特旨勘肅藩事酌量中正克當上心奉使藩封却金明義髙風灑然晉秩西臺論事建白同列推仰元老九卿無不稱重及五事一疏忠誠剴切鳴朝陽之鳳鳥屹底柱于中流矣君子評曰學有師承潜心理窟真知實踐不貴言論方之橫渠張子藍田吕氏造道則一而力行為多方之晉陽有道關西伯起行義則均而忠貞愈勵是乃百代殊絶之人物明時全德之君子名竝華嶽氣作列星其炳烺于窮蒼乎豫二次放逐林居者已三十年仕途故舊絶少所托置祭田者長安順泉張先生先生道義大君子也以名進士釋褐為真定理官其待鄉士夫不以顯晦有異每公出必便道相訪故豫懇托之以有成焉謹記神道碑記練國事號闕西永城人陜巡撫嘉靖間有兩楊先生皆以忠諫名聞四海一則楊椒山先生一則今富平楊斛山先生也余束髮讀大政紀即嚮慕兩先生為一代龍逢及以公車之役過容城見道左有明忠臣楊椒山之墓一碑肅然改容下馬徘徊垂吊者久之今豫秉鉞秦中以征討之役數往來斛山先生故里而不凄然感懷者又豈人情乎及問先生村落距城兩舍有奇茅屋數椽薄田不足糊口其後人敝敝子襟中不辨其為名裔也此皆清白常調無足異至神道一碑亦缺然道左斯文未喪山斗沉淪荆棘迷向黃鳥含悲觀風仰止者與有責焉干戈既定禮樂將興砥柱頺瀾裂皆慕義當在後之學者徘徊垂吊人有同心余忝大吏倫教在握何惜此寒山一片石乎先生精靈不散嘗騎箕雲霧中其鍳觀此碑神泊故里以啓佑夫來人勿謂椒山而外皆巾幗女流也文獻足徴將三秦豪傑世受其賜先生生平别有傳記不具述特述其建碑之意若此不知可作九原知己否鄉賢呈附富平縣儒學生員許元吉等呈為崇祀鄉賢以勵風化事切照本縣党林里御史楊爵生有純質夙好問學兼程越境徒步從師致行峻潔動以聖賢為法不以富貴歆意其居喪也廬墓三年未嘗見齒其守身也蔬水終身甘若和羹事兄有若嚴父撫姪愈於所生非其道也一介不以取諸人如其道也九死無悔於己其為御史也不欺而犯有堯舜其君之心其下詔獄也重刑是甘無怨尤其上之意至若八年幽囚嗜學宛如黃霸一時妙契疾書無異橫渠卒之感天動地半夜赦出於龍樓誓死還生四海咸稱其鳳羽乃於朝桎暮梏之際能有剗經注傳之文今遺稿有獄中雜著中庸講說周易辨録藏於家笥真古之鐡漢今之玉人生為後學所宗殁當祀於膠庠者也巡按河東御史尚檄云看得該縣御史楊爵古行古心得關中之正脉有學有守真當代之名臣丰采挺著於臺端魚頭鐡面聞望素服於月旦慶雲景星事業膾炙人口氣節等配泰礪本院不得坐明道之春風頓消塵障又不獲式干木之髙廬少酬荆識然神㑹密於形交願書劉敞之碑素衷愈於貌敬敢掛延陵之劍為此牌仰富平縣著落當該官吏云云蓋公完名全節與日月爭光奚待本院區區之表揚也但懿德之好人心攸同桑梓具瞻豈云物故所有未盡該縣加意繳楊忠介集附録卷二

body:
  text: 楊忠介集别集類五明提要臣等謹案楊忠介集十三巻明楊爵撰爵有周易辨録已著録是編第一巻為奏議二巻為序碑記三巻為傳四巻為書五巻為家書六巻為語録七巻為祭文誌銘雜著八巻至十三巻為詩附録五巻則後人所編緝也世宗時齋醮方興士大夫率以青詞取媚而爵獨據理直諫如所陳時雪之不可以為瑞左道之不可以惑衆詞極剴切下獄以後猶疏諫以冀一悟其忠愛悱惻至今如見家書二十五則諄諄以忠孝朂其子孫未嘗一言及私語録不為髙論而篤實明白皆粹然儒者之言按爵與羅洪先錢徳洪諸人逰以講學相勗然徳洪等源出姚江務闡良知之説爵則以躬行實踐為先闗西道學之傳爵實開之跡其生平可謂不負所學者所作詩文大都直抒胸臆雖似傷平易然有本之言不由雕繪其可傳者正不在詞采間矣乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9da0c9fe4c46fcd5a52f0cd66d2a9032a1491875ecf128f7ffc93838215ab82f

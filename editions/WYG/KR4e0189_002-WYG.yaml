body:
  text: 楊忠介集巻二明楊爵撰序周易辨録序予乆䝉幽繫自以負罪深重憂患警惕之念即夙夜而恒存也困病中日讀周易以自排遣愚䝉管窺或有所得則隨筆之以備遺忘歳月既乆六十四卦之説畧具矣因名曰周易辨錄繫辭曰困德之辨也吾以騐吾心之所安力之所勝何如耳若以爲實有所見而求法於古人焉則吾死罪之餘萬萬所不敢也嘉靖二十四年八月日爵謹書獄中詩集序去年春予以罪下北司獄既而緒山錢子白樓趙子皆以負罪同繫於獄如楚囚之相對也二子者歎舊業之易荒不以䝉難為意時時讀易余以圜牆之中而得賞竒析疑之樂因與二子取六經三史諸子百家數相論難情興感觸發爲詩歌古風近體各有所得歳月旣乆總成一帙録藏巾笥意不在詩與文而在無忘今日患難相與之心也故吾三人毎相聚語未嘗不嘆相遇之竒而幸其相處之益也古者大聖賢之心學淵源相與神交黙㑹故有誕先登岸不假於困窮鬱抑而後成然以動心忍性熟其所存精其所履而優入於神化之境者自上智而下恒多有之吾觀錢趙二子景希先哲探討幽秘亹亹不厭他日行所學以福斯世而成可乆可大之事業其與涵飬家塾而措諸廊廟者何異耶顧予庸踈多罪劣於振㧞幸得竊其影響補愆省咎而僅比於折肱知醫之萬一焉夫以多㐫多懼之區而爲進修之地者亦在乎心之存不存何如耳時嘉靖壬寅秋七月旣望爵書於獄中雪夜吟集序余與錢子洪甫同獄中得其心漁翁所著有雪夜吟集而相與序述發揚顯心漁翁之心與行而可與傳後者多海内之名士余讀之不能不有所感於心也天賦人以聰明才知豈可飽食終日無所用其心哉心漁翁發之扵詩其過人者亦多矣詩歌琴曲之類且不過以此一種之樂趣以飬其悠然自得之性情而忠孝大節乃其平生之懐抱今詩歌中徃徃見之而循自然之理以任乾坤之句幾於樂天知命者矣夫有大抑鬱必有大亨通固理數然也吾觀心漁翁之子孫濟濟多英才而長子洪甫進士方任刑部員外郎以學行知名於世天其有以慰心漁翁之心乎蒲城縣志序予讀王制有曰凢居民材必因天地寒煖燥濕廣谷大川異制民生其間者異俗器械異制衣服異宜修其教不易其俗齊其政不異其宜知天下郡邑之有志其作葢繇於此乎蒲城縣志凢十篇縣尹姜子敎諭徐子所創編也歴春秋戰國迄於國朝凢二千餘年一方故迹亦畧可見矣志既成徐子手持以示予且請序諸首夫志之爲言識也葢郡縣有沿革物産有饒乏人事有得失識之以備考稽均貢食昭鍳戒述徃事以告後之人焉所謂修敎齊政之事所繇得也是志所載天文地理人事皆有焉予取其人之有關於世敎者言之涖官如張戬孝子如趙玉烈婦如姜溢妻其休聲懿聞百世之後聞之者可以興起此志之所以不容已也夫人之趨向能正斯所覧而可爲廸已之地苟心存不善雖嘉言羙行日聞於耳弗能入也君子而能大其觀則修己治人之道亦可于斯志而有得焉斯固志者之意也姜子名某字某徐子名某字某二子西蜀人也守官而能以文獻爲心如此亦異於世俗之見矣贈汪兵備兩尊人夀序公諱尚寜先為程家立嗣後復姓嘉靖乙丑年封君之子廷徳與爵同舉進士官行人司行人交與日深廷德不以爵不肖取爲同年友壬辰年爵以御史謝病歸廷徳以年不與科道舉歴部郎補兗州府知府庚子歳爵復承乏前職廷徳入覲京師復㑹於燕山客舎中叩其所造淵乎未可窺也次年辛丑春爵以罪下獄踰五年爲乙巳秋蒙恩宥爲編民廷德以吾陜兵備守潼關遇於塗次未幾爵復以罪逮北行事出不測逺近震駭廷徳送傳舎握手以别丁未冬爵復蒙恩歸田里時廷徳移守慶陽致書林下謂其父母年髙凢吾同好者當有言以夀之夫子之善父母之善也廷德明識器宇自其弱冠時已若素定然歴官所至仁澤義聲聞於海内爵實與陜民同在漸被中孰非封君暨太夫人徳善所及乎爵願祝封君太夫人曰公有賢子行道濟時惟天眷徳自古若兹公之夫婦耄期稱道公之夫婦夀考無期耄期稱道夀踰百齡子子孫孫承於無窮賀昝浮岩公八十序御史龍谿昝子學父浮岩公夀登八十親友以公賢徳享夀子孫克肖咸願徃賀予爲先之以言孔子曰仁者夀解之者曰静而有常故夀浮岩公常侍父病致憂三年心不少懈父歿値歳歉未克舉𦵏衰絰不去身者八年餘致哀於父致飬於母兄弟翕好同飲食者五十年此其心與行豈易及哉葢崇本篤内爲闇然以修之賢者也蚤事詩書亹亹不厭開諭後學多所成就即子學爲關輔名士可知矣周人之急不吝所有稱人之善忘其所短謀人之咨不踰於道有司知其賢俾以冕服與郷飲酒禮大抵虛中循理莊重凝静固所以致長年揆公素履其完復天則培固眞原而周旋矩度者率由此道今其耳目聰明動履強健則又夀躋未艾之徴也詩曰如月之恒如日之升如南山之夀不騫不崩如松栢之茂無不爾或承請以是爲浮岩公夀記處困記嘉靖二十年二月初四日余以河南道監察御史上封事有罪次日下錦衣衞鎮撫司十三日夜蒙笞十七日夜復蒙訊鞠血肉淋漓喘息奄奄而所以困苦之者則又日夜戒嚴未少疎焉斯時也余自謂死在旦暮且以得速死即爲幸矣既數月刑瘡之潰裂者雖少完復然殘傷毁敗之餘形狀欒欒動輙顚躓亦未敢以萬一獲生之意自望也忽一人謂余曰子之險難其將免矣有一賢者焉以救子爲事疏之上已數日矣予問爲誰其人不以姓名告但曰俟一二日當自知之已而戸部廣東司主事周公天佐下獄中余未始識周也時獄戒甚嚴又未獲一相面語惟聞衆驚愕囂囂語及疾趨徃來躑躅聲周笞之既重其困苦之者視余之惨則又甚焉余慮其弗能堪也呼一人即膝上手畫困卦二字使以潜慰之乃示以困亨貞大人吉无咎之義也聞周首之且微有笑容次日余詢公之起居於同逮麻知州時公已逝矣麻不欲以驚悸告但紿之曰必無事今日飲食稍能進矣其卒爲五月初八日未時也數日騐出其屍天震雷屍既出雷已予哭之以詩有天上烈星墜人間艸木愁滿腔都是淚只向暗中流之句周以忠義英烈自振奮下獄未三日即死人情惨怛聚語洶洶皆爲余懼炎氣蟲蟲獄地蒸濕徂暑流火之際余所着者尚爲冬月之布袍重以嚴禁力弗能堪惟思古訓格言可益身心如孔顔問答之類者潜玩其精藴與其氣象以自寛自解覺有得焉忽不知桎梏在躬而忘其身世爲囹圄中之一羸憊囚徒也繫及冬初刑部員外郎錢子洪甫以事下獄錢子余同志舊友也相見甚歡數相語皆崇德切要工夫未嘗以困苦廢忠告葢恐爲有道者笑也居旬餘日錢子送御史臺擬罪余願有以爲别錢子曰静中收攝精神勿使遊放則心體湛一髙明廣太可馴致矣古人作聖之功其在此乎别未乆錢子復以前事來獄中時御史浦公鋐自廵按吾陜西處上疏救余械繫來京十二月二十四日下北司獄中别處一室衆皆洶懼莫敢窺伺惟錢子徃候之爲守浦者遮拒未獲與言除日晨旦浦公蒙笞移就予室同加嚴禁公既傷重弗能語惟聞有呻吟聲衆包之以衾共以手舉寘之余傍居移時始甦余呼以老兄謂之曰老兄固不自愛矣如時政何公毅然應之曰今日之舉吾廵按陜西之責之一事也於子誠無所與子勿復言既而告余以關中人材風俗之大畧及所著全陜政要集繋過華隂有題華山詩出境上别秦中父老詩皆能爲余誦之有以公事來者遇公甚厚公感其誠意口占七言律以謝之余從容謂公曰吾兩人者地分秦魯相去數千餘里絶跡仕進甘老林下同一志也徃年詔用廢官復御史職者惟吾兩人而已未幾皆以言獲罪今日同一㭱鎖者則又吾兩人焉事至於此豈偶然耶吾人處世榮樂則心存於榮樂患難則心存於患難於今日之憂困而安順之亦百年中所作之一事也時錢子亦以善處憂患爲吾兩人慰余既日夜在側執弟遜禮甚恭遇守者或失之麤厲公戒之曰内文明而外柔順處患難之道也忽一日公自覺寒熱交攻坐卧弗寧余知其刑毒將潰凶之徴也即夜破一磁盞刺其傷處血流弗止公自謂覺少寧息但神益昏潰飲食少進食即嘔出公既危甚守者見余情狀迫切慮自殺防之甚急是夜以銕索縛余臂聚而守之已而公不語矣余執其手哭之甚慟良乆公復少蘓問哭者誰也左右以余對公曰子無過慟吾死於此命也語畢卒時漏下三鼓爲正月初六日子時也余枕屍慟哭徹旦未已迄今語及未嘗不流涕也錢子以浦周二子之死也其死以浦周二子之事也謂余之痛似可以少已焉夫固然矣古之君子得志則道可行於天下不得志或亦有以善一方德厚者動而爲世道之益否則無徃而不損焉今日賢人君子之過雖非我所敢致亦由我而有之矣夫非積未誠而動未審歟吾豈怵中懷危蘓蘓焉而爲沱若者耶即憂困中省愆思咎之心誠未已也故述吾獲罪之顚末以自責而自勵焉時嘉靖二十二年三月十二日爵書於獄中續處困記予下獄蒙笞後司官絶余供食日給囚飯予以事非君命特過於奉承者一時不以生道處子故義不忍食時繫獄同屋居有張清者頗尚義氣予得資與共食焉既而錢洪甫下獄得自通飲食家人附供食物書予姓氏者不聽進乃約以再字别之凢書再某物者知其爲寄予物也踰年洪甫出工部員外郎劉子煥吾下獄亦如洪甫爲予處之又踰年吏科給事中周子順之下獄亦絶其飲食於是子與順之皆依與煥吾同飲食乙巳年八月十二日予三人俱䝉恩放歸田里取道於通州張家灣同舟南下至臨清州予由陸路西去九月十一日上宻諭東厰使復拘予三人是月二十八日使者至予家時予抵家甫十日即刻起程十月二十四日至東厰次日䝉旨下鎮撫司照舊監禁不許怠縱始予以罪下獄時戸部主事周公天佐及監察御史浦公鋐相繼救予皆以重笞死獄中旗士蘓宣以東厰使具予言動及囚繫狀積五日一上奏宣以厚予爲予遭譛下獄笞幾死子皆别有傳以載其事至足治厰事太監徐府以拘子事係宻傳拘至不宜題本笞八十降南京小火者於是人情悚懼皆慮禍及於己既下獄即絶予飲食凢予所具毡履以禦寒者悉奪寘庫中惟慮困苦予者或未極也獄中繫逮者百餘人見予皆逺避或偶以一言接者則縮頸斂足左右顧瞻如與境外異人相通而恐禍出不測也章生勺浙㑹稽人壬寅年以事逮獄與予同屋講周易司官以講讀事不宜外聞於人乃寘生於别屋戒不得與予見子出獄時過生門呼以相别至是生爲予具飲食使小校者以布裹沙鍋藏衣襟下朝暮供之獄卒多以患害恐生者生不爲動則應之曰以此得罪死不恨予宻諭生勿發危言當以貞艱晦黙相濟處初予繫過孟津縣謁夷齊祠度以罪當復縶非君命而禁予自供食者當餓死故題詩壁上有願借首陽方丈處藏吾天地一殘軀之句比入獄嘗盡日不食司官使告予俟劉周二子來處當如舊十一月初二日順之至厰葢順之得抵家拜其母次日即行煥吾未抵家七十里聞使者先至其家繫其弟以行即趨應使者順之至厰十一日同下錦衣衛南監即轉鎭撫司是日夜漏將一皷予困於㭱鎻見獄戸未闔守者燃燈若有所待予度必二子將至須臾聞歩過外有鉄鐐聲既又獄卒繫㭱木羣出力叫吼聲響聞數十步索鉄鍊以縳二子呼聲震動守者一人坐予傍訝之曰何爲其然捕得虎來耶忽一校者走門内告予以二子使間候予笑曰困縳中不忘致寒温意可以見二公胸次矣煥吾順之各居一屋皆在子屋後左旁南向厠門在予屋前右東向次日天明順之登厠而予屋戸板扇外有栅向内掩晝常鎖之予不得出乃隔栅與順之相勞苦予問順之至家得見其母夫人納福順之惻然悲傷始予不食囚飯嘗於暗室中誦孟子一簞食豆􅃵章以自涵畜至是順之亦不食謂予曰囚飯之食呼蹴之食之類也乞人尚不屑而我乃屑之乎予笑以爲然因謂順之曰寧以璧碎石上作羣玉屑安能甘此侮汚爲全瓦礫耶或以順之與予共約不食葢所見偶同實未嘗相約也煥吾曰朝廷既待我以不死吾豈忍以不食而死乎順之曰伯夷伊尹柳下惠不同道而同歸於仁今日之事各行所志可也司官聞予二人不食許以煥吾名通飲食既數日復使告謂冬乆旱上祈雪未應心甚急恐加怒於予三人而許通飲食則事屬怠縱懼以餘罪相累耳明日當復阻之予應之曰必吾三人者餓死天乃雨雪乎一校者繁髯方面從傍聞之怒罵曰此非人所言乃食艸者之云也順之顧謂予曰此言皆可紀也次日食果不進各鎻予三人於冷屋中戒無一人敢相見門外饁食徃來紛然予三人四壁寂静兀然獨坐勺水粒米日不及門章生餽食弗能逹生亦奮然不食間以乾餱使隔栅潜逓之百戸雷聰居近予偶得薄粥食予三人獄卒赫然罵叱之即欲以㭱鎻困苦聰聰再四謝罪始獲免時東厰月以六人日來覘視楊棟國用者孝子也其母病棟嘗割股見予三人展轉阻阨嘆曰豈可使懐忠義者困迫若此乃徃見司官謂主上仁聖於三人者欲其生不欲其死恐未可以非道相加而使饑以死也於是司官使許煥吾得自供米物頼君恩浩蕩終不加怒子三人得躬爨餬口相與痛省愆咎以答上玉成之至仁而延此憂患之歲月耳自予下獄身負重譴凢士大夫以罪繫獄拂上意者司官必以予例處之如兵部侍郎張漢都給事中尹相林廷􅪤張堯年御史何惟栢桂榮一時下獄者皆絶其食時煥吾在獄故諸人皆得托以自致而忘其爲剥膚災也及予三人復下獄始知凶禍切骨而日所履者皆窮絶之地至是則有致命遂志而已矣子所居屋前有左右二屋皆南向屋中不設㭱闕時闕給囚米者而絶之亦闕而下獄者必藉口於予闕豪傑觧體而時事不可救藥安知其不基於此乎是予以一時狂妄之罪而貽國家無窮之禍也煥吾順之嘗曰己身不足惜而懼以罪累朝廷耳故述此爲憂世之君子告焉嘉靖乙巳年季冬望日書碑記關帝廟碑記傳此文成而夢帝來謝云大王生値衰漢鼎祚將移扶眞抑僞存夏誅夷振威德於宇内昭令聲于千古本其所以至此者一念忠義所致也夫當危迫之際秉燭逹旦顚沛之餘知有不失是心也與古聖哲致嚴幽隱之死靡他夫何異焉是為記洪濟顯聖王廟碑記闕褒崇祀典闕今號國朝因之以官是土者春秋享祀報祈匪忒四方祠宇無慮數百皆載其泉水一卣以毎年孟夏八日注舊水于泉浥新者以歸遍歴村落犧牲禋賽謂之遊水然以卑微而凟尊神非義也祠之在降村者歳乆材木敝朽居人趙欽與僧海珠撤而新之費出家資無與郷人乃介徒丹寳以請記于予予以事不經舉辭不可繼聞趙欽者五世同炊家門禮讓乃嗟嘆者乆之畧其所昧而爲之述此蒲城姜侯去思碑上即位之十六年廣開言路益隆治化徴天下有司之有政聲者㑹京都將遴選俊彦以充臺諌之官而蒲城姜侯與焉蒲城耆民懷姜侯之德謀欲樹石以傳不朽乃趨而言于予曰自侯之涖我蒲城也幹辦勤敏聽斷明决撫字懇篤而我民頼以安且治此其大端也而他善之可述者尚有之今既去矣我民之思誠無已也獨不能爲我侯一言以顯其善乎予謂之曰來爾耆民吾語汝夫人之誠於脩善者固不待譽之而後顯抑豈毁之而能冺也果善也掩之而愈揚也遏之而愈光也果不善也石之樹也適足與後人嗤笑之具耳亦何益吾不識姜侯爲何如人然其操心飭行在公論敷理經營在蒲城四境之内而德澤在汝民與汝子孫之心擬其才善有所能或卽臺諫而推轂薦揚之在史部寵賚之典恩斯渥斯有加而無已在聖天子吾與汝民何有哉汝所謂幹辦勤敏之云云者乃有司之常事耳烏用書今誠無已宜書汝民不忘姜侯之意以告後之人後之人聞姜侯之善其職亦有感慕而興起者矣衆皆曰可予遂述相與言者記之俾歸而勒諸石題曰姜侯去思碑韓紫陽墓誌銘嘉靖己未冬予得免罪歸田里道聞紫陽有父䘮時紫陽方病執予手哭即䘮次相與偶坐爲予道痛苦至夜分始罷今年戊申春予遣子偲徃候焉時紫陽病已極矣乃强起寄予書曰某不自成立志餒氣弱言狂行肆義未立於鄉黨信未孚於朋友情未盡於兄弟恩不及於妻孥面折士夫之是非口規朋類之短長以此取訕於人受謗於已至於順祖孝親一念眞素敢自質之鬼神焉生平輕財重義嘗謂偶得任偶失適來從適去自謂可列於狂士之後焉今病在彌留枕上口道言無倫次願執事爲我採擇書之納諸壙兆以示後人誠不敢毫末渉於矜譽也病中又寄懷予五言詩一律子讀之深爲傷悼苐予患足疾阨於道逺不得再㑹紫陽相與一面焉今春三月初四日訃報紫陽已逝矣其子仲讓持狀問銘嗚呼痛哉人生於世與石火奔矢何異也達人知命固洞徹始終然死生之際豈易言哉嗚呼紫陽已矣予果即紫陽臨終之言爲誌其墓紫陽姓韓氏諱邦憲字闕明紫陽其别號也世居朝邑南陽洪爲元金牌萬戸之後髙祖諱恭曾祖諱整字子肅祖諱英字世傑好賔客喜施與脩宗族之恩廣鄉閭之義父諱續宗字裕慶母仇氏慷慨多義士闕文生紫陽兄弟三人紫陽其冡子也紫陽天性敏悟少即以英氣自負十二三學文章十五六通詩賦闕蓮峯先生大竒之謂其子苑洛曰此子乃吾家芝蘭玉樹汝軰難兄弟也每試輙居前列一時名士靡不推讓及累科不得志卽棄去舉子業以詩賦自娱樂胸次超然於世俗趨向畧不芥蔕詩之積者千百餘首嘉靖甲午被洛水災飄流殆盡止有紫陽集樂府遺意行於世焉所謂存十一於千百者也居閒一室上書對曰暗室抱無愧之心鬼神如見幽居懷自得之樂花鳥猶知生存六十餘年一言一行之微未嘗與斯言相背戾也修身謹行無異古之逸民髙士豈但詩詞文章之工而已哉此名公鉅卿重其爲人未嘗以微賤棄也天下之事處常易處變難至於易簀之際神思不亂尤人所難也紫陽病將瞑目兒女號哭於側忽然復甦顧謂其子曰死生常事何以哭爲猶口占一律以留别關輔鄉邦亦有名一兒兩婿是豪英明年得出幽堂口洒淚西風㸔有成語畢而氣息嗚呼痛哉紫陽病革所言雖多自責自咎之意要皆不自滿足之心爲篤實謙光忠厚君子也配許孺人先紫陽六年卒子仲讓邑學生娶李氏庚子舉人友眞之妹側室劉氏耆民倉之女也女二長適侍御渭野闕次子廩膳生員樊藻次適余子生員楊偲孫男二人士文士武生方三歲孫女四人一字生員王應祥二字閆士吉三四尚幼紫陽生於成化癸卯二月初八日卒於嘉靖三十七年三月初四日壽年六十有六仲讓卜以卒年四月初四日合𦵏許孺人華原山之埜銘曰紫陽㓜志固嘗有所求矣求而得之於紫陽何加而今於紫陽何損也宇宙茫茫與古今人同歸於幽室焉明故韓安人屈氏墓誌銘韓安人屈氏者故都憲華隂縣屈公之次女故山西布政司左叅議朝邑縣五泉韓子之配以韓子官得封安人韓子諱邦靖字汝慶號五泉子父福建按察司副使曰蓮峯先生都憲公爲諸生時嘗受尚書於蓮峯先生旣舉進士又嘗與之同官遂以安人歸於韓氏配五泉子正德間余遊五泉子仲兄苑洛先生之門得與五泉子友時五泉子自工部員外郎奪官家居余惜其豪傑之才而不爲世用後起山西左叅議未幾即早逝余嘗躬弔墓下爲之痛哭安人生一女無子五泉子擇其族子仲譜以爲後至是其伯兄太守公使來告其弟婦安人屈氏殁且屬墓銘嗚呼世固有勇於修身而福履不永於身後如五泉子者天道於此竟何如也五泉子之才之德夫人孰不以爲修仁而作善者乎奈之何天之與於若人者僅至斯也㩀五泉子外姻河津縣尹樊子恕夫狀安人秉性貞淑多穎異年十餘歲都憲公以小學四書教諸子安人從傍聽之即能黙記曉其大義既長歸於五泉子能修婦職以盡婦道於詩不經意間亦有作五泉子不欲其以有善聞嘗秘不示人嘉靖癸未年五泉子病革安人夙夜祈禱願以身代其死五泉子竟不起安人欲自殺以殉其姑閻恭人與諸妯娌止之得免安人母石氏恭人常病傷寒安人極致其憂至嘗其汚穢以察吉凶遭都憲公之䘮則哀毁過度諸兄弟送終以禮多其畫贊云其他孝舅姑順夫子寧父母慈卑㓜恤窮乏平生淑履大致率可稱述自五泉子殁稱未亡人者十有四年於婦人居常容飭之修一無所事至是歿乃嘉靖丙申八月初六日也距生成化丙午八月二十二日夀五十有一歲女名異元安人在時尚未許人太守公命仲譜於其殁年十月初三日啓五泉子之兆合𦵏於先塋之次銘曰天道逺人道邇斯人勿以天道之故暗於其所履如五泉子之夫婦胡不軌以常理天其或以世俗之所謂福者易之而成其美也楊忠介集巻二

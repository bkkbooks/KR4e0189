body:
  text: 楊忠介集附録巻三書羅洪先號念菴吉水人官右贊善公同年狀元也諡文恭奉别九年尺書未獻中心懐慕何日不然每飽食閒居惰氣或至思兄所處輙流汗驚心千古而下事變不齊如兄應不數見古人于動忍即增不能未知向來亦有動忍否即今所增不能何在將亦無可加損百折不挫者歟南北間阻欲奮無翼不得相從面受益也不肖進為不力仰負知己嵗年虚擲齒髮日疎雖于家難懲創中不無少見然此身與所見猶是為二縱然鞭策終渉凑補囬憶辛丑所教慎獨之㫖有媿顔也數年以來佩服良勤竊以曾子謂門人曰戰戰兢兢如臨深淵如履薄氷此慎獨旨而夫子告仲弓如見大賔承大祭正與相類古人終身持守不忽頃刻何哉古人事心如天而今人認己為心認己為心故易足而事心如天則難窮書曰顧諟天之明命天理所在不入安排戰戰兢兢虚以捧持稍渉動意即違帝則顔子克己復禮大舜舍己從人孟子舍夷惠願學孔子濓溪論士賢直欲希天豈故誘人妄擬哉不如是不足以盡心亦不足以事天此戰兢所以終身也况資本豪傑行孚神明擅其餘力日進無疆其必以諸聖為師而不忍少懈矣乎不肖視向徃為塗轍矣馬理號谿田三原人官光禄寺卿頃執事忠誠動天獲出獄而歸天下之情愜矣愜矣理約謫與昝子來省問僕御忽遭國䘮未果二月十日此服始闋當相與叙濶懷也年來總制曾公經營驅敵出套雖未舉行套兵去年不入我境近聞北徙五百里内無營帳矣忽爾被拿自此恐敵勢乘隙肆志又曾所招用畨人兵及鑛人諸闕御之此國家安危之機奈何奈何理聞之不勝憂懼欲約謫援救此事如何如何不盡又執事自錦衣歸來吾鄉人知之天下人知之皆謂忠誠感動天地鬼神不俟圖畫麟閣凌煙而勲名與之等矣但姪休尚為當路者所大索為休者亦緣窘急輙出惡言將與兄弟為仇鄉人聞之不勝戚焉頃因吾子徳盛當路者遂原情釋休休得歸知感叔父之徳亦篤友于之好此猶玉更磨而瑕去器在鑄而復完人生有此何幸如之何幸如之吾鄉人聞之嘗為吾子戚者舉欣欣然矣嗟乎休也死而復蘇令郎公子有玷而無瑕不亦大快也耶人情如此固知吾子之心亦夷矣夷矣今而後盍進休而教之俾仍衣巾於學校之間日就月將于賢人君子之列他日為安之𤣥為改過之處為史册之光有何不可是在休是在吾子不盡不盡鄒守益號東廓江西人歴官祭酒諡文莊順之徃嵗南歸辱道教之及嘗兩致小詩以申瞻跂竟未得一馳候謝耿耿在念客嵗侍晴川兄久聚青原春暮訪雲津入梅陂日相切砥備聞確志實學卓然尚友千古恨無縁撰杖屦以商歸宿也道駕欲出閩中可一酬此願否年來取善四方時陟名山探石室入嶽麓徘徊荒洞謁蓮華墓下始識聖學精微非想像虚談可望須從精神命脉内省不疚自成自道全生全歸方不孤負此生古之人發育萬物峻極于天只從禮儀三百威儀三千充拓不是架空摭當三千三百只從戒懼真體流出不枝節㸃檢枝節㸃檢是小成昧極致架空摭當是虚逺忽實病何如何如靜養深造計當日粹而方畦子交想淬勵幸有以砭箴之像刻二幅新刻二本荒洞聚講四條奉上清覽相望萬里惟為有道自玉以永肩天休臨楮神馳周怡號訥溪太平人官吏科給事獄中同難講學者後起復至太常寺卿諡恭節涿鹿分歧依依馳戀一路不能息念至于二月初四日抵家不意老母抱危疾自十一月十六日卧床至十二月十六日遂棄諸孤怡罪逆深重天所不宥方倖免國刑遽遭家難天壤間何使我至此極耶五年憂驚其母不能安飬五日念此苦情即欲以死投地五内崩裂號籲無方不復有生圖矣向在獄中丙午秋起夣寐不祥占亦不吉恒憂既而次兒殤逝意或可贖諸罪後復夢老母無祥召占亦可疑已嘗請命不謂變速若是皇天殛我何奪我老母之速使不肖痛切苦楚一家顚連無依至此極耶先生素知我罪聞是必傷憫鮮民道逺無能訃告西望痛哭傷神無已日南歸時與晴川先生同行至徐州路已一半晴翁從舟謂風水順疾强怡同舟怡謂風水順舟誠疾或不可必其常順遂固辭即陸怡十一月晦日至蕪湖晴翁次月初八日至蕪湖至家得與老母㑹十三日若有所驅而疾也葬無地暫殯於所居東偏小房須己酉春或得從先人塋側以地繇尊長不得自專也夙夜㷀㷀出入無恃魂神落落羸形日甚又安能久長耶先生徳行孚于神人上下佑䕶福履綏之家慶休和理所冝也顧怡信向懇篤恨不時親惟望天佑國家夀斯文呵䕶先生福體與終南太華竝夀以慰天下仰瞻無任祝願之至又歸時㑹戚南𤣥掌科首問二公切切謂每臨嵗時曕仰西北祝天佑國家早放三人又祝三人無疾病早䝉恩眷兩畨相見皆闕至情知故懷思不敢不闕華書去神去又闕中侍斛山先生有年先生博學篤行真積力乆一本萬殊觸處洞然其剛風勁氣得之天者固異而學問之造尤深且徤也小子受益非言語可述蒙恩歸田里與㤗和劉先生暨怡更同舟千餘里舟中因劉先生論學及慎獨先生有慎獨外再無事歟之詰怡識之懼人心之遺棄詩書及討論世故事乎先生亦請根極定論示則益世不淺淺也清源别矣謹書此為請證之㨿附與忠介公子子烈公書然未可忽也舍弟孤陋䝉有患難中復有良㑹殆不偶以啓迪之即成已之學也吾子勉以為何如今子示循循善誘人三句請作此題見教劉魁號晴川泰和人官工部員外獄中同難講學者仲春曾闕表弟王省齋轉付臨闕人便不知能徹尊覽否舍弟長吾近正月内以給事抵家云嘗聞起居清適消息欣慰無盡數日前得訥溪先生九月書乃堂夫人尚未歸窆且謂横逆之來避之不免不知何事豈以墳山混界猶未釋然耶竊以母老孺人内相孺人諒俱萬福子烈子勉子學賢昆玉必徳業日新秋試聨㨗不占有孚方畦先生孚忠先先必嘗相徃來商量舊學共尋至樂苐道阻且長無縁請益徒切瞻望耳東廓念菴二公枉教雲津士類翕然興起廓翁明日赴萬安梅陂之約念菴值令先公忌祭今日歸矣二公論及轍以何日復得㑹晤為快林孟津改嶺南闕通云首陽題壁已奉命洗去矣雲津承二公用白沙先生韻有作録上一覽七日雲津㑹千年樂可尋津流終到海雲岫淡何心共温禹穴業直振鳳巢音悟來三字訣莫靳頂門針東廓至人吾所仰川上逺追尋得入蕭蕭徑如披穆穆心庭虚當野翠樹古集禽音信宿安能去沉疴待砭針元城天下士何意此追尋為問獄中事因知嶺外心一生慙學歩千載幾同音便作指南計欲君示我針夫子修恭黙㣲言何處尋被衣長者貌忘食古人心武士憐忠憤明君感徳音不知觀繡者誰與渡金針聖道杳何際徃徃費探尋一自見君面能令消鄙心金堅從火試瑟在豈須音已分將頑鈍求磨似杵針念菴錢徳洪號緒山餘姚人官刑部員外郎獄中同難講學者來教承舉無善無惡與感物而動二言之疑如兄所辨更復奚辭竊意先賢立言各有所指於人所不疑之中發其疑端正欲使人反思而有得耳千古聖人立言人各不同夫豈不欲相襲成説以一人之聽聞大抵皆因時設法自不能以盡同耳雖曰因時設法其此心之體本來如是亦未嘗有所私意撰説其間以茍一時之效也以兄之髙明少離成説精研此體于湛寂之地必有超然獨悟沛决江河而莫之能禦者矣如以辭而已矣則如兄所舉數條前人論説既詳信而無疑矣又何必為是殊方之論以起紛紛之辨耶人之心體一也指名曰善可也曰至善無惡亦可也曰無善無惡亦可也曰善曰至善人皆信而無疑矣又為無善無惡之説者何哉至善之體惡固非其所有善亦不得而有也至善之體虚靈也猶日之明耳之聰也虚靈之體不可先有乎善猶明之不可先有乎色聰之不可先有乎聲也目無一色故能盡萬物之色耳無一聲故能盡萬物之聲心無一善故能盡天下萬事之善今之論至善者乃索之于事事物物之中先求其所謂定理以為應事宰物之則是虛靈之内先有乎善是耳未聴而先有乎聲目未視而先有乎色也塞其聰明之用而窒其虚靈之體非至善之謂矣今人乍見孺子入井皆有怵惕惻隠之心怵惕惻隠是謂善矣然未見孺子之前先加講求之功預有此善以為之則耶抑虚靈觸發其機自不容已耶赤子匍匐將入井自聖人與塗人并而視之其所謂怵惕惻隠者聖人不能加而塗人未嘗減也但塗人擬議於乍見之後已漸入于納交要譽之私矣乍見之發豈非生於不識不知之中而洊入之心豈非蔽于擬議之後耶然則塗人之學聖人也果為怵惕惻隠之不足耶抑去其蔽以還其乍見之初心也程子曰君子之學莫若廓然而大公物來而順應夫所謂廓然者不蔽其虚靈之謂也虚靈之蔽不必邪思惡念雖至美之念先横于中積而不化已落将迎意必之私而非時止時行之用矣太虚之中日月星辰風雨露雷曀霾絪緼何物不有而未嘗一物為太虛之有人心虚靈之體亦復如是故曰天下何思何慮天下殊途而同歸一致而百慮夫既曰百慮則所謂何思何慮者非絶去思慮之謂也千思萬慮而一順乎不識不知之則無逆吾明覺自然之體是千思萬慮雖謂之何思何慮亦可也此心不可先有乎一善是至善之極雖謂之無善亦可也故先師曰無善無惡者心之體是對後世格物窮理之學為先有乎善者立言也因時設法不得已之辭焉耳然至善本體本來如是固亦未嘗有所私意撰説其間也感物而動之動即動于欲之動非動靜之動也動靜二字之義有對舉而言者亦有偏舉一字而二義備者周子主靜之靜是兼動靜而言也其自註曰無欲故靜夫無欲故靜是有欲即動也動即失其至靜之體矣記曰人生而靜天之性也即靜一言已盡夫性體寂感之理矣感於物而動是動失其至靜之體渉于欲也故程子曰人生而靜已上不容説纔説性便已不是性矣謂求其性于既動之後非性之真也故靜之一言實千古聖學之淵㣲非精凝湛寂自得于神領獨悟之中者未易以言説窮也洪之得於所聞者若是然先師去我乆矣亦不知昔日所聞者果若是否耶姑據此心以求正耳來諭逹道無五逹徳無三皆即一也愚謂一誠而貫三五則可無三無五則不可葢心之誠譬如水之澄然無雜三則無雜自明無雜自純無雜終始如一五譬則一様人來炤還他一様形五様人來照還他五様形自是無差故曰五本于三三只是一一只是此心無雜人心只為私意所雜所以失却至一之體耳失却此體所以不明不純而有息故發之應感隨處皆差故曰天下之達道五所以行之者三天下之達徳三所以行之者一正指道與徳之端欲人得其體也得其體名言俱忘矣此錢先生復書也出先生㑹語集中先生繫獄數年與先公同講學圜中處困記稱其為同志舊友則夫未入獄既入獄與夫既出獄其徃來論訂亦非一二言明矣而槩同佚闕可勝愾歟紹武識楊守謙號闕撫諡恪人厯官延綏廵愍同年也守謙叨附榜末得瞻道範已欣服髙誼嗣是東西參商不獲一通音問忽忽十餘年于兹矣闗中山川雄博風氣龎厚士生其間質實沉毅資禀近道髙陵富平間尤多純行古道之徒皆薰染涇野翁及我老年兄之化守謙承乏提學方樂與諸生相長助未幾有三晉之役從此間闗戎馬於身心無益也榆林地艱用絀謭劣益艱展効有道君子何以榖之令郎偲仕純良可教趨庭後益長進令姪休守謙初欲與以衣巾令有改過之地近聞乃益不悛守謙愚慮為令兄老先生猶當委曲保全雖百分過厚不為過也昔周公誅管蔡元世祖其弟三叛竟全其生夫事之有疑于心者雖聖人不敢以為是事之有當于心者雖庸人不敢以為非門下以為何如弟丙午在山西承教書至今寳藏時一展誦恐負尊慈期望昨姚丞解銀至延得悉起居紀生至復領手書幸慰無極生還先此布復餘俟專候杖履無任瞻戀之至龔湜號闕陽湖廣崇人前馬子約來有小柬奉候計已到貴鄉李秀才囬失裁復罪歉弟守此心甚不樂無足道者此心惟天地鬼神與兄知之雖朋友妻子不知兄之心亦如此近南科道薦兄其出與處有命但恐貧乏不能自存不免為貧所驅古君子亦所不免更在髙明自斟量弟明年五月考滿又再相時而動否則己巳趙道長深知兄者兹去便草草奉問麤葛小詩逹真情耳媿無長物可助百凡不盡瞻思統在情亮顧四科科竊謂宋儒温公以至誠為教而一時髙第乃若劉元城氏篤信力學遍歴嶺表之厄而定靜之守鐡石不渝誠之徵也我公忠誠堅確卓彼前修又何譲焉久漸髙風渇于請益乃承手教俯及殊慰素懷令器試旋謹附候道履幸鍳匆率不能致餘情也喻時曾乆服風義無從咨覯每于楊蒲池年兄道蟻慕之忱空自悵悵爾迨祗役附切于㤗山修拘比之問業已獲郎君教矣竟為汗攝何如伏念孤節正氣文思道情天子優其忠臣僚希其風動寢佳勝帝庥淵𢎞遭遇崇替國祚繫之為光栢署豈曰一世之髙已也寤寐結思趨走末繇東還已逼西望何忍草草候省于華門諸惟為濓洛正脉自愛此士心之所憑藉于執事者也意不宣展王廷號闕御長洲人歴官左都史禮部尚書廷奉違道範忽已周嵗春間擬謁門屏竟坐紛冗不果徒悵悵耳伏惟起居清勝想明農課子之暇研究經義定有自得者廷羈絆塵俗碌碌奔走雖企仰髙明稍知嚮徃然脚根未定不能不隨境轉動耳不知吾丈何以教之謹耑人奉候容明春另圖㑹晤也餘惟順時保合不宣又春正擬候門屏至同州一日即以石崗公過闗倉皇相迎至華隂遂違初念殊益悵惘伏惟起居納福為慰承手翰讀之雖鐡石心腸亦當動念吾丈以至誠惻怛處朋友處子姪而令姪猶復稔惡不悛不知其心何心真下愚之不移也敢不祗承但呈子事李同州止是不行其文移未曾繳來今當差人徃取滅其迹耳近蒲城多盗以未得人吾丈居止且近真為可慮今亦稍稍處分未知若何因念徃日賀醫閭之事知彼當逺遁也古人進徳多于拂鬱中今吾丈遭值大畧相似亦或上天造就之仁耳萬望物來順應以虚舟飄瓦遇之即無不盡念矣倘心逐境轉性以情牽致妨調攝甚非吾朋友軰所望于髙明者耳昔人云心礙法華轉心空轉法華幸吾丈留意尚圖請教諸竢面盡不宣王一貫號闕丘泰和人任知縣一貫鄙劣庸𤨏最出時流之下仰承我翁不屑之教亹亹有加雖未獲奉台顔竊附於古人私淑之義矣自道駕西旋日切瞻依去嵗在都下曾肅啓托貴省臬司顧經歴今年兩肅啓托華州劉同知申候俱未知得逹記室否昨寓臨清㑹貴邑姚石川貳治知我翁台履康和皋比有嚴衿佩雲集横渠之教復興孔孟之道益著昔孟子謂其君用之則安富尊榮其子弟從之則孝弟忠信今日我翁是已寜非斯世斯道之幸耶子勉兄近來學業喜聞騰進好事伊邇林下之樂也慶忭何如家師晴翁家居甚適鄒東廓羅念菴錢緒山諸老日常徃來講學鄉人士翕然信從近東行吊訥翁計此時當與浙中同志㑹講鵞湖向有候柬二通俱在劉華州處馳上一貫改丘及朞矣治無善狀猶夫興化也實負我翁教愛愧悚不敢言寒家舊有讀書處名舉林書屋結搆為先曾祖贈御史公先伯祖方伯先祖大尹暨一貫軰頼此忝竊科名敢乞我翁鼎吕之宣以垂世訓後有作者皆我翁之教也謹積䖍拜使顓候懇凟薄儀肅具别幅并晴翁候柬一通伏惟台察西瞻華嶽不勝惓切之至又海上僻陋久未奉佳報日惟傾想履信思順自天佑之矧安土敦仁又夫子之所以盡性者也其旋之慶敢以奉賀興化之役推行無本徃徃為上所疑負教良多愧罪愧罪兹便謹此申候對冗不盡言伏惟台亮王彚征號闕椒長安人全教諭不才忝為同鄉塊居斗城相去一舍未得請教左右抱歉懷恨何時得已也今征叨領椒諭此邑有掌科戚老先生四方來講學者㑹不肖未嘗不欽慕執事未嘗不詢訊執事生以實對貴邑雖去省城不甚逺然公在仕途生在家及公在家生又薄宦雖久仰道範未嘗一識眉宇衆皆笑余以為不見至人鄙陋何甚也可媿可媿首夏錢緒山王龍溪二老先生來椒訪南𤣥戚老先生一時南𤣥徃淮安㑹親二公不得一面將返舟南下吊周都峯老先生因知小僕回家與執事寄音頗便和州特特遣人送書來椒學托生轉奉上耳先生闗中有道人也孝在家忠在朝廷天下後世所欽仰者而今不惟士大夫仰公慕公雖下𨽻僕夫走童室女罔不服公慕公也小子在卑職中亦學好者不得走公門登公室領公教瞻公容真棄物也何足道耶何足道耶小子未在公納交之下不敢致柬左右謹修寸楮為二公托機引耳南𤣥先生之無書者以渠在塩城尚未囬小僕失長伴不能久待也後自有書通問門下也蘓宣字廷詔南樂人東厰旗士事載本傳數年來領教左右過愛尤深三翁戒期束裝載道去之速而挽之不及也徒自悵望而已今朝分手未知何日重逢謹用俚言以上之别我匆匆出帝城通州把酒餞君行明朝又作他鄉客何日論文㑹玉京袁述號闕人泰和述㣲生小童寡所見聞頼妻伯晴川翁扶携夾輔輙有觀法宇宙仰止上賢之心欽惟大人貞忠同日月之光事功竝山嶽之久聰敏軼于江夏音律邁乎少陵文章典雅不落䋲于姚姬經畧博逺允振響於韓范汲引後進逸駕前修真國家之柱石儒林之龜蓍也不肖每讀晴翁之教必首曰斛翁夫子海内鉅公也聆語奮躍翎翮不前自憤棄遺謂必阻絶雖急欲附承動靜自謂庸㣲僣通問候祗以取罪何知下方有幸得展子衿小蟲薄技彤管見收乃者先岳墓銘誤辱譽揚非惟發潜徳之光真以敷後人之賁幽明受惠千百世不朽者也邇聞天恩大布逺近胥慶咸謂曰斛翁夫子天啓其機也上則樹勲業國家有頼下則救生靈小大有慶今闕士及此闕天之厚望于夫子者至矣雖然永肩一心在夫子貞一之不可挽而仰止景行在愚生瞻慕之顒望此自然之情匪繇外飾也狂瞽無叙伏惟矜察恕而教之幸甚郭學書書何幸仰托晴川與進門下教愛累年惟書瞻仰之思中心耿耿未嘗一日乎少懈也皇天后土實鑒予𠂻不敢縷縷及道駕啓行追送不及而十年景慕之勤自達不竟悵恨如何向在榻前匆匆數語為老母夀文之請而明日遂行未及叮嚀于今為歉短狀隨上伏惟緑野之暇留神振藻以成賤子一念夀親之志倘得手筆不惜一揮書將什襲珍藏為子孫傳家之寳千里祝望不任惓惓頃以張廓莊都諫便敢附一函書專兹懇矜亮萬萬逺祈道體珍嗇以膺台召不具桂榮不肖盡以患難之情徧訴諸公一時朝士無不動色豈非人心悦則天意得乎脱梏同天之句亦若有躍然于𠂻者天恩浩蕩相道從容論思所入深信三君子之忠而示之以不測也積誠之通交於神明要之倐忽之化人力未之先也公歸矣不患不能力學召還有待當知益培圖報之地則可也義無所逃亦起敬起孝之推也無忘檻車尤當盡其在我草亭公愛厚之情惻然可掬所致贐私幸亮非有所為欣然取之可也在途當踈交㳺覘者或未忘焉而速於歸則尤檢身之則也前承賜佳章以有山妻之變曾次成焉因曾語晴翁恐不得晤補冩於後統希炤原曾學仙人泛海槎頂門原來聚三花再來京國隨班逐一謫江湖去路賖衲子忽驚來鶴吊長天空抱闕嗟如今盡解塵緣縛到處黄冠可出家賤意闕出家謝事也葢無内顧之悲也公信之否耶大老有所不可無一言為謝積五年求解之真幸天𠂻属于一旦葢有所自來也萬惟照亮張湧號闕僕本淮海庸人承乏大藩才弗勝任名無見聞愧甚愧甚恭審大人先生策名科第衣繡持斧髙蹈養素徳重三秦迹其行實有光人國有禆於後覺而開廸之不圖闗西伯起復見於今日也是冝欲登龍門而仰止髙山者履滿于户外矣如僕者以俗吏羈縻動則掣肘望明河而不可親豈弗令人渇心之生塵哉即有豚犬弱息隨宦茍延時過太晩誠欲摳趨少分半席未卜髙明春育海涵肯留門下否倘蒙一視獲聆鐸音匪徒弱息􅍢骨銘肝僕之闔門亦感戴無涯矣俯冒威尊弗勝赧悚萬惟髙明採納而亮之幸甚曹察號闕同年無錫人也忠孝節義是兄天性慷慨論事乃其緒餘吾朝二百年來所得惟兄孔孟以後數千餘年上接不傳之緒者亦維兄耳敬讀二詩令人感涕願兄自愛無傷天地鬼神監臨呵䕶之意餘無所言楊忠介集附録巻三

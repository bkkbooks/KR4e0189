body:
  text: 楊忠介集卷四明楊爵撰書與司官書竊惟執事名臣後裔儒林節行自理北司事以來獄中人盛德之贊青天之謡走二人得於耳聞者亦久且熟矣往年曽寺丞子如獄中具道二執事於爵其垂念曲全之心甚為切至以二人事喻東人云幹國之臣當為調解此皆二執事痛隱時政懸切國民而為世道深長之慮之心也豈特區區為二人惜哉在二人未嘗不銘刻肺腑感激思奮益自砥礪而求不負賢人君子之許可焉屢欲修書啓謝以罪難中多所不便而止其敢忘此厚德而忍於自薄也十月初爵以事出窮迫以死自誓又不欲苟且泯沒使死無聞焉思欲具書以獻主上以盡垂歿忠藎之職其書始終千餘言大抵援古證今剖析於義利邪正之幾懇切於安危存亡之戒欲主上納諫容直以成君德以廣君道與唐虞三代兼美比隆中間有云臣以罪處獄中四十五月有餘矣延此一息尚未死滅此實陛下好生之德覆載之恩之所及而陶某等於臣飲食一節曲為區處不欲置臣於死使朝廷有殺諫臣之名其心未必不為忠於陛下者也此數語者實以古人之作用望為執事之能事焉諺云以所重加於所好爵以人臣以道事君者而望二執事是以天下古今所同重之道而加之矣其待之可謂至厚期之可謂至逺矣時以楮筆不便未能稿具君門萬里亦無由為九重獻而徒能以口誦耳故嘗數語邏者云我有心事願告朝廷汝為我逹之所以為此言者以兾主上明賜紙筆則頃刻可成稽首以上雖死不恨天啓聖𠂻萬一感悟不惟於國家大政有所禆益而二執事之髙義美名亦因得以示天下傳後世矣近日獄中嚴戒之故走二人亦頗聞其詳矣顧事至於此莫非天命上則朝廷之法下則人臣之罪在二人敢不修身以俟而順受之乎但身居言路職任諌諍中奮感激不無觸犯而雷霆赫然之下既以微示戒笞而全此生矣以一時言語文字之狂妄而數年坎穽禁錮之凶危則所犯之罪與所服之法亦足以相稱矣今復困以匣鎖加之以非常之法而置之於必死之地焉在二人一時之存亡雖甚微而關於天下國家者為甚大故憂憤感悲盡戒號呼而慨吾遭際之不淑此心此情實不能自已矣每夜初上鎖腰絡曰羣捆曰生根一人立而唱之數人縳而為之以此治元惡寇盜之峻法舉而加之於出百死為宗廟社稷慮之諌官焉則時至此真可為痛哭流涕者矣况二人家貧路逺官淺罪深窮乏已極於守獄校卒無毫末德意推以相及則舉手之間有何情分非有二執事在上將誰倚以存此生乎即今幽室窵杳門扉晝鎖漫漫然與長夜無以異下地冷水之上肌膚凛烈一苫一席之藉皆事屬觸法而皆為人所徹去坐卧起立展轉關禁一飲一啄率至窮詰其萬辛萬苦萬窘萬迫之情狀視獄中諸犯其嚴急之過不啻十倍聽其言語察其意向似欲二人速死以畢事焉耳竊以為凡此毒苦之甚二執事或未能以盡知焉若曰知之則往年仁愛所及固切切焉欲全此殘生矣而今復不以生處之豈肯以數年至厚之德轉而為一日之甚薄乎故二人直慮以為二執事決不知其如此之甚也或者以一分謹愼分付而下之人奉承之者過於十分焉此則事勢至此容或有之今日切近災禍二人已身久罹之天地鬼神照此𠂻曲而志窮慮極亦已甚矣故不恤冒瀆之罪敢以迫切悃素仰告而無所匿欲望此等毒罰仍賜寬恕但不時預備若事出不測則倉卒即可處辦決不敢以餘罪有纍於二執事焉如此則情法庶幾兩盡囚繫顚危之歲月或可以再延矣雖來人覘視日在於此而彼皆二執事屬下舊人天理之在人心者未嘗亡而見其知好惡曉事理者十常八九更煩以一言欵喻則若輩未有不信從者矣若二執事不為顧念而一如世人之所為則寒風凛烈之際羸瘠弱孱之質實難克堪而二人相繼死者有日矣天地間無不死之人無不化之物誠使二人一旦命先朝露倐忽殞滅為死於諫職之下求仁得仁志固未嘗不自慊矣豈以一死為惜哉但念天王聖明堂堂天下不能容此致身報主之直臣使竟死獄中於二執事數年保全之德愛亦未得終始領之人臣之禍朝政之損主上盛德之纍為天地間留一無窮之悲恨矣故昨嘗有詩云九天風色夜蕭蕭此日君門萬里遙不是諌臣愛一死殺身恐纍聖明朝此實二人惻怛悲感惓惓不已之心也古人願為良臣不願為忠臣二人今日之事其是非得失固不容以自喙矣但慮天下後世有志士焉其慷慨殺身而存視死如歸之節者實有鑒於此焉天下後世有仁人焉其見幾而作得明哲保身之冝者亦實有鑒於此焉所見不同而好尚斯異一時心事固為人之所取而亦為人之所戒焉若二執事身當今日之事上不使朝廷有殺諫臣之名下不使忠臣義士吞泣飲恨鬱抑於九泉之下則經權迭用有善處之道存焉耳有祁大夫則叔向得以不死黨錮之禍非霍諝不能遽解而郭楫之語范滂事雖未就而髙名千古不朽也二執事有賢者之節介有能者之作為故二人敢以古豪傑之事業望之而欲其成廟社之逺圖焉富貴福澤一日之榮寵名節道德萬世之瞻仰於事變難處之際而綽有處之道非吾二執事之髙出俗輩將誰望焉謝吳知府書諱孟祺字陸泉同年去歲歸田里於同州公署中獲睹執事諭屬官語一念惻切常在閭里厚下之心可謂至矣既抵家旬日應酬叢冗未及伸一言以謝纍年德愛而天罰所及檻車復就道矣繫過華州道中遇一人自言為府中使區區瞿然下馬恭問啓居且致惓惓慕戀意其人已逹左右矣竊念執事以義理胸襟經濟才略典此繁郡追配先哲如余馬輩者必不多讓等而上之有雋不疑第五倫皆京兆舊尹功業峻偉光昭簡䇿固已為明公之能事也伏願厚自愛以慰逺邇之望鄙末以殘喘弱質履此艱危百死一生旦不保夕首陽之及固自甘心東陵之幸不敢復冀惟信步逹去隨身所到安於僵仆狐狸螻蛄一聽其來但不知彼蒼者天於冥冥中何如以籌之也小兒歸家意必領文赴考獲一拜候故謹布寸𠂻遙問道履荷髙明年家之情骨肉之愛一時紙筆不能盡述臨楮無任仰瞻上楊知府書名守約往時繫過洛陽獲接德容繼蒙厚愛心切感荷次日渡河遇馮巡檢涇陽人以鄉里故設杯酌於舟中以相送具述執事德政為人心所嚮服且曰真邵父杜母也真邵父杜母也區區與一二同行者共嘆馮巡檢知言且知髙明以君子長者之德敷而為厚下恱民之道有體有用不負素履真可嘉尚將來責任事業已預可知矣小兒歸道由治下謹候道履并伸謝感罪難中有懷耿耿不能盡言與楊督學書自執事下車後即聞凡事從厚有長人之度去年區區歸田里遇士夫相語皆謂純以德禮化導中心恱服稱頌者無間於彼此既而繫過河南府蒙令弟先生之愛以有偕行者未得敘談次日渡孟津馮巡檢以鄉里故置酒舟中酌以餞送彼歷述令弟先生德政且謂人皆以邵父杜母稱之區區既嘆馮某知言因思海內士夫兄弟登髙科躋顯宦者􅉨􅉨有之求如明公兄弟一時皆以賢聲聞者蓋鮮矣世有寬厚君子百凡敷理優裕闊大下人有過開誠訓誨必不得已而後罪之片善寸長愛如已出故曰與其殺不辜寧失不經其心休休其如有容則身享盛德之令名而福慶逺延於後世如吾明公者其天資學問大率類此亦有所謂嚴明君子者如古人言察見淵中之魚人之畏懼有餘而恱服不足此雖未為不可然成就終小非所以語明公也伏願益加涵飬不更初志必以天下為度將來大其勳業為霖雨以澤潤斯世是愚昧所以深望於髙明者也小兒將歸意必給文補考故謹述寸楮仰候道履困難中身心眩貿語言無次有容君子必能情諒若纍年德愛耿耿在心者非一時筆楮所能盡也與汪周潭撫臺書兩接丰範適值窘迫未得欵領教益十餘載相離百死暫出後就危地邂逅之際此心當何如哉小兒歸過潼關謹布謝忱拜候起居厚德厚念誠非一時筆楮所可悉也明公以義理用事治化所及逺近傾慕他日誕樹勳業逹諸天下愚昧倘不以狂罪死則耳濡目染或有日焉伏願厚自愛以為世道益多凶多懼之地中心藏之未能盡言與田道充主簿書自癸未年侍清教於長安書舍中當是時愚昧竊兄德範自淑者日多有之既又倐會倐别至戌子秋消息不相聞者將二十年不圗於繫檻危迫凶禍不測之際得一邂逅於他鄉焉且喜且悲把袂客館傾懷欵敘漏至夜分而各忘其倦則脫然於形骸爾我之外矣次日䇿馬逺送於數千里之外逹子營蘭若中情戀戀將之以酒殽重之以贐貺灑淚流涕一行一灑每念及此中抱惻切宛若復一相見也不才於十月二十四日至京次日起更時復下獄中囚困之狀固一同於往時但五六年間顚頓挫抑血氣漸衰精神漸減視初入獄時凡百摧折直能以身當之而略不為難者則頗有間矣誠不能真有所見而樂天委運處以寬裕但勉強排遣於意外之加一聽其來或竄身異境以禦魑魅或填尸溝壑以恣狐狸皆不才冝有之罪夫何敢辭若幸天恩復歸田里過閿鄉城外再圖一會則千百中之一二也實不敢望小兒歸謹候起居且致謝忱意不盡申之以辭曰嗟人聚散兮有類浮萍慨今憶昔兮雙淚沾纓他鄉邂逅兮有懷盡傾君之胸次兮塵垢功名嗚呼把酒兮送行難别兮友情宇內關心兮此身匪輕臣罪當誅兮天王聖明與原方畦員外書名宷蒲城人同年去秋幸獲一面不圖復有後來事數年傾慕未得盡慰潼關追餽亦以窘迫倉忙之際欵陳不便草率奉復暨冬十月二十五日夜復下獄中囚繫狀一同往年或死或生皆古今人世常有之事不足多道尚記歸時途中遇周潭公輔相問勞即擊節歎賞謂兄體用該備學業淵源更非昔比想林下數年靜閲幾微熟仁精義於宇宙事皆在吞吐中矣昔者幸庵彭先生欲出則效諸葛孔明退則效陶淵明為二公像置書屋中朝夕敬觀以自勵焉前輩尚友古人一飯不忘故事業逺過後人吾兄今日進修質之先哲同一揆也故耿光昭著朝野推重小兒近日書告與舍甥禹卿侍教下區區深自慶慰小子輩幸遊君子門下咳唾所及無非身心之益但彼資性愚鈍數年奔走已成荒廢恐無受教之地謹謝眷念又拜讀教翰知起居萬福困憊中亦切喜慰西望瞻思萬里杳杳強起述此以告第不知兄之家慮何如恐不能不勞心也春秋百王不易之大法扶衰轉危見諸行事仲尼作用盡在此書兄潛心及此所志不小但井泄不食亦運數使然事自關於天下己身通塞不慮也近日得對山集讀之每切感慨蓋世之才經濟之略真以罕見其儔傑人志士積抱負於生平者孰不欲親見其行轉斯世於隆古之盛乎然所願不遂則亦莫如何矣願兄以古人自期待進則覺一時退則傳後世禹卿望教訓勿聽廢棄與胡知府書名汝輔自庚子秋幸與教下寵顧實多凶危中六七年間於厚德厚愛未嘗不在懷思去歲夏六月會髙吏部始知執事有關中之行髙言郡大政繁實推擇任之年來屢聞垂念心實悲感僕奄奄殘息百死之地朝不慮夕執事不忘舊好是以古人自處而僕不足以當盛愛矣伏思前輩如余司馬柴總制皆以英哲練逹久典此郡明公碩德逺猷與之並駕他日功名事業彪炳宇內以霖雨蒼生者今實基於此焉僕或罪不即死尚當有傾聽之時伏願為宗社生靈厚自愛偶便謹此遙伸謝忱囚板殘甎之上不能布困憊昏惑筆札欠恭髙明知我必不深罪與楊公書庚子歲秋爵北行厚荷德愛一時匆促遂戒裝以去未能躬拜心未敢忘自辛丑春以罪下獄困苦多端日夜戒嚴者三年於此矣賴有神天鑒佑朝廷恩德延此殘喘尚未死滅蒙我公祖屢下優恤寒家不才每一聞之未嘗不感激思奮而至於流涕也縣上張父母往年以覲事到京嘗得數面既而遘疾鄙末亦嘗躬候不數日即入大難後其終事過家即棄世矣言之可痛聞我公祖德教深漬逺邇協化大選殊遇其在此矣尚當為生民慶犴狴深幽久未奉問囚繫顛危中謹布悃赤少伸謝意臨筆耿耿不盡言與紀中夫書紀子中夫汝在此小兒輩有所倚吾無慮矣言官得禍如此所關非止一身士之涉世處常而不能處變處榮而不能處辱皆非丈夫也易曰困亨貞大人吉無咎子以為何如當有言以復我教小兒勿得憂慮但用心讀書以待之偲吾以致身報主之故至於不能保汝曹豈非命耶彼此順受即學問之道其在此矣勉之勉之又中夫賢契在此我心甚好偲尚在教下讀書否乎可告我知道吾人處世安樂則心存於安樂患難則心存于患難有何不自得而戚戚於心耶於今日之幽囚而安順之亦吾百年中所作之一事也恐賢契以我為苦而憂慮之故告偲子傳來吾叔母與合家親眷動履何如聞兒曹進學是否告我知道古者忠臣義士忘身殉國豈無如我今日者乎汝宜用以寬解無煩亂於心不能處也又中夫我在內時讀周易以消歲月患難不足道但吾不能以至誠感動君父朝政之損士夫之禍雖非我所致亦繇我而有此心此念不能忘也與傅鄉丈書吾兄德意久已聞之中心銘弗敢忘也久處窮絶必死之地豈曰患難而已也賴神天鑒佑朝廷恩德延此餘息尚未死滅阻絶飲食者一年矣所給米不可食但托久禁自炊者得小米粥食之今其人將出矣出則無從得食矣煩吾兄與所知亦能素念區區者言得免給米容家人自送小米再延殘喘以待天罰所處何如也紙筆不便敢此罪罪答張本禮書賢契在此年餘今將行書片楮辭别我又書片紙以送之想音容于聲響倣佛間竟不得一相面覿實難為心實難為心昨蒙教言凡事皆宜置之度外不須憂念此語誠是今此險難繇我自取身居人臣而死職下固心所安也何敢怨尤安得倐忽殞滅溘先朝露做一柩車歸藏蒿里當此之際諒我賢友必多感傷携石凍春一樽哭而奠之於柩前我之遊魂炯炯固結不敢覽此苾芬盡一享之斯時也或有雲物班布風氣蕭瑟草木悽悽之景象是我一假鬱抑不平之氣充塞浩蕩因足下之感招而倣徨於左右也言至於此狂鄙故態又可一笑也令郎讀書宜期逺大勿令自畫途中珍重吾鄉諸友囚繫中不便候啓為我道之答周給事書髙明志趨能以義死而不能以不義生不才知之久矣但恐感時懷抱不大放開故有前日之瀆荷蒙手翰愈益深信來諭于封緘處寫恩師字不才見之且笑且慙焉敢當之昔栁子厚博學能文為時所稱或言其可為人師子厚言以吾為人師此猶蜀之日也後又有勸韓退之冝為人師者退之答書曰子厚既目以為蜀之日吾子又欲使愈為越之雪蓋蜀地多隂越地多暖日與雪皆人所罕見而詫異者也故栁韓二公取以為况今以庸愚不肖身負重譴不知倐忽死滅在於何時與何地也髙明以師稱之此則陸地坑窟之魚鱉江湖波浪之麋鹿也豈不尤為罕見而詫異者乎唯不以過稱及之為幸又心事既明奉身髙蹈可也或復荷國恩效力邊陲得展平生以馬革裹尸而還亦可也外此則富貴利逹乃人世間汚穢之物耳諒不著一點於髙明胸次中也今宜靜窗讀易開廣襟懷預定主張紛紛眼底任他有無正不必纍纍然如前所云也答趙總兵書教言到竹塘公事已得其槩但以親老終飬事再乞相告其姪有官中書者去歲見山東試録知渠以養疾在家不知今到此否石疊旬日前有承差在此但聞餽賜未見一字相問想是罪難中人多畏避與通之書恐致驚懼願以鄙意為賢僧喻之尊名上用字過于謙下不才深所未安據禮十年以長則兄事之吾三人當時同處險難分則朋友情若兄弟况未有十年相長者豈可用此字樣是何道理是何道理再次不可因有此字遂隱此帖未與周劉二公知之此不才心所未安者故再三致告浦公終飬事或有或無數日間再望教示又聞滎升為世道慶邊務想亦勞心成功此其所也繆劉何三人來謹候起居諒獲福履今夏解易以消歲月尚十餘卦未終感疾遂已將復補作賢郎學業必有進益俚言奉覽萬惟珍重愚衷不能盡言楊忠介集卷四

body:
  text: 楊忠介集卷十明楊爵撰七言律詩一遣懷韋編自伴倚幽窗世故年來頗會忘百代人豪空宇宙半丘荒草照斜陽孤懷耿耿幾長夜蓬鬢瀟瀟一老狂曳杖庭階徒想像路迷無處問滄浪招友人王泉岡同學尹家村寺門外同人且向東從來錫類古人功每于蘭院瞻牛斗且伴藝編馴象龍花露影清前日異世情不染此時同勸君莫負離羣隱好把瑤琨就石攻次羅整庵先生韻嘉遁胸懷自浩然髙風宇宙久相傳難兄難弟心同好時止時行道未偏明主嵗勤優老意蒼生日望濟時權正看霖雨蘇天下無奈丘園一念堅題碧泉用杜工部韻樂飢襟度憶當年獨玩松溪此潏然共羡真源同石髓誰憐清味逺瓊筵懸崖不憚千尋險放海還慿一脈綿莫道泠泠無與伴主人日坐碧泉邊登華山詩夢想兹山二十年今朝散步上其巔竒峯塵外崚嶒立怪石雲間顛倒懸雨過一聲促織響樹深幾笠牧童眠大觀到此方為得覺我心天高萬千元日次晴川韻已逺昔年鵷鷺班遙從犴狴仰天顔形蹤眇眇寰幬下世故忡忡方寸間患難久慿君德厚赤誠只自我心間平生不灑身家淚兩眼今為天下澘謝友人王泉岡贈衣平生交結未輕羣二十年前我與君膠漆弧蓬諧菽水風霜蘭若論斯文解衣情思如何限折簡憂心徒此殷明月山中多勝迹同誰尊酒伴間雲蚤春晴景初開淑氣端共看臘色已殘漫天邊轉眼流灮易困裏驚心世路難自嘆百年懷抱切還思一日聖恩寬圜中蚤覺春先到似恤纍臣五夜寒共把愁眉且放開喜看春臘再相推城邊煦景新堤柳墻外香風帶野梅世運從今轉熙皥聖恩不久自天來故園咫尺佳山在一日定遊三百回送友人賓薦同登二十年便思宇宙在剛肩名從仕版朱行列心向閭閻赤子懸雄展應知今世少清貧不讓古人先功成準備隨琴鶴廊廟方收天下賢述懷禁裏東風覺漸和背隂殘雪果無多眼前楚楚蜉蝣羽心上悠悠擊壤歌道義無窮須共勉時光有限莫蹉跎遙將佳趣問良友鴈過長空興若何春興八首次韻才見春光轉上林錦臺微冷尚蕭森風回薊野有時息霧隱燕山盡日隂燕語鶯啼圜內景江湖廊廟老來心更深還有愁人處門內柝聲門外砧疏窗照日影初斜可奈囚居此嵗華傳世從來無赤子通天空憶有浮槎依依遙見城邊柳裊裊忽聞塞上笳詩句漫成還有用將來幽地賞春花共坐圜門向日暉開襟更覺暖風微葵生已露根頭品鴻漸還成天際飛將此孤懷頻點檢肯教素步自相違紛紛無奈爭春物緑幹紅芳一樣肥三載艱危嘆白頭可堪吾志在春秋自憐賈誼一腔淚空作張衡四段愁適意時看階下草奮飛終愧水邊鷗美人蹤迹今何在杕杜猶存古雍州認得西銘如下棋茫茫宇內盡堪悲顧豫顛沛真無似空惜盈虛自有時燕羽輕風還􅀈􅀈春暉驚眼又遲遲艱難惆悵懷千古采采榛苓是所思十年佳趣在青山瀟灑襟懷出世間心上一真原未泯眼前萬類總相關緬懷周道今何事寤寐哲人多厚顔歸去再尋千古上耕莘老叟與同班斯文千古是誰功由彼陶唐立大中措履敢從浮世好幾微深愧古人風衢連柳過圜墻緑苑隔桃侵屋宇紅潦倒還思涇渭上絲綸間釣有漁翁山連薊北見逶迤小徑通天傍險陂隱谷長蔓多細草懸崕短幹少松枝習浮鷗子隨波逝憩樹牧兒逐影移老去登臨無健力白頭空惜此低垂贈泰和劉洗心秀才洗心兄晴川翁同豫繫獄洗心自泰和奔來問賦此以慰之諫草傳來自可驚倉皇䇿馬上燕京一腔忠藎君臣義萬里風霜兄弟情日邁已能扶世道月征真不愧天明江南韡韡看棠棣春雨春花已滿庭學問須先會洗心洗心於道最能深仁義英華成事業廟堂根腳自山林祖先原委家傳逺兄弟芳名世所欽得志知君存素履豈同流輩但纓簪贈人困裏逢君一月春同方不覺自相親文章早已添聲價德義猶思與日新有意動時成性僻未安心處是吾真必須俯仰先知愧然後能為無愧人雜咏五首間步幽階伴夕陽塵埃眺望總無疆風吹古柏棲鴉亂雪掩寒山狡藏半世生涯真類夢幾年毛髮已成霜慿誰再取新春酒日放長歌任老狂獨倚圜扉對日斜緬懷松竹已成賖迷途豈但千程逺腳步空留百代嗟時繫鐵鐐甘罪戾漫吟風景是生涯殘磚閣火燒沙釡也類山村野店家有腳陽春到處通金吾氣色轉寒松壯心逈出存亡外殘魄逍遙化理中寂感胸懷驚嵗月孤危蹤迹倚蒼穹羊裘一片隨朝暮興與雲山野老同濡險悠悠嵗月頻強延一息又逢春天空斜日鴈留影地迥煦風草弄新內聖外王同貫合身謀國計總相因憂懷轉作元亨處此是人心一念真天降窮厄浩無垠金吾匣鎖伴儒臣久遭危患心猶泰運轉亨機思欲頻要信樂天為樂土須知憂世是憂身有詩吟咏忘顛沛倣佛羲皇境上人與晴川飲用杜工部韻十年遊樂有山溪堪笑功名一旦迷身世三春留犴狴夢魂五夜到秦西養心幸得逢良友披卷還須作筌蹄墻上半樽清酒在與君同要醉如泥幽圜無處訪清溪幸有高人啓我迷共坐斂襟還共起堪東隨步又堪西百年心事羞輪蓋一日西風陷馬蹄寄語西臺同志友老狂依舊醉如泥遷榻次韻十載潛身一草茅興來誰意向芳郊六經愚腐散塵几三徑荒涼卧竹稍垣寂秋深風落果梁間春到燕銜巢衰年至此真無似儘把疏狂任世嘲贈友人種德羡君能有終皇天日錫慶無窮膝前稚子丰神秀堂上雙親福壽隆誰共聲通千古上更留惻切萬方中幾回遇别此何地惆悵乾坤眼底空見童子頭插苦菜花索觀之作二律穠英倣佛類秋菊先飽無涯春露滋隱隱一般神色好煌煌幾點化工奇開來可伴囚中眼採去能療天下飢聞説牡丹多艷麗讓他生長洛陽池真顔淡淡淡而濃坐見百花色自空惟有仰天傾白日也堪隨地伴東風肯因薊野門前黑不向燕山雨後紅但慮聖朝寬我去無人解爾此竒容病起述懷用杜工部韻春日悠悠病已痊獄中再得數殘年天光逺照來簷隙良友頻憐到卧邊無似懶將間帙展有時還是抱愁眠感懷骨肉應分念百口懸懸心在燕次緒山韻五首間楂一旦會消融驟雨驚風過太空隱顯從心無上下險夷信步有西東感來定擬初張弩應罷還如未叩鐘浩浩霄壤多少事真機都在卷舒中雙鸛飛來圜樹梢看他春到便銜巢顯庭常若儼賓際幽世必須藉白茅心果合天真浩浩狂非作聖但嘐嘐會教身世全無我方寸才能免物交莫道幽居心可欺格思便有鬼神知還看處處玉吾地敢不時時慎所為要走長途須健步能除深病是真醫誰言岸逺難先到只在人心一轉移眼底紛紛變態多誰憐世道日頽波百年事業真難措半隙光隂亦易過川上月臨懸細餌墻頭雨倒整煙蓑樂遊却恐歸豪放渣滓須先向此磨此心常要擬虛舟虛得能將萬物收後樂不妨隨地樂先憂豈但為身憂也知步履須藏用却笑疏狂真妄投齟齬方圓成感慨徒懷擊楫在中流和太白山人韻三首時來門外坐春曛世事紛遊滿眼頻進退憂思今最切江湖廊廟更何人循環泰運期三代展轉凶危此一身却憶子牙清渭上釣竿投處有芳鄰晴暉薄午暖風細此地獨憐春更幽五夜露花新柳色一畨鴻鴈動江洲百年事業懸心切萬里瘡痍滿眼愁堪笑襟懷潦倒際時看鳶鳥半空遊夜柝忽驚鄉夢淺破雲殘月照窗斜寸衷不是杞人過四海原為天子家雙鬢蓬搔老囹圄一身寂寞又春華憂心獨覺孔殷處世故茫茫未有涯聞次女亡傳吾子秋去年亡凶訃一聞五內傷姊妹云何相繼死父親血淚灑圜墻往時女訓勤莊誦今日哭聲滿屋堂雖我自言不過慟也應默默斷衷腸初夏二首次韻不教間慮在胸中便與長天一樣空信步踏來皆樂地開襟滿抱是薰風庭前柏色拂雲緑墻角葵心向日紅更有一般好景象應時黃鳥囀幽叢日上圜墻景寂然老囚於此尚安眠好懷還有四時興世故全無一念牽糯米煮從沙釡裏詩書堆在枕衾邊何翁若解吾真樂日食何須破萬錢送李明甫去年車檻過蘆溝見爾卜居蘆岸頭山秀堪宜連屋峙水清恰好繞門流四時家有瓶中粟一卷心無意外憂公事了尋遊憩處幾叢喬木淡雲浮端午節圜中佳節喜相尋况有良朋與合簪蒲酒且同今日樂負盤因見古人心憂時未恤身危久宥罪還思恩詔臨此日密雲成驟雨似傷屈子淚淋淋遣懷二首用杜工部韻數片殘磚閣睡牀顛危知是舊周行時嚴舜跖兩條路日誦羲文一炷香心健自能忘困迹榻間猶可擁衾裳襟懷還有瀟然處每向南風歌興長夢想丘園孰與班秦中涇沚傍商顔百年須係間中罷一曲長歌日暮還月朗風清皆自得鳶飛魚躍在其間茅齋却笑堪人意正對南山倚北山間作四首斯道瀰漫貫古今幽窗正好整囚襟毫釐乖謬天機逺一念虛明上帝臨禮用事時為復禮心懲失處見真心存亡操舍皆由我默默須從方寸尋參破乾坤古與今一憂一樂見胸襟鬼神不爽幾微監幽室常如師保臨君子固窮吾未得哲人自靜彼何心包羲不盡當年意此地還須細細尋思古原來為挽今國民惻惻此胸襟致身臣子曰忠藎為答天王之智臨霜剝風摧今日事江湖廊廟往年心天乎命也難窮極一息還從真處尋自古遭逢未有今空茫宇宙見胸襟狐烏走走聲聲叫雲雨朝朝暮暮臨輸已應知郭泰慮濟時還識范滂心感來感去真機在此理才知不易尋劉子壽日初度圜中今四度白頭萬里杳江鄉瞻思夙夜九天逺感惻倣徨一念長我輩元來多妄動聖朝未肯殺忠良壽隆本自君王造但把赤心儼對揚夜將曉夢過原次寮隱居賦詩為次寮贈得起二語覺而足之乙巳年六月初十日莫道山林無可樂隻雞斗酒有餘情覺來却是圜窗夢卧聽燕山杜宇鳴幽纍縛我家何在世事令人身自輕一枕黃粱心未了長天目斷片雲橫和大司馬聯峯先生詩二首用其起句席地簷前趂晚涼幽懷相與嘆流灮思危自覺一心折行逺空餘雙鬢蒼風景久成人慣習卷舒堪笑此顛狂世間翻覆都休道只可堅吾百鍊剛席地簷前趂晚涼逍遙不是傲羲皇蹇修天亦憐吾拙拯溺人堪為世忙興著野花呈艷好情關幽鳥弄笙簧生涯老去無長物一卷韋編袖裏藏送紀中夫歸秦與子同心二十年僧堂香火半爐煙正防步履三關險却笑功名一線牽囚繫艱危懷後進衰殘寤寐仰前賢歸來共了平生事就此先期立志堅送林張二都黃門謫官出獄侍臣暫出五雲鄉總是皇朝恩浩滂九品官非間處著千鈞弩在甲中藏幾年忠疏流封內萬里懸旌歸帝傍他日賜環承顧問好將民瘼答君王獄中贈孫都御史一繫秋梧歲序遷眼前光景總堪憐暮雲思望八千里濟世勳名二十年天降困窮終有益到今顯祖始無偏從兹努力加餐飯浩浩乾坤在兩肩乙巳年八月十二日主上符鸞釋放尋復逮繫有感忽憶去年今日秋犴狴同得荷天休暫歸故里觀三徑傳播綸音到九州明主心無偏好惡小臣罪未了幽囚有時曠蕩恩還下稽首遙辭五鳳樓詔獄言别逢君傾倒此衷誠追憶平生契合情心為綱常千古重言因忠鯁一身輕同來被逮春光暖此去垂綸洨水清千里神交勞夢寐蒲臺曉月見髙明許由巢父二人皆唐堯時髙士也與後世身陷縲絏者相去不啻萬世傳稱棄瓢飲犢事皆未知有無昨夜夢入其廟中見二人像欣然有感題詩壁上未就而覺乃足成之甲辰九月二十二日書于獄中遭逢世道是升平髙尚同將天下輕樹上瓢捐風響定耳邊汚去水流清山中不換冕旒色犢口惟餐芝草英恍惚蕭然祠宇在塵顔羞見二先生哭李石疊傳來凶訃自中州此地哭君欲白頭風雨幾畨入夢寐功名半世屬荒丘五年離别心猶在一代英豪事已休空墮兩行憂國淚柩前一灑意無由秋燕窵窵深髙罪未終思量安得此萍蹤殘生久在天邊繫世故都從眼底空漸覺秋風千路澀還看霜月萬山紅願將國步與民瘼入我皇王所照中重九用杜少陵韻處處重陽今日節年年身傍金吾臺風吹短髮囚巾冷酒破憂時懷抱開世上感多誰應少眼前暑去又寒來丈夫一念真機在豈效牛山悲老催除夕遙想去年此日新臘殘復見舊光隂慨時秪向人偏切抱痛誰知我獨深一片春暉成慘景數聲鳴鳥是悲音眼前蹤迹今猶在淚灑衾裳不自禁幽纍屈指兩年餘還遇更新除舊時寒去今宵猶有滯春來明旦總無私江湖廊廟人人樂柏酒椒盤處處宜忽憶山林同守嵗村醅一二老相知送人共處憂虞冬復冬而今君去我誰宗風寒谷岸松猶翠日淡城頭雪未溶杳杳鄉關幾萬里茫茫天地一孤蹤安能將此别離淚一灑淋漓到九重楊忠介集卷十

body:
  text: 楊忠介集巻十二明楊爵撰七言絶句一讀微子篇開巻悠悠憶昔賢知將人事委蒼天千年王子憂心在老淚而今墮簡編夜初半窓月色下長宵照此無窮客慮遙最是感悽一段意北風落木夜蕭蕭聞説赤肚仙口號跳落深坑已數年纔知半世總狂顛幾時抛却人間事去到密雲學浪仙謝郭平安惠衣賜服見君憐我深范滂感愧故人心圜中縱有孤臣淚珍重不教沾素襟遣興五首白日回光迷遠山風煙薄暮早春寒幾迴點檢纍臣罪一疏欲期天下安十載幽溪把釣竿却教桎梏倚門闌葛藟滅頂皆天降事到今朝死亦安桎梏真知行路難况逢九九有餘寒忠猷總是邦家慮死亦今朝心自安但為當年恥素餐反成世事日艱難而今死事得其所歸到黄泉心始安幽囚罪是吐忠肝日見邏人向北探聖主無勞關慮切微臣不以死為難題扇適得天邊月半輪將來故作手中珍但看一陣淸風起掃盡中原萬里塵贈蘇廷詔五首望斷長燕萬里深思君不見淚沾襟高情為我還甘罪至死難忘今日心罪出經年憐我深要存男子此胸襟聞言廢食更流淚是我懷君一念心數載幽幽獄戸深相逢更得好胸襟要將爾我今朝事説與兒孫記在心憶昔相逢幽陷深各將國淚洒裳襟我無孟博澄淸志君有西川豪杰心悄悄獨憐我罪深淵思自慰此愁襟昊天肯弔蒼生命鑒此人臣日夜心人有犯晴川者以此慰之一片西飛一片東浮雲終不礙長空人間變態閒來往何與無涯胸度中六月六日六月六日殺蠧蟲無衣可出哭吾窮聊將囚板堦前曬一物光輝與世同嘉靖乙巳年八月十二日出獄歸九月十一日復逮繫途次有作白衣黒馬出鄉城飲餞多君揮淚情世上誰無生死路不須分袂歎危行漂零四海一孤蹤眼底顛危悲路窮共説君恩天浩蕩還期故里再相逢涉險猶餘詩興狂囘頭馬上别金陽李驛丞號也平生胸次他無慮一念還為天下傷遙向北邙哭范滂皇綱復為漢人傷諸賢不向幽中死剖柱心無符後殃三木如堪及俊良殺身不必慮深長投屍近有黄河在誰肯將來𦵏首陽謁夷齊祠孟津河下謁夷齊悽愴風霜盈陌衢願借首陽方丈處藏吾天地一殘軀晨朝停馬拜荒祠想見當年叩諫時却笑史遷傳謬罔武王安肯遽兵之謁比干祠人心天意轉岐豳夫子安能不殺身一死祗將殷祀絶空教千古弔三仁謁羑里祠後天剖破見精深都是周王至徳心拜罷遺容思往事直教客淚滿裳襟澠池道中西風落日滿塵埃秦趙功名餘草萊廉弱藺强皆國士自能羞上㑹盟臺奮身秦館志難移共羨相如智勇奇四十萬人同日死徒藏楚寶欲何為遣偲男歸秦汝自燕山歸雍州臨行不免淚雙流逢人便冩康寧信寛我囚中一念憂父已六年同楚縶兒今三試佩吳鈎吾家不說諂時話但向平平路上求乙巳年十月二十五日夜復入獄詠栢一絶反身未了他年罪樂土還逢今日安慰爾耐寒庭下栢主人依舊又來看葵初出二絶真品終難混草萊幾叢都是去年栽愁中偏有賞花興早把赤心為我開天然根榦異蒿萊毎藉春深夜露栽我去應無人㑹賞徒傾一點與誰開拄杖笻竹由來本性輕耐寒耐暑始堪成得君今日為同伴特地扶吾暫獨行直幹元來不尚文平生羞與鬼薪羣諫官得爾成相輔踏破恒山萬里雲秋日十咏露冷風涼秋漸深塞天猶繫白頭吟已知憂國非吾事有感還餘惻惻心不堪秋草與秋風又把流光易此中萬里君門皇路在一身罪難幾時終年來欲與世相忘轉覺幽懷百慮長延頸九重天外遠難將一念悟君王復驚一葉墜庭前坐惜年華雙鬢顛多罪殘身忘是我邇來都付與蒼天風落庭柯又是秋有時樂在有時憂欲為萬里朋遊告歸鴈還遲塞上留忽驚塞鴈報淸秋困裏帛書肯寄不雲外長風吹六翮一飛千里到西周寒蛬蚤已到幽牀梧葉枝頭幾箇黄淸晝半陰雲忽忽幾人能解此悽涼繞塞西風白露天萬山黄葉落翩翩穿窗日影無私照一隙常來到臥邊五十餘年人世事此間白髮幾經秋不知淫雨煙波上誰去乘風泛栢舟看開宇宙誰人事白晝天涯此日頭鴈過故驚囚榻夢一聲涼夜送高秋秋夜同劉晴川觀月淸光一片露雲端拱立圜階心未闌來歲今宵逢此月恐無良友共相看長空初夜靜霏微轉步却將心事違共説不妨幽户掩隔窗點點是淸輝萬古得天照宇寰秋林輝色動燕山疎窗半隙即全體照到吾心方寸間秋燕辭社還尋高處藏留予常繫五雲鄉時來時去天機在羨爾一雙羽翼長送高大觀年兄出獄用其留别韻别念關心淚欲流送君出險我還留要知今日嚬眉意不是尋常生死愁丙午秋七月朔夜夢友人王泉岡張東臺總是髫年夙分投神遊萬里自相求不知吾友今宵夢亦得須臾相遇不不斷懸懸故舊情夢中攜手與同行覺來展轉增悽愴門外鈴聲報五更暫合還離一旦情郊原哭送我東行年來憂患催人老雙鬢而今已變更去年送我出城東轉隔關山千萬重幽地此時空念切只教夢裏暫相逢答友人忽天章遼東作斷事困裏風霜幾度侵多君不替故人心遼陽極目關河杳讀罷音書淚滿襟病中人有以詩喻使寛鄙懷者次其韻答之數月言官恥素餐殺身今日有何難包荒自是男兒事肯不同天一様寛日午纔將數粒餐來之坎坎豈為難眼中視此容身處同彼霄壤無限寛春日十二首乾坤無處不淸明竚立間看燕羽輕一念孤懷酬聖主百年人物此殘生窗間舒日漸融融曳杖逍遙百慮空千古吾心誰樂與首陽花草自春風雨霽春郊秀女蘿閒雲偏惹落霞多南鴻一羽衝寒峭萬里長空晩獨過陽和到處總無垠老榦蒼柯向月新莫到幽囚空歲月東風還有去年心柝聲急處鴈聲高門掩圜燈夜寂寥念此天涯歸路杳誰將一段楚魂招雲掩燕山接地陰霈城新雨細􅀢􅀢即看宇宙均生意識得乾坤作用心遲日幽圜春又深閒聽燕語散愁襟自知一息延朝暮到此還餘憂世心四年多罪鎖危垣驚眼金吾春草蕃一點孤忠應未死君王恰有好殊恩簷頭對雨雨蕭蕭牆内葵心牆外桃日暮東風惆悵處閒看林鳥各歸巢十載憂時一念深竟成身世此浮沈斜陽滿目蕭條事冩作長歌次第吟萋萋幽草映圜堦羨爾逢春早意諧此日吾生猶未泯且歌愁句散愁懷從此超然脱故吾天空海濶見洪模無容類是假男子有忍方為真丈夫偶興五首幽中莫歎久無家犴户難將國夢遮七載悠悠何所事赤心白髪是生涯欲酌春醅伴此身榻前一盞轉傷神年來警戒非因禍恐致君王殺諫臣風滿圜垣月滿樓吾將風月伴幽囚人機本自天機出解到無思意便投坐對窗風一隙淸人間萬慮總堪輕無端幽鳥閒來往却作愁人深樹鳴一片閒雲遶翠松還成細雨暗千峯此時骨肉遙相見多在㷀㷀客夢中葵花二首園葵新發幾枝紅病裏空懸賞念濃只恐花疑吾不好詩成轉寄藉東風誰把葵栽幽厠中祗慿新雨秀新叢出門欲賞憐多病為問今開幾箇紅有所思當年各為主恩深生者難忘死者心將此滿腔憂世血變成赤淚墮囚襟年年燕塞動悲風應是人心願未終死去果然難遽滅九原還得再相逢獨酌十首春來病未放淸歌惹得春風不甚和偶酌燕山一杯酒滿懷詩興若江河老夫不是愛長歌恐把流光混裏過一嘯胷中無限量古今天地在包羅臥醒還酌兩三巵趕出胷中無限奇便笑古今忙脚者撞來撞去總成癡一寸修為一寸天紛紛誰解此閒年從今莫説癡兒夢囚榻安吾日夜眠男兒寸寸是剛膓要把塵腔百慮忘聊下牆頭一罇酒不妨獨酌對羲皇天地元來只一春春光到處豈無真須判努力將心戒莫作圜中憂世人愁來還要酒消愁到手必須三四甌醉後吟詩詩罷臥風流也屬獄中囚連年病不似今年和煖風光我却眠春到無詩春自去而今要補幾千篇殘春隠隠恰如新老眼渾看見未真更不分天與人異只疑共是一團春陽春幾轉屬艱難未惜空餘兩鬢斑若把皇家元氣論入牢强似入深山遣懷四首故園獨此念殘春無奈憂危此一身莫怪片言千百死從來蹇蹇屬王臣自來幽陷幾風霜憂切空餘兩鬢蒼故惜殘軀非我意恐成一死累君王春去還留此喘餘勞心空把百年虛有時不禁傷懷切萬里家鄉一片書一時感激切憂勞便欲捐軀報聖朝此日孤懐徒耿耿九重不啻九天高送耿良弼與子交遊不計年吳山當日杏花天官貧消息幾年絶忽喜音書到臥邊七載幽窗與世忘故人感激意偏長聖明未肯殺忠直早晩吾將歸故鄉蝴蝶夢中五十年將身但合老林泉冥行走入深坑裏空負良朋意戚然千里風塵到帝鄉懸懸念我我心傷喬陵安得還相遇共醉桃花流水旁偶有感吾狂歲歲繫燕臺一盞濁醪百慮開醉後自忘安險處誤將囚所作蓬萊吾衰久不念東周那惜斑毛出鬢頭海宇昇平天自造可能一手障狂流吾心原未解深思宇宙安能獨任之力薄不堪身萬死疎愚空使後人嗤老夫經歲臥幽窗慨世憂時念益長白日似憐吾寂寞故從小隙放餘光當年祗抱素餐羞一日疎狂七載囚安得此時廊廟上有人聊為我皇憂遣懷霧斷長天萬里空邅迴日暮倚東風紛如自是人間事不介悠然胷次中雪茶霧後飛來滿太空巧將輕片舞條風六花烹作六安水瑞氣都留玉盞中殘雪瑤花不但遍燕山幽地虚池總一般只恐春風吹得急徘徊再賞片時間同雲知不再淒淒當午陽暉照故遲賞汝笑無春脚味興來但有感懷詩慰章秀才多難不須日歎嗟男兒身到即為家堦前一片雪融處饒我春深復種瓜去年章生堦前曾種絲瓜送趙大尹出獄我在關西子在東百年適得此相逢從今音問千山隔人世真如一夢中讀蕭處士行狀紛紛落到靜觀中一點浮雲散太空老筆千年心事在未須身後問窮通送人歸秦春到燕臺䇿馬還文旌指日度函關故人若問圜中興道與山林總一般送緒山出獄每道别離今果離是誰懽喜是誰悲共將心事常相憶記我丁寧四首詩兩共幽圜霜雪寒而今離别要相歡願君分袂毅然去莫向鐡門回首看二載相逢一旦離徘徊孰令我心悲此時此地真難得説與兒孫世講之寄偲母偕老糟糠重徳音圜門無奈兩年深寄來秦樹三囊棗見汝憂勤一段心送張本禮歸鄉弱冠交遊三十年乃今如此共天邊送行詩自獄中冩安得不令我惻然送君不肯淚漣漣知為男兒心志堅歸去友人來訊問道吾長夜已三年目斷秋雲遠盍簪側身西望淚沾襟再將半紙新詩出冩我留連不盡心哭翟尚書哭罷浦周已二年悲懷今日復澘然兩行出自中心淚一洒尚書柩板前補衣口號次晴川公韻夜補囚衣晝可穿知君手段自心傳成周誰是真男子千古人誇山甫賢㑹補清霄神慢穿昔人妙訣己無傳高高在上真難措煉石惟聞媧氏賢楊忠介集巻十二

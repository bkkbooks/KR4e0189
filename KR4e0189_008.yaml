body:
  text: 楊忠介集卷八明楊爵撰賦夢遊山賦峕和煦以轉泰兮歲惟丁夫壬寅豫倣佛於夢中兮夢歸遊於咸秦歷韓魏之故疆兮泛柏舟於渭濱浮䫻􅂒以逺覽兮暫憩夫山之危岑乃吳嶽之崔嵬而秀麗兮古號曰西雍之鎮峯突兀以峻出兮勢若連乎霄辰石巉巖以峻嶒兮百壑砑其嶙峋風習習以清和兮迹逈脫於世塵草與木森森而夭喬兮秀雲邊其苯䔿鳥與獸蹌蹌而頡頏兮若解意以相馴豫乃采芝蘭以聊茹兮氣和煦而苾芬把清泉以時酌兮蕩吾夙昔之塵襟忽回顧以寥廓兮百峯羅翼其共臨俯仰豫長嘯而朗吟兮髙胸次以樂真山有廟焉迤邐其麓之東南兮以時妥侑乎嶽神棟宇苞翬其壯固兮丹青煥乎其惟新背􅑬嵼而面涇渭兮延廣袤其幽沉古取夫萃與渙之大義兮儼嶽像以獨尊豫乃肅容儀以瞻拜兮心栗祗其快覩復長跽而祝之曰惟明神其監觀于下土以大義而降禎祥與妖孽兮斯固無幽而不燭夫何世事之紛紛乃有稽典訓而不類兮固豫中心其眩貿豫敢筮遊衍而不豫隱兮願得夫豫奪之微故惟豫小子之有生兮何不辰而遭世風波灑憂時之血忱而貞志於孚先兮固久罹於窞坷時省愆而思咎兮求不忝於屋漏於歲月之陽春兮今已兩過念豫總角而志學兮每矢心以克邁嚴步履以出户兮敢斯須而或怠景先哲以周旋而與歸兮忽凶害焉其顯崇固豫小子反復思之而莫知其謂也語畢悽慘流淚澘然傴僂伏俯聽神所言惟神辴爾而有聲兮復喟然其長嘆曰嗚呼來汝小子是爾之愆爾不聞曲其躬而圓其行兮取封侯以相先或有貞直方而末少回兮死固不免於道邊當行而吾行之兮當止而即止斯先達之明訓而可敬服兮胡不珍身而量處道固不能無消息兮感斯有常而有不苟相幾而或少戾兮夫孰與禍災而自取惟明哲之見髙一世兮動自逺於坎坷識隱機而尚肥遁兮泛長江之一舸乃有迷檢括而允諧兮拂潛晦以自頥衒崑山之良璧兮人共惜夫楚和履大間而不苟措兮固自謂世所尚也當枘鑿之不類而欲強置兮孰不指身心以為訛嗚呼小子而今後其尚亹亹焉以克勵未可以一蹶而遽挫思福堂之玉汝於成兮方一念之偏頗惟古良士之堅志於患難兮日尚友以切磋寧雉介之耿於羅網兮勿狡兔其爰爰寧松柏挺挺於歲寒兮勿桃李其灼灼何所往而非吾可安之地兮慎無怵中而懷憂彼皇矣之全賦於有生之初兮惟反身而是求聽吾誨爾之諄諄兮尚不忝於前修苟迷途其終不悟兮乃脂韋以自羞豫乃再拜稽首而起應噍噍其未已將周旋以出户忽驚諤以覺悟時東方之既晨愧絲粟於枕衾嗚呼天耶神耶教戒􅈤切誠可信而可遵大道坦坦而無曲兮固不越乎吾之心四言古詩偶作颯颯西風悠悠危困霧掩長空懷此憂疢我生尚有我心難忍告爾君子不可不慎天方威降無滋幽釁颯颯西風悠悠危困我生不辰遭此難屯告爾君子胡不自盡拯溺救焚伊誰之人天方降威無為顛震颯颯西風悠悠危困自昔以來貽我煩悶告爾君子各宜履順誤國之謀伐國之刃天禍方殷無惜憂瘽颯颯西風悠悠危困我心日憂我淚日抆蒼天蒼天胡降厄運謀猷乖離而日以甚抱此赤心徒爾諄諄何以圖之周道惟近騏驥惟良莫耶非鈍聽無不聰視無或瞬各欲事天豈敢相迿我為爾謀爾無不信西風五章章十句五言古風感懷志士輕天下不類世人情由來守之固出自見之明時哉誠可尚古今不易真緬懷千載上愧此魯連生存趙片言重却秦天下驚腳跟髙蹈處無陂總是平次杜少陵韻答人殘息悠悠在真成一懦夫當年何所為心欲見唐虞世路豈翻覆人為自險夷好生與惡死此念胸中知采葵山中惜歲月日暮采園葵采之何所用欲以贈相知相知相去逺道路多阻蹇安得藉晨風萬里寄誠懇四丁寧贈錢員外緒山留心剪枝葉枝葉更穠鮮努力勤于耒共耕方寸田吉人常默默浮士好便便覺彼髙騰處反將真意撁昊天但覆幬四運自周旋孔聖無言教真機向此傳丁寧一告語告以聖同天結交結君子茅茹自相連媚悅增心癖孰能示我愆相同即是聖異處且為賢以此求斯道恐成狹且偏心能樂取善善自我心全舍己從人處襟懷何大焉丁寧再告語無我自天然迂儒多曲語壯士自平夷千古周行在胡為向小歧荆榛不自剪令我此心迷洞識虛明體超然即在兹性分同一理此理最淵微孔聖言仁處力行不逺而丁寧三告語相與憶所之尚友希前哲無勞辨淺深開言動喋喋矛戟已森森祗覺胸懷隘恐非畜德心古人各有見原本自相忱豈若異流者馳騁多詖淫何苦但永矢宜從得處尋丁寧四告語共嚴此心針贈人先生藏逺趨微原欲探討仁風秀羣英禮化淑懷抱講堂逍遙處相與篤皇道芹宮滋松華泮池潤瑤草瑤草日日長松華歲歲好君子尚采采襟佩以為寶哭薑義泉郎中公諱時和前日哭尚書今日哭郎中大夫相繼死應時命之窮但擬同出險豈堪忽告終將吾一掬淚頻灑與西風二吾痛翟司馬又哭薑義泉人生值變故與世自相關義泉死今日司馬肉未寒義泉瘞今日司馬殯未乾桎梏非自取幾微隱禍端悠悠天地裏展轉屬艱難中秋懷友寂寞今宵景還如去歲秋美人消息逺令我心悠悠吳水東流去秦山不可求想君談道處念此日幽囚二礙彼清霄月停空有片雲懸吾方寸地文武趙將軍咫尺燕山側常如萬里分艱危知善處君子自相羣五言律詩雜興鴈羽衝雲去燕山春意濃孤蹤一路險衰鬢兩邊蓬戢步緣新緑依隈挹暖風將吾眼底事都付不言中二地隱春遲到幽懷更耐看鴈聲愁逺塞雲影滯餘寒斗笠營秦隴絲綸坐渭竿而今耕釣手梏械亦相安三我心誠匪鑒遺恨在雲壤豈但身憂切更餘國慮長九重終自悟一飯亦難忘只恐建炎詔徒憐陳少陽四身危非所恤多罪纍君王萬古綱常理一軀忠義腸青天掩長霧白日下繁霜兒女此時淚未知為國傷即事百年吾宇宙萬里此相逢厄險情猶適經綸志復同隙風動颯颯窗月照肜肜對榻間談後悠然世慮空二衰危親杖屨步履轉倣徨地作臨池濕天從入夜涼清飈輕燕室雲影暗幽堂孤念蕭蕭在間同歲月長三結髮交遊好同舟涉渭濱壯懷今若此老淚更堪瞋險地忙為苦長天去是真知從大夢裏自了百年身獄中慰章秀才萬事總由命宜須安受之但求一念是莫嘆百憂罹窘迫宜自處將來做廣居樂天境界上得到是男兒有報周磧山先生家慮於獄中者痛而作此一朝君即死七載我猶生秪墮萬人淚空留百世名乾坤藏正氣日月照精誠展轉思餘喘真如草芥輕勉仕男讀書長路頻來往空將歲月虛百為超俗慮一步到天初只使心無蠧何須食有魚燕山二尺屋可讀五車書二憂國吾遭難思親汝復來青天何易蔽赤霧總難開萬里豺狼路千尋枳棘臺要知百死地不是一身災有感八首燕語遺窗外薰風入臥邊真懷死難易歲序幾經遷國步終成躓雙毛半已顛獨憐憂世念空自九重懸二期親堂上老逰子淚澘然假寐驚還起餘生死復延腳跟總實地屋隙是晴天骨肉心難遏朝朝百慮牽三老去心猶壯詩成一灑然襟懷羞縷縷風景嘆年年佇立凶危地出王日夜天死亡誠旦暮終不受人憐四憶昔躬耕日蓬廬夢九州握珠雖易出按劍總難投草芥生猶在君王尚逺謀古來殺諫士誰可免多憂五好景隨時在幽人心自如難將當世事得免動相於總是更新念還能展舊書古人心已逝誰共嘆離居六殘雨急聲住窗風更覺新獨憐幽景暮空抱此心真跬步萬方足經年百死身每憂深罪裏無以答蒼旻七庭院幽沉處黃鸝聲自和炎風侵夏木世道轉頽波夙志逢時健韶灮雙鬢皤如何人世上獨我憂心多八有時樂興至觸目更憂來時覺寸心鬱未能盡日開人謀尚消息天意自安排將此百年志空餘萬慮灰聞黃鳥庭柯鳴歲月又是一畨新憂世總宜獄感時却憶秦早梅乘暮雨佳木秀溪濱茅屋逺塵迹空遺老此身送忽百行忽生遙以慰五日是歸期倚劍無歧路佇雲有舊思自吾蒙困難於子始真知人世關情處難為此别離遣仕男歸家骨肉分離久殷憂切寸忱兒無膝下苦父有坎中深顧此五年困皆吾三代心一升與一降物運此相尋謝信官患難人多畏信郎獨不疑再從牌上寫曩在手中提每日多君厚經年濟我飢老夫窮困裏報汝一聨詩懷友圜中春早到含淚送心知何處相思切歸來獨坐時詩書還有分患難總無期俯仰千年事哲人若在兹二相逢在縲絏歲序兩推移論難思洪古胸懷各洞披朝朝同暮暮切切與偲偲音容今萬里西望日嗟咨三憂時同講道發興共聨詩而我相逢久真為人世奇窮通忘苦樂聚散有歡悲無奈此心切長歌衍浩思送尹商衡都黃門出獄公諱為相數月同幽難一朝慨别離送行無喜色居險有憂思好結詩書伴不為貧賤移山林吾素志應筮丈夫需商衡獄中筮得損之需二需極乘時起文明及早開經猷小自預功業大期來氣運機方動人謀預可回兩肩剛骨上缺三才哭翟尚書公諱鸞號聨峯昨夕云長别今晨餘一丘身亡及此地國步為分憂一品恩猶在百年事已休圜階遙拜下雙淚不能收二人世誰無死哭君吾倍傷大臣屬手足司馬近簾堂豈意履危險錯思銘太常尸留獄户外殘藁蔽斜陽送人出獄昨暮動相問今朝奈子何别懷增慷慨回首欲滂沱一隙蒼天在百年憂境多共憐宇宙內世道類江河書聨翁病中屬言後最可傷心處身危及犴圜青天臨潞水白日照燕山各有險夷路誰無生死關老翁書片紙流淚不能看雜咏悠悠蒙大難歲月總無涯憂世多君慮好音向我懷浩然揮翰思儼若定心齋三接咸亨泰欣瞻白玉階又鵾鵬離楚水舒翼到燕臺世道同文運金吾久已開寵從天上降人是謫仙才還喜新榮後恩光次第來謝人餽桃念此幽囚久相逢獨見真論心許忠孝於義多君臣良士輕聲譽哲人重保身投桃知子厚報李愧豫貧贈薑義泉義泉未病時自謂將緣事出獄索詩以贈之過數日病二十日即死命也十年交與後此地復相逢安土心猶在匡時志已窮君當耕蜀下吾欲死圜中樂道捐軀處無言迹未同哭西村楊御史夫子今長逝感懷可若何蒼天奪善類人世亦浮波九陌青驄頌千山輀柩過友朋知痛汝幽地淚偏多五言排律冬月都憲李石疊來訪見子弟輩衣服單寒近午未飯感嘆不已作此解之吾家生計窄嵗嵗慣飢寒薄午煙方舉隆冬布不完三旬九遇食十載一加冠堅讀吾由命長貧汝自安但看顔氏子陋巷樂瓢簞五言絶句懷緒山無限停雲思悠悠興欲飛仰看向南鵲繞樹竟何依二不見緒山子年光忽四周隨風秋夜夢直到越江頭三宇宙相同意越江萬里深東方欲曙色畫角動悲音四江邊尋至樂回首覺憂思宇宙皆吾事心寧不在兹五殘屋食不足扁舟樂有餘北風如解意寄我常相思病起病起餘新興殘磚藉簡編不知從此後再得幾殘年二一片韓山石千年臥荒草崚嶙何所前落日牛羊道三南風乘隙入吹破幽人悶簷外鳥聲和一般成四韻有感乍雨噴聲歇間雲落影空滿懷今日意都付與東風與男詩知子讀親詩難禁雙淚垂君臣與父子忠孝兩得之有報周迹山卒獄中痛而作此天上列星墜人間草木愁滿腔都是淚只向暗中流過軒轅廟初古混沌裏開天有至人衣裳成世道兵刃蕩妖淫龍去羣臣泣功臨下土尊唐虞享大化聖聖與神神過淮隂祠落日蒼山道淮隂祠下過禍生齊境土功在漢山河野鳥啼新樹殘煙帶薜蘿英雄千古淚汾水一添波過柏井柏井蒼崖到懸懸引斾長殘煙身未斷亂石巧相當松秀春鳥叫山空野草芳井陘今又近先慮馬蹄傷竹花同池竹花同池生何人知有情花繁滿髙枝灼灼驚人目竹若􅀈龍形蒼顔微帶菉花常頭上紅竹常地下仆顯晦各有時愛憎若不足觱發送寒霜青青惟有竹送麻太守出獄喜君歸田里况是獄中心田里有真樂君宜仔細尋喜君歸田里况是獄中情田里有真樂非君莫以明喜君歸田里况是獄中人安得同君去超然逺世塵秋雨歌送王生行往時逢君雪霏霏而今再逢雨瀰瀰天涯歲月驚迅速倐忽春雪轉秋雨秀彼幽隅苞桑枝我獨樂此之無知王生幸來同解意轉看又是相别期秋雨秋聲寒將至郊原百卉色凋悴祗見繁花畏風霜惟有長松挺挺翠憶昔豪士此心多感慨將來為子歌告别各懷情綣綣相逢但記雨滂沱吁嗟王生也吾今奈子欲去何寬心歌此間莫怪會寬心好向先民樂處尋尋得一分消百慮男兒何處不寬心此間莫怪會寬心靜眼能觀古與今成雨成雲他自有男兒何處不寬心此間莫怪會寬心善到居安根自深一點天真含萬物男兒何處不寬心此間莫怪會寬心參透一陽與一隂要了無窮人世事男兒何處不寬心髙歌問豫何事日髙歌只恐胸中他慮多間事愁人人易老得髙歌處且髙歌問豫何事日髙歌眼底紛紛將奈何一曲不知天地大得髙歌處且髙歌問豫何事日髙歌困裏光隂恐易過宇宙和平方寸地得髙歌處且髙歌問豫何事日髙歌聲響悠然即太和心到忘機是真樂得髙歌處且髙歌謁孔明廟逺結茅廬野水濱幾翻風雨秀荆榛敝門晝掩髙千古愧我青巾多路塵疏林野鳥數聲鳴想見當年泌水情世主肯勤三聘禮先生有意在蒼生送李金陽驛丞故人别後已三年萬里音書一念牽安得生還吾與汝美原同醉杏花天聞梟鳴往古來今善可行人生世上事分明吉凶由命皆前定任汝嘵嘵徹夜鳴過淮隂祠遙憶當年拒蒯生將軍心事自分明可憐宇宙無窮恨盡在中宵悲樹聲又酈生終把蒯生缺君臣况可憂分土雖知羞絳灌抽身何不效留侯荒祠空灑英雄淚青簡還多信史收百戰功勞千古恨凄風落葉暮山秋楊忠介集卷八

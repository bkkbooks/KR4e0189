body:
  text: 楊忠介集卷五明楊爵撰家書一則休偲我今日患難關世道之升降天下之安危不是一身一家小小利害大丈夫志在天下國家不以生死存亡為念但爾兒女子之情不能自已然亦徒憂無益皇天鍳我𠂻曲主上必能寬我罪過决不至死況此間做官者皆是好人履道德講仁義者也豈肯置我于死汙青史為子孫纍哉你告叔祖母與你母閣門大小并諸親眷大放寬心二則仕你今在寺中想已自知道人事蚤晚勤力不肯懶惰我又與你說凡勤苦用功須是自己心上開灑樂欲如此方有進益學問必有辛勤方能有成況你資性不如人比人又當加功與人相處須要忠信謙遜為主見長者尤當十分恭敬讀講有疑當靜坐思之在先生朋友前又當虛己質問不要以問人為羞心有所疑不問豈能知世上有一樣人心上不知以問人又恐人笑這樣人終不能成凡幼而不能事長賤而不能事貴不肖而不能事賢此三者古人謂之不祥你深思此三句不要略有傲慢人的心若讀書多記不得不要貪多只貪熟數日將所作文字寫來我看遇濟衆便寫手字來王貢㑹作文否此帖你常看勿棄三則偲我平安勿憂前見你書中有流涕禱神卜卦等語兒何須如此苦也吉凶禍福何者而非命乎語曰不知命無以為君子也吾今日素患難行乎患難不怨不尤樂天知命無入而不自得此處心處身之道也其困我之心衡我之慮增益我所不能是吾之吉與福而非凶禍也況主上聖明自有逺見自有寬處亦何憂而何慮乎古之良士有仁人君子之德有忠臣義士之心有英雄豪傑之才兒當以此自勉勵自期待而能立身于天地之間可也閉戶不出慎爾身心密爾功課每讀古人言語與吾心所存吾身所行何如此便是學問之道也今而後或有所作得便送我觀之嘗寫家書告我平安令家中勿憂凡我書帖有可以帶去者示汝休兄知之四則我獄中平安百凡無慮但叔祖母年過八十在世光陰有限恐我不得一見日夜關心末忘今囑咐舜卿向北山中或托楊鳯兄弟買柏樹一株預備棺木可以少安我心舜卿千萬處之舍兒今年十二嵗矣我前日問仕他讀書何如仕答言將來可成偲為用心教他讀書千萬不要悮了千萬不要悮了若悮此兒不得成一好人我他日死無面目見汝伯父于地下也千萬體我之心七月初二日家書八月初九日到內偲疾病用心調理不必憂慮許党書亦到光景易失少壯易老百年人世不可不自立也危困中以此勉勵凡吾昔年共處有志之士各宜警省李月亦有書謂我有時復到秦地蓬頭赤腳歸終南讀之不覺感傷嗟夫月為此言胸中亦有識見矣不知上天鍳我生還故里果得蓬頭赤腳以歸終南乎言至於此不能不戚戚也說偲與休善相處再無所言五則休偲我下獄十有四月矣飲食如常身無一日不安心無一日不寬時讀易靜中覺有進益錢郎中自去年九月下獄嘗與論易春秋固甚樂也家中大小并諸親朋勿憂休考試如何當翻然省悟謝絶人事専志學問偲可讀五經白文又要專心下苦不如是不能成也舍兒送五欽處讀書并張禹卿皆不要悮了田􅀈無人講論可親近繇天性必有進益甚勿離羣索居虛玩嵗月石巍恪守規矩學一謹厚君子用心讀書勿憂不進學也家事如常處之門户謹慎夜間不要飲酒說與你母前祖母年老不知安康何如日加忠敬第四女子勿輕易許人須待稍長地方收成未知何如汝輩隨時節儉鄉黨老少皆以禮讓相處慎勿傲惰學中師長時進恭敬不可得罪縣上非公事不要見謁千萬千萬六則書告休偲我逮獄一年餘神天保佑日獲平康在內亦無甚苦楚但暗中靜坐持養心性求無愧于屋漏而已矣汝家中大小及諸親眷大放寬心可無一㸃憂患也前祖母年老我心時嘗憂念家下善事之說與你母家事奈心寬處又恐你兄弟不學好人動相猜忌以目前小事忘我大難貽逺邇士大夫之笑汝宜深省我以盡忠修職為國為民至於如此心懷囂囂誠無悔憾汝輩若以我為過而怨尤不已則浦道長周主政二先生以我之過而至于死彼何人也彼何心也為人臣子苟祿苟位不以君民為心則穿窬鄙夫與草木同腐天地間無容身之地矣汝輩宜自安也七則我處此地二十四月矣心無一日不寬身無一日不安皇天保佑朝廷恩德飲食多加筋力强健倍于往時惟念我嬸母年過八十暮景已迫恐我未得一見不知蒼蒼中何如以定我也汝輩率諸幼勤力學問勉自修飭為君子人以自立于人世切不可以目前小計忘汝終身之大謀若諸幼中有一人能成立者皆是汝之骨肉其為門閭身家之慶祖宗後輩之光非小益也故我諄諄告語皆為汝曹深逺之慮非為我目前計也又千萬說與你母親家中大小俱要以恩愛和睦體悉相處共安窮分甚不可猜忌不和不成一家好人家以貽逺近之笑能從我言我雖死于獄中亦無恨也張侗歸寫此為闔門之戒體我心體我心兩次夢見偲作文數篇與我看甚是佳美想今已能勉力讀書汝休兄在此我凡事甚便家中無憂十二月十一日辰時書今日所寄家信貼在內室正墻上宣讀數遍令家下大小皆知之千萬千萬八則你兄弟須要恭敬相處但知骨肉當厚勿問其他詩經棠棣一篇竝注解熟讀之必有感悟處至此不肖真下愚也念汝伯父蚤世我心痛傷言及于此流淚如雨闕偲專心讀書財利分心所當戒囑咐不盡九則闕十則偲你決勿來此只有舜卿足矣家中不可離人我欲你將舍兒叫在你身邊讀書勿使離你左右解衣衣之推食食之不知你肯依我言乎如不能令仕帶蒲城處你供柴米你有廩祿分些供一無依孤弟亦是士子的立身他幼小不要見他不是如休者可謂祖宗無窮之辱子子孫孫萬世之恥也戒之戒之你若不聽我言苦在後十月十九日父苦心書勿使别人來此徒煩擾萬萬十一則天道甚可畏你前日書來說天何嘗無眼此言最是有當其身即見者有在後世子孫始見者但有遲速讀詩書二經見古人口口只說天道可畏違之便有禍天只在頭上父在陷中如此日夜憂心骨髓都該乾了今七十二箇月存一息不死天豈不照鍳乎如今千言萬語只是恐你家中惹出事來心深憂慮縣上逺避避做秀才不可玷瑕若使人笑之惡之禍立至矣漁石翁昔年我做秀才時他與我說他鄉邦做好秀才的常要防禍稍不防戒就被人害了你先要戒飲酒鄉黨人無正事不要一面相見雖有人尋亦鎖門不出來相見可也必須如此方可免禍鄉黨人有請酒㑹者決勿去決勿去我當時是如此不拘何人雖親自來請亦決勿去萬萬勿去決要知戒仕免拜節禮你若往親戚家飲酒逰樂我實傷心父今日遭在何地你忘我此難是人形像禽獸心也天必誅之買物非十分不得已不要親上市去此便是招禍之地若挾妓飲食放肆不簡天必不容再囑咐你最是作文字可用心勤勤作之心路日開自然知道謹慎舜卿雖久在此待來春我再處你二人一箇也不要來若來我心甚憂不來我在內寬心仕每寫書如何筆迹無光我疑之又多草率舍兒寫書如何不令他寫十二則我平安如常只是近日眼疾文章與你看不得俟再稍來昨王子崇歸具告你以所當盡心的事然其中有早夜不自安的最是叔祖母年九十嵗恐旦暮有不諱之事若終于女家我為子姪者不能與終此事則視之如路人矣我縱有生命出獄有何猪狗面目以見親戚朋友鄉黨鄰里以我為何如人以你母子一家大小為何如人切恐上天必降誅殺使復有異樣的禍事不在我身則在你一家我往時書中無有不與你說此事者想是你只作我是口頭的說話亦莫實心但是要人好聽則我向日說我即害噎食病死在獄中你將我此言不曽與家中說你說我十分忿惱怪罵哩叔祖母不比舊日年極髙此書到即依行勿使我歸來難見人此事關係天理人心甚大若不聽說就與用一口刀殺我一般便是别人家無主的婦人我央煩你亦要替我盡心十三則父在死地上你一家大大小小皆如遭喪事一般才可若是縱肆不知憂慮飲酒為樂此真禽獸猪狗天必殺我天必殺我使害噎食病于獄中尸首化灰不得還鄉你將我此言遍告家中大小人等使他悉聽親戚家有事不要過往遭難事的人他亦不怪家中不要用酒肉待客自逺方來者一飯可也說與仕遇嵗考當時出退了亦必考去不要欺天罔人假以給假看我只在家中暗藏的父今未死人尚將就你若一旦死了你才知事難偲你文字看得你肯用心苦志學好猛省立身考處亦必不在人下昨日經題結尾立意不好再囑咐不要干與縣上一毫事舍兒母子不知今何如舍兒得讀書說起苦痛八月三十日父書仕將我書信收帶身上有人央你說事時你取出令他看此帖皆數層封固八月三十父不斷心又書十四則偲仕你二人都不要來京舜卿在此我心甚安你與家下大小說叔祖母處有一㸃不盡孝心使不自安還到三姑家去天必殺我與我一樣噎食病死獄中尸首不得還家叔祖母年九十嵗就是日夜用心服事再有幾年你將此帖一句句讀與家中大小聽我流淚寫的話不是假文飾說話你決不要給假來此昨日不可另考此大差了你不要與無賴輩飲酒當各齊戒修省收心才知我言是十五則休偲知我平安如常無可憂慮叔祖母安康如何你母多病與他說無憂凡事有命近來士夫下獄多凶翟尚書姜郎中相繼死姜死時我又親為著衣又有科道官五人幸皆出矣止我三人同處可見吉凶禍福皆有定數不能易也你等安貧守分縣上慎勿干謁如夫役之類或賜及亦當辭之此皆分外之物身家之災也此言須聽不可忽略以自損你仕讀書事他若心上有一㸃明處當寢不安席如昏昧不省則休之類也我言之何益此處留舜卿足矣再勿使人來往時文字慎收之勿示人你當深思我在罪難中久此宜祕藏天夀伯父任車等賜盤費多謝你外祖父并諸親朋不能一一致書舍兒母子不知得所乎兒輩當體我心縣上學中書二封月送之鄉黨鄰里好相處凡事讓人十六則上闕求放心勉學問留心事業以古人自期則病自愈矣若夫宴安浮沉則筋骸涣散志氣昏惑無病亦似有病君子莊敬則日强安肆則日偷古人此語最冝潜玩我之患難或吉或凶自有一定之命不必憂慮早求立身便是安我心處使我數年前以病死家中汝當奈何況天地間無不死之人無不化之物豈獨囚繫中能死人乎說與汝母叔祖母處盡心孝敬前日囑咐舜卿買柏樹宜早處之慎勿吝嗇舍兒勿悮讀書夜服勿令破碎當與喜康一般看待此便是存好心修好行回天意以消災變之一端也若懵然不加修省將來天罰之極又不知何如也十七則有闕文上闕不立志雖稟賦闕清新豈是下愚但因我罪難奔走流離于道路以致荒廢真可惜也雖然自今若能奮勵不息勉勉循循數年功夫可以有成孔子曰君子上達小人下達蓋君子能立志向學必要做好事必要習好人一切流俗所尚皆不屑為故心路開發一日明似一日一日高似一日未有不上達者也小人不肯學好溺于流俗不自振拔故一日卑似一日一日昏似一日未有不下達也你當勉力學好勿自怠惰孟子曰人皆可以為堯舜此一句最能起發人心志十八則家書到獄中我讀之流涕不能已何為人事之變至于此也􅀈你疾病既好努力學問無負青年不必來京學校中不得方便又至此亦不得一相見徒往徒來使人多增流涕而已遇便人常寫手字與我便是你之心也與人相處務崇謙讓寫周易謙卦一篇貼置坐隅可以消不平之氣增和厚之德也你前與我書未見到不知何人帶昨日闕篇言言都是肝膽都是淚迹痛心萬萬不能盡言李子實書亦到前程得今宜閉門自修教子姪輩讀書鄉里親人酒㑹不必與以逺避是非可也見時以我此言相告不及另書再告􅀈甥今宜尋好人同處講論勿在家中恐鬱鬱獨處中無所發明心地安得開廣王汝欲若教人當從講之十九則再說與偲三十年前好用功你當勉之夜親燈火勿過飲酒你終身事業在何處思念到此自當警惕我患難亦勿過于憂思大抵今日之事非一身一家之禍乃關于時政得失世運升降天下國家之治忽乃天運常數非人力所能與智者可以勘破矣如葉公者得罪之深淺比于我何如今山東試録在你觀之便見乃倏焉以殞其生矣禍福吉凶自有造物者主之人當力修善道以順受之他何與焉禹卿與仕學俱頗進誼寫字端正想是文路亦通仕寫字尤好禹卿歸圖考家中與他盤費勿令難若得進學學中禮物之類家中亦與處之亦是我之慶也不必吝惜既進後給假復來與誼贈言你當觀之處身之道亦略具矣古人有唾面自乾者有悮認其車上牛不與計較者有以麥舟助人喪葬者這樣意味才好才是大丈夫胸襟兒當思之許党及一時同處者不能一一致書宜各自努力無虛日困中作浦周葉三子傳成未謄真待寫出寄你又欲作葉烈婦傳正月二十八日午間書遇便人常寫書與我二十則有闕文上闕劉周二公同飯亦甚便近日濟衆亦間送無有不通者此等屑小事不必著意五年間嘗說飲食不通何嘗有不通乎闕你二人讀書無人講解你張師逺近何如得便否乎如不便即告我我煩榮伯為你處之仕昨日所言多是吏人弊不要過疑亦不要告家下仰賴神天保佑你等學問有成家門無窮之慶也此等小事付之一笑何足掛慮當學古人心胸瀟然塵表視天下萬物舉不足以動其中可也四書講章自己看得開否嵗考録共文章幾篇二人今讀何書我前後所言皆是教你成人之道你當聽見你二人文字頗能成篇將來可進我心甚喜其餘小事不著意二十一則偲兩次書俱到見你補廩我心甚喜是你終身之福家門之慶也兒當勉强學問以期後來光顯無負大人君子成就汝之盛心可也我向日令你所讀諸書次第及之經書熟讀熟看令胸中貫通史鑑性理是頒降之書考試出題五經可以大開胸次古文與繩尺論皆不可不看寫字手腕著力便寫得方正顔魯公之書雄秀獨出其字帖當學前祖母年老此事傷心你盡孝敬便是學問舍兒教他讀書衣服勿令破爛即是你體我之心也喜康亦可讀書矣今何如田野事付舜卿你勿管亦勿閒行看他鄰里間勿以錢物相交分毫小利看到目中大事決不能成是至愚者所為也豈秀才之事乎處人當寬大容忍犯而不較以仁禮忠三自反凡此皆大賢心度明哲保身之道也大丈夫容人而不為人所容處人而不為人所處制欲而不為欲所制當深味此言田間水道之類任人所為切不可掛念舜卿亦要叮嚀曉之勿與人爭大抵禍常起于細微不可不慎二十二則仕你在此客間我又大難中生死未知何如你在外須要和順從容收斂恭遜庶幾心地日就開明動履規矩則學業可成將來自有實用慎勿粗心浮氣闕敗德以貽後悔二十三則偲你不要憂苦父罪難未了你動心忍性强待皇天悔禍萬一生出獄門得與復相見髙兒聘事載裝奩薄勿用鼓樂父居此地你兄弟姊妹去居喪者不甚逺再不多囑我近日身安目疾愈閒中與仕解中庸還未畢有帶回者你用心看你文字比舊頗充盛再用心舜卿當篤骨肉之愛勿以小事介意你以大事業自期待人須要存仁人君子之心勵忠臣義士之節備英雄豪傑之才方是男子方是丈夫仕宦利祿匹夫妾婦之所為你父素所羞稱比之為狗彘也舍兒你弗悮他他讀書伶俐如他資質亦少但失教了須教他苦讀闕禹卿亦教他學好喜康等諸幼勿失學青道袍與伍天夀二十四則偲歸到家中最叔祖母事要緊須常在咱家中勿往張家去夀極高不比舊年早辰不知晚夕萬一有大事却如何處若如今或在張家住你到家便去請若叔祖母不肯來須再三懇陳我意及再三與你母講此不是小事若不依我說一家都是惡人了天豈肯保佑又豈肯使家門有福後輩必不長俊此事全在你處你須切切著意為我用心處之處得停當我或得生還家亦好過此又是你立德行處你看杜環小傳便知你多帶些路費到家存些預備此事萬一有凶事全勿靠休又告你休若得罪你只可救濟他骨肉之恩理當如此大學言其所厚者薄而其所薄者厚未之有也你將我此帖貼在坐間無事時常看思量恐你一時粗鹵言不入心又仕前日與人相講你若見他只說舍弟年少不知人事今再彼此不必計較如是則千萬是非口舌一切都散了聖人以不能懲忿者謂之惑惑猶今人言鶻突也蓋小小事一時不㑹忍致成大禍小則破家大則損身豈不是鶻突之甚乎又祖宗牌主將屋拆散不知置之何處我前見了心甚傷痛不曽與你言我方欲圖處又有此禍今嘗思之甚難處我欲你且收到東坦北房中又恐人䙝瀆皆我不孝之罪也天豈肯悔禍宥我你到家思何如處之又將舍兒你自教之如你不耐煩還從闕賈罷諸幼你送到侯宗禮處便不多㑹讀書只習禮貌將來亦好教不要失教了楊廷臣當街上流涕與我穿襪你謝他又與價楊忍送網一頂與他價就當與送飯我前者要過幾日稍去不曽得你不要謂我瑣屑蓋事當如此恐你不知過潼關見周潭公便說舍弟不㑹忍事闕瀆甚不是見六泉公亦然又家中內外男女之分須當謹慎外姓孩子不要常在中門內想你㑹用心萬萬又使喚小女子勿往田野獨行與你母說别人孩子不知人事你替他體悉保愛勿使有過差就是陰德亦家門可免羞辱前後墻上可用棘處默默處之水利事千萬勿與人爭我前日意要填村西南頭渠此他日禍端也仕若粗猛你只愛他從容教之以感化他我前日路上亦與你曽說縱他有千萬不是你只體我難中心善處之人非豚魚豈不知感悟你常思象憂亦憂象喜亦喜的心久自愧悔父勞心萬端囑咐不盡你將此帖常常接目不要棄毁三月十二日申刻父在暗室中書二十五則凡我告你言你心或不欲當勉强行之古人所謂或安行或利行或勉行大抵我不能躬行徒以言語叮嚀宜乎爾等不立身也休之事勿以閒語人人或言之你可不答便是一件學好處律法弟訐兄不法之事將弟所告當作兄自首兄免罪弟反坐以干犯恩義之罪此是聖人立法教人厚于倫理處於如此人處得善方是立身我慮你之心直是死方已你若上京自己備腳力到此看天心何如安排若未得了事你須堅心耐久至科場近方歸你必有好處仕作筆清新只是不曽讀書但他自不立志我徒說耳我無德天不出好人為家門慶可嘆可嘆二十六則我再與仕講古人云能者養之以福不能者敗以取禍此二句最好且如你兄弟輩既有我在百凡無纍若肯專心學問修身謹行毫末不敢苟且則日進于髙明德立而名成矣豈非能者養之以福乎若假我以為惡驕矜淫縱無所不至敗德敗身小則不保前程大則不保性命豈非不能者敗以取禍乎人只是無志雖有好資質都自壞了且如當時若能立志何事業幹不成真可惜也嘉祥不能進學非命也他前者問安書我知他學問退了講過孟子須熟讀熟看二十七則舉業事只是多讀書時嘗作習思慮日間行事不同流俗吐詞立論自然正大我年前冬月與王舉人改文數十篇改得甚好但你不得一見見之自然開啓胸襟仕文字可憂若失一秀才羞辱何可當你要為他慮處就是你的事一般他若不聽真自棄也經書想是還不曽熟我深為愁考不得寫字又不光顯只此寫字一事亦甚不可不知如何他一書到內我通看不見若在提學處寫字如此前程必保不得文字既不好寫字又苟且黜退無疑仕若心上有一分開明處即當食不下咽寢不安席可慮可慮程子有言人苟以善自治雖昏愚之至皆可漸磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也其實是我千言萬語不聽我說再何如又是家門不幸處說到此處便覺痛心家中幼少輩想是都失教了天天命命天命天命可痛可痛可傷可傷我前日曽說任政家孩子來京今亦決勿來不用他只有舜卿凡事皆可供辦再不用人舜卿直須終我此事活亦同他歸來死亦同他歸來天夀有書到內他忠厚之心我深知之但事須安命我近日為某事筮得觀初六與上九變凡卦占變爻此真如伏羲文王周公孔子面警教一般鬼神可畏我感激淚下恐你不知此義二十八則士君子立身天地間要存好心行好事骨肉恩愛終不可薄大學言其所厚者薄而其所薄者厚未之有也你當深味斯言以盡立身之本你張師昨告我如舜之處象此言最是汝伯父早逝以二子托我撫養我若待之或薄不如待你等他日死見汝伯父若問休為人何如我將何辭以對況汝祖父母在天之靈視休與汝兄弟皆孫也固無一厚一薄我若厚汝薄彼汝祖父母必以我為不孝之子言及于此便至淚涕汝宜深體我心我豈不知休為人要他處此憂愁之地動心忍性改過遷善成一好人不意他終不能變向日他在此我三四日間未嘗不反覆叮嚀告戒一畨但禹卿不知禹卿曽說以謹慎二字戒他等我便知此言有為而發竟不知所為何惡便告我何害我亦不生氣惱我度他家中或與人有訟事乎偲不得已以書告我果有之汝宜實告不必隱諱再有言戒他二十九則叔祖母今年八十九嵗過今冬九十嵗矣我日夜屈指數恐我不得一見蒼天蒼天使我如此你二人前程要保守偲月食廩米一石你思天祿不可苟享受前日人出無若宋人然題恐是針刺你不知是否我心為你憂慮他人守一增廣至白首不得糧者甚多食糧豈是容易事可畏可畏你若與鄰里無知識的飲酒不讀書不知惕然警省李師傅便是樣子若藉我險難給假往來推病不與衆人同考你丈人便是樣子一失雖有苑洛大賢顯官亦救不得大抵人心迷惑深者至死不悟父守不得你到老在你自審偲我再囑咐你我見天禍方殷層層疊疊出來我恐家下復有異樣的惡事出來你小心你小心我在此地旦暮死生未可知凡水渠田畔之類一切比我生死輕的事你都灰心勿掛念又要屈已忍耐勿與鄉人輕易交接遇見時便思我言謙恭禮下以忠信為心若人有橫逆欺罵者一意忍耐不要使心上火氣起來鄉鄰有事便閉户避之三十則我平安如常你勿憂昨後九月念七日感寒幾成病第三日得汗即愈矣叔祖母或有疾患我夢寐不安有事當告我勿隱高兒事何如其家子目疾何如命至于此皆我所致我日夜懸心恐兒女子不能相安思至于此心若刀刺是天意也何其不幸何其不幸你皆告我我又以異兆告你我昨感寒汗後疾雖愈脈不好率二三十動一停止兩手脈數日皆如此我驚異莫知所以十月初三日將落即睡至更初我卧傍布帳遮風夢寐中有懸手過帳為我疹脈者我夢中驚問是官醫士否亦無應者但疹脈已斂手出帳去未見人既覺心甚惻感自念涼薄不德是何神明鍳佑初四早下榻拜謝上榻坐定自疹脈則復常矣此等事與火焚其人詩牌事相類天機不可泄但告你全家當感天地保佑切忌勿與一人言之萬萬慎密你先年將我續處困記輕易與人近日一南士將此文分作五十五節每節以詩一首詠之細書一本自萬里外與我稍進我且感且愧但南向拜謝畢即引火焚之詩話之類切宜謹密我今亦不復作詩文矣你切戒示人又我日夜懸慮你在家獨處無人依賴或有恨之者不可不慎慮也但要耐心平氣謹避是非勿與人交遊橫逆之來須要痛忍與古人唾面自乾者自比自處我在不測之淵冰中你忿一生又有他禍于我何如仔細思之前後垣墻當用棘處使舜卿處之舜卿你厚愛之否則自剪伐手足自處孤危也前後兩次俱得謙卦你玩此帖勿示人三十一則庭房義上該與休二人此是你伯父蓋成的我心終不安不是過與只將此房拆去勿以他物補既拆後只做一空垣待客在南厦下你又說與舍兒母勿惹人打罵上官告狀是我羞辱不如千萬忍耐今日之事須千萬自損自抑小人得志不利君子貞則吉凶禍多歸于君子困中嵗月亦不易度我思翟姜二人不數月皆以憂憤死昨五月內孫公下獄一處我見其言甚是猖狂若喪心失惑然我告某人曰此公言動不祥必有禍時我方與仕解中庸動乎四體章果不久即死吉人獲吉凶人獲凶此天道也固亦有吉人反凶凶人幸免禍孽者此未定之天也你細觀世人為惡無禍曽有幾人不在其身則在子孫斷斷乎不能脫三十二則說與仕人固有秉賦愚下蔽塞深錮牢不可破者然本性無有不善者多因無人啓迪溺于流俗故不能奮然興起以古人自期待也若有人啓迪却只因循苟且終日悠悠終不能脫凡庸一格以入高明者是自暴自棄刑戮之徒也孟子曰待文王而後興者凡民耳若有文王而不知興起者豈非禽獸之類乎你將舍兒帶去蒲與同處飲食都你供給教他不要失悮你若體我此心你將來前程逺大你偲兄處有杜環小傳一本你取以觀之看你能感發否乎你與舍兒同甘苦他幼不知事有差錯只背後教之不要怒惱如此則你德性日好知識日開天必佑你使有前程三十三則有闕文今年六月內有山西一人到獄中與我備說去嵗山西闕賊入境鄉村良善人家婦女無處躲避者一時盡皆縊死聞陜西地方有聲息我前者兩次書來家令仕買剛尖刀數十把今又恐你不著意愚䝉不悟令舜卿買尖刀十把放書箱中帶回到家你取去人各散與家中婦人女子一把使他懸帶晝夜常在身譬若有急事即時人人從心上一刀劄死不要留一箇使將此言明白與家中大小婦人女子說使勿闕寧做箇潔淨鬼決不要做箇汚濁人你二人若隱我此言鬼神殛之不令你生將此貼在家中西房北牆上仕講與大小婦女使知之併我稍來前者葉烈婦傳與馮氏帖俱常講之你用心讀書作文學好仕嘗在蒲城讀書闕在家作文章稍來不要來京到此使闕父在難中只要得家中無惡事出來闕你一家大小都守規矩禮法闕性命若有惡事雖在榮華闕況在凶地如何度日十月初五日父痛心書三十四則我前有書令舜卿北山中買柏木與叔祖母作夀材不要遲悮重我不孝不德以速上天之誅今日家門凶禍各宜小心謹慎以消災變安貧守分忍事讓人凡一切田土大小諸事必存推遜之心切不可與人爭競寧可我怕人勿令人怕我力善修德念念不忘取法古人勿效世俗庶回天譴以消災難于萬一也我一日未死此心不能不為汝等掛念也偲疾愈否我昔年曽患此病一日取漢書坐墳中栁下讀之殊覺爽快疾病脫體你今病或少可即宜潜心學業掩門靜處堅你心志純你德性凡百家慮置之度外勿亂胸懷斷目前之俗計思終身之逺圖經書性理之外五經白文次第讀之反身著已步步法之時時奉之積之既久則心地漸漸開明義理漸漸純熟文字議論日有可觀如此三年不入于科第者未之有也可惜嵗月你都空過了今宜猛省大凡人于日用間此心思于為善一念萌動略知警惕處即是天地鬼神于默默中啓迪開導之也於此不知擴充復以私邪蔽錮戕滅善端是自棄此身自絶于天地鬼神也你深思之三十五則再叮嚀與偲說以汝之資質力量若能翻然興起以古人事業為真可尚以流俗所為為真可羞依我所言成一大事數年之間足見功效今委靡頺墮悠悠嵗月空負有為之時真可惜也古人云才將第一流人不自居將第一等事讓於人便是自棄古之哲人行一不義殺一不辜而得天下不為嘗靜思此言深自愧歉半生光隂盡空過矣今日于義理頗曉一二分然傷殘衰憊之齒無壁立百仞之剛却又遲矣汝當及時努力縣上切宜逺避廉恥所係立身一敗萬事瓦裂楊忠介集卷五

body:
  text: 楊忠介集卷十三明楊爵撰七言絶句二初聞黃鸝共步圜庭佳樹陰逍遙因見古人心囚居莫道無真樂也有黃鸝送好音獨酌獨酌燕山春甕香暫開宇內一愁腸醉看榻上無長物惟有孔家活世方夜夢四老人俱倣佛百餘歲衣冠古朴氣象莊重皆天然不事矯飾同坐一木凳豫趨前長揖四老人俱起答之淵默無一言覺猶宛在目中以詩記之丁未正月初三日早間書知是商山四老翁來吾夢裏一相逢鳳凰千仞當年事獨在平生寤寐中讀詩偶成肥遁高風百世師衡門愧子獨棲遲洋洋泌水今猶在還有幾人能樂飢黍離篇眼底興衰忽變遷每將心事問蒼天農夫不解行人意知說離離是有年豳風碩膚一遜德愈光歎自東人樂繡裳不有風雲雷雨動鴟梟豈易悟周王夜懷緒山獨坐更初有所思悠悠令我心如飢誰教咫尺同千里安得夢中一見之送趙白樓出獄圜內霏霏雪片輕三人同送一人行須知令我難堪處正是鐡門回首情與子周旋風雪中留連送出白樓翁我曹莫道别離苦此是聖朝囹圄空兩年同難一朝離世事艱危各自知良友今宵何處去憶他揮淚正相思哭華州張處士夀享人間八十年全歸正寢是升天可憐一掬囚中淚不到先生墳土前往年一士夫勸勿作詩作此以曉之罪人豈是好吟詩詩是罪人撥悶詞成後朗吟閒自咏融融滿目見天機天機滿目是襟懷滚滚都從詩上來付此卷舒同大運豈容一念自安排安排了得見人心只向天然分上尋要識此間真氣象茫茫宇宙更無垠無垠所向在先難一本從來非二三百慮根原由此出天人未可兩般看罪人豈是好吟詩詩是罪人自得時獨咏一聲心已解此身此罪正相宜此身十載臥松雲千古真傳愧未聞中夜思量年少事雪窗曾讀北山文雪窗若向靜中尋得見昔人藏用心舉目霄壤皆可樂沂源正是此胸襟沂源到此幾千年鄒魯心神在簡編誰識真陵數枝草靑靑日夜秀窗前張公弼抱痛周君意獨深柩前一哭淚淋淋昊天於此昭明處照見先生一念心和人韻四首能從定裏息奔馳即是天人合一時往哲藩籬吾剖破動無方所靜無私病潛隱處最難醫拔去深根思匪夷舜跖相懸初未遠差之千里自毫釐户成人自此間出闔闢真機須了之却笑紛紛禦冦者徒勞破屋欲何為一原萬象皆同有要把心從此處知善到公時多少大須知無我是無私和題扇上漁翁圖二首滿江秋月照艖明水國雲鄉老此生常慮中宵風雨變孤舟時向岸頭橫一見風波即放篷徐徐再訪斗牛宫將吾心事頻思檢慚愧烟蓑江上翁送人出獄相逢相别兩經春分袂情懷見子真此後金吾門外過念豫還是困中人送人歸蜀雍山蜀水共封疆送子教人偏感傷歸到秦關停馬處好將多難報吾鄉示姪休四首旅舍空時家又空秦關燕塞路難通吾兒莫道饑寒苦君子原來亦固窮門掩隙塵客舍空寂寥人久在圜中但願聖明恤狂直爾曹與我再相逢昔年送我古祠中兒向西行我向東此日音容如萬里各將一念叩蒼穹縲絏兩年骨肉離幽圜客舍日相悲爾曹知命須寬慰世道艱危古有之祝趙總兵此日降神自東嶽看來賦與不為薄我今祝夀無百壺但願將軍困而樂謝人賜鵝米還將德惠過圜牆味帶南風滿屋香可奈窮囚深恨處思君高義不能忘閒吟五年夜夜鎖客囚還餘鄉夢繞林丘白頭未了乾坤事一息常為汝輩憂天涯歲月自幽囚老去無須念首丘未了平生身上債不圖今作汝曹憂哭浦周二公二子殺身良可傷老夫念念不能忘欲將往歲顛狂事同到九原笑一場禹卿歸秦仕兒留此難於為别以此慰之道義真原宜早尋況逢蘭若又春深男兒本是四方客離别何須苦動心良朋萬里此相尋為念艱危歲月深安土敦仁賢哲事男兒何處不寬心贈别送别圜門各感傷好將事業繼龔黃如逢潼上劉君子道我囚中兩鬢蒼送孫寺丞不信榮華有是非幽縲終日掩圜扉世間滿眼愁人事忽見孫郎能蚤歸流連白首歎知機日見庭柯黃葉飛安得一朝攜手去與君共採首陽薇九月節九天風色夜蕭蕭此日君門萬里遙不是諫臣難一死殺身恐纍聖明朝聞申大用告孤松祝豫不死作有小序白塔寺老僧號孤松與豫素未相識豫辛丑年春下獄是年秋燕山申大用以事被逮告以孤松當豫凶危之際日常流涕為豫焚香誦保安經以祝不死當時一聞即以詩紀其事每擬出獄必求一見乙已年秋暫歸田里以迫促速行未遂夙願今復下獄踰年聞孤松已謝世矣因述當日所作復繼韻悼之見豫未忘孤松也普天吾欲振頽風墮入無涯淵海中誰誦保安心更切令人日夜憶孤松聞孤松謝世繼韻悼之楚江漁父惜回風千古同歸一夢中歲月不堪人事變灑吾雙淚痛孤松深深塔院鎖薰風虛想形容入夢中當日孤松曾念我而今我復痛孤松蕭蕭松影遠紅塵海宇相關一念真悵望幾年空步履還從此地一沾巾幾年欲接上人風憂世襟懷與我同看到乾坤終始處紛紛眼底總成空招友人王泉岡同學尹家村寺泉岡後同鄉舉官縣尹初昏月隱滿天星市肆紛紜風打萍能鑒皇天應有眼林間雞犬幾時寧贈友人韓雙台三首一子耕農二子儒數犁春雨五車書主人杯盞微醺後逸士傳中訪友于丘園步履迥塵埃一段超然襟抱開眼底乾坤都是樂不從此外更安排關中高士韓雙台獨把功名等草萊胸次悠然忘物我聊呼童冠與徘徊夜夢一人戴無翅紗帽謂諸葛孔明也豫揖而就之謂豫曰塵世富貴何足道哉唯唯既覺漏四鼓矣以詩紀其事丁未夏六月十四日也夢裏從容揖孔明回天事業竟難成出師兩疏心千古可是巍然三代英隆中運策三分定渭上屯田一念深星殞營中旋義斾秪成當日受遺心天厭東京久自虹輿圖分豁竟難同漢皇值此顛危日空向南陽起臥龍漢賊從來難兩立蜀川偏據未為安只教千有餘年後五丈原頭秋夜寒哭姜郎中一世光陰半世終宜將運數委蒼穹吾心猶有難堪處老淚哭君是獄中靜裏閒談古與今超然物外是胸襟相逢獨有難忘處夜雨東風一片心聯句乙巳年孟夏十九日大司馬聯峯先生初度同難王子言具酒邀豫四人為先生夀坐中聯句得五言古風七言律各一篇此辰當此地杯酒喜相從感極寧辭醉衰顔肯近紅聯峯時逢天地解雷雨滿長空晴川憂國憂民意宇宙浩無窮斛山斯文千古㑹聚樂一家同訥溪浪迹形骸外高情俎豆中晴川誰憐幽陷裏各欲反淳風斛山他年林下樂須記此情濃義泉又難中此日逢初度聯峯嶽降曾逢生甫申雷雨經綸占大手晴川風雲遭際愧賢紳伊周事業應無分聯峯黃夏淵源却有真斛山願得八荒開夀域普天稽首誦堯仁晴川看花看花忽爾動遐思憶昔長安得意時今日看花雖異地此花亦與人相宜聯峯隨身著處忘升降信步趫來履險夷怪得幽中懷抱好興同賢哲坐東籬斛山人心誰謂不如古造物從來豈有私晴川好景縱觀皆樂地從教無日不相隨義泉百年顯晦渾閒事一笑榮枯便釋疑訥溪但願此心常共赤何須殊色與爭奇聯峯要知展轉艱危裏天欲吾曹慎所之斛山南北朋簪非易盍乾坤腳板豈難支晴川真機每向花前得終不逢人一皺眉莫道看花淹歲月恩光指日是歸期斛山又與君斯邂逅一葉報新秋斛山名姓誰知道斛山有夢心情見爾儔林華盍簪如有像麗澤復何求晴川珍重朋來義相期到白頭訥溪又每過花前動我思斛山雨餘復見長新枝聨峯乾坤生意原無盡晴川物理乘機默與移斛山向日一心終自赤盈園諸品獨無緇聨峯耐寒松柏千年秀與爾同當天下奇斛山粉牆斜倚似含思聨峯真蕊傾陽正滿枝雨露時從天上降斛山根荄曾向圃中移聨峯無邊心事終懷赤滿眼風塵不受緇訥溪雅態自堪供玩賞何須解語始為奇聨峯誰云仁遠未之思物邇還憐一兩枝開落隨時皆自得晴川晦明向日更難移斛山雖無脂粉容常艷便出淤泥色不緇一種天香元自異姚黃魏紫未為奇聨峯酌酒天涯今日共幽囚各為當年天下憂斛山消息知宜觀大易浮沈總付與清秋巽峯風雷自是交相助聲氣何須更别求晴川醉裏悠然塵世外相看真是泛虛舟斛山復酌送巽峯出獄共傾一盞送君行不盡幽圜此日情斛山塵世偶然開笑口丈夫寧肯負平生晴川豈為湖海新賓主當是乾坤老弟兄巽峯天際輕陰旋即散他年還共論誠明斛山雜詩丙午年首夏患足疾六月淫雨大作獄屋中水深二尺許囚板漂沒六七日始退重此濕感不能步履今一載矣殊覺衰憊恐倏殞滅為十招魂以自慰臥起慷慨援筆立就詞固不能盡工也丁未年四月二十五日作兩足屈欒雙目眩暗身孱罪長影形相伴百憂時觸五內悽慘耿耿㷀㷀夜以達旦生理幾何魂將我散嗚呼魂兮魂兮宜莫即散我皇聰照當有渙汗愚民參差成此幽囚綿綿赤抱皤皤白頭過隙野馬涉世浮漚狂迂速罪豫復何尤魂欲我去飄忽遠逰嗚呼魂兮魂兮爾無板蕩骨肉萬里涕泣我望我生不辰長夜轉戚悠悠蒼天燁燁白日沆􅒭瀰漫乾坤穆沕哭者既死歎者為失旅魂杳杳十喪六七嗚呼魂兮魂兮衮職爾補少延須臾孰無肺腑陰風瑟瑟旅燕唧唧暮雨朝雲胡為我急身世窮年天涯一息寧為髊􅀈羞作鬼蜮我生為勞魂欲放逸嗚呼魂兮魂兮慎爾先發與我相須受天之罰百感摧剝寸衷消毁長守圜扉滿腔赤淚有覺殘生無涯譴祟發發回風滔滔逝水魂如不來伊誰為類嗚呼魂兮魂兮孚我以心人生遭際往古來今半百生涯一軀殘偃孤抱憂勞萍蹤屯蹇萬死交戚九天元遠假寐長思流光空轉魂欲幾何灼灼微燹嗚呼魂兮魂兮何遽舍我我欲爾盡散無不可人生幾何吾豈戀戀成吾一死反貽國患歲序屢遷久甘幽難使我君王不殺忠諫魂何倣徨去如飛翰嗚呼魂兮魂兮孰非天命於此永依安土以聽風塵遠邇薄暮茫茫此際勞人孰不永傷悲萬里天斷九回腸誰乘危機憂我君王我魂寥落便欲長往嗚呼魂兮魂兮努力炯炯人謀既臧天步可永自我復來寒暑更度日月迅速轉看白首我思古人伊誰可友履義安仁身類塵土死也生也彼亦何有嗚呼魂兮魂兮吾何爾號恐將一死輕於鴻毛男兒腳步自有圓方由我顛躓之死何妨履我后土戴我穹蒼省我之愆是我之狂魂如解此安我福堂嗚呼魂兮魂兮聊此相將待我罪終任爾飄揚詞有感踏莎行六首黃葉蕭蕭西風浩浩犴中忽訝寒先到每將心事對晴天肯因窮老傷懷抱浮漚古今雲雨世道漫把榮辱堪作笑男兒何事鬱襟懷自有鳶飛與魚躍大道昭明人心不死一理綿綿貫終始消息盈虛總循環須知萬古皆如此君父恩德臣子忠義存吾之死矢靡已留取丹懷日浩然天地無窮永相倚百年運數一旦遭逢天涯長夜歎夢夢未惜宇宙托蜉蝣空餘禾黍慨王風眼前靡靡心上忡忡難免幽圜今固窮仰視青天與白日冥冥照我此丹衷志扶顛隮身陷網羅先憂特為此心多氣吞天際長虹勢手障人間東逝波樓上秦曲軍前楚歌英雄羽客總消磨惟有忠靈永不散與君攜手弔湘娥孤懷炯炯天畔茫茫北風日夜此幽窗秦館兩行七日淚燕庭一片五月霜月臨日照地久天長不盡當年烈士傷遺下霄壤千古恨總出人臣忠義腸霧隱棘牆露低庭樹多難悠悠今未巳百年世事總成空一笑翻復任眼底地角鄉關天涯囹圄回首君門幾萬里豁然蘆杖步圜階西風吹散燕山雨沁園春金風轉律流光暗易壯士蕭條存丹天一㸃㸃自陶濯一身幽困兩歲長宵知作閒事樂天委運念頭此外更無勞靜坐間把宇宙蹤跡閒慮一遭生平努力相高都做了灰蕩與塵消看世事多般奇奇巧巧於人何有也自逍遙狂風回亂浮雲翻轉莫休莫歇枉分撓適懷抱擡頭窗外秋雨蕭蕭滿江紅炎暑方闌忽驚眼庭前一葉報新秋蟬鳴深樹日暮悲切歎息人世千年事空老却英雄豪傑闕十一字門掩後孤燈滅圜窗照清夜月靜思量教人愁腸結幾時恩詔歸田里絲綸隨處少遮迾莫道他渭水子牙翁胸臆别楊忠介集卷十三

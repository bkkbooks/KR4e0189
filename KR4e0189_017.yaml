body:
  text: 楊忠介集附録巻四祭文羅洪先嘉靖庚戌四月三日吉水羅洪先聞斛山楊年兄訃音為位而哭至于失聲九月辛酉朔具越葛息香寄奠靈筵嗚呼痛哉始聞來訃掩耳欲走今將為誄何忍出口大河在東西華巃嵸以此相招颯然悲風嗚嗚哀哉楊繼盛號椒山容城人官兵部員外郎諡忠愍嗚呼惟公之智足以灼事變惟公之勇足以犯雷霆惟公之忠足以動人主惟公之誠足以感鬼神惟公之節足以歴窘辱困苦生死而不變惟公之名足以同天地日月明且久而不朽視彼奸䛕隠宻與禽獸草木同歸腐者何啻霄壤則公之死也亦何恨乎方公之北上也我韓師翁嘗以大畜睽卦教之矣既而公用大畜棄睽卦而不用豈非忠貞剛直之氣積於中而不可忍故於師訓有所不暇顧耶始公在獄人皆以為必死乃頼聖明得以生還及公歸家人皆以為天必以夀考報而公乃竟以憂國成疾死豈非公之忠愛出於天性故在囹圄如家居在田野如朝宁耶方師翁歸致與盛相别也亦嘗以教公者教之矣既而亦違背師訓棄睽卦不用已至於此豈韓門之頑徒乃國家之直臣耶盛責宰相書内云有一時之富貴有萬世之事功有目前之榮辱有身後之褒貶不惟以義言之其較然分明雖以利言之其輕重亦較然可懼盛嘗自以為平生學問所得力者在此豈公之所為所見乃先得我心之同然耶要亦同得師翁不負天子不負所學之教而不敢忘也嗚呼士有曠百世而相感者每歔欷而不可禁况與公同韓氏之門又同此愚直之心憂懷如海孰為知音安得起公于九原連牀數日共肺肝乎時人有稱韓門二楊者顧淺陋何敢與公竝稱方公立朝盛尚韋布及盛在位公已云亡既不得共從王事斬奸佞矣公之完名髙節已不負師翁之教而盛尚留此僥倖不死之身若宇宙贅疣於公深有愧焉仰天長吁無可奈何行將納此再生之身于朝廷從公於九泉之下共大笑大哭一塲而已惟公其相之周怡嗚呼斛山先生遽至於是耶先生鍾宇宙海嶽之靈産終南太華之間居鄉建表極於四望立朝矻砥柱於中流孝弟通乎神明忠信貫乎金石五事之陳先憂表臣子之寸心七年之繫忠誠動聖主之再釋元氣扶於兩間聲光播於四海學士大夫孰不稱闗西之夫子兒童婦女罔不識有明之直臣怡僻陋鄙人素仰捐介承乏畿郡漸悉冲和庚子之秋盡方欣起用辛丑之春初俄驚被逮怡時不揣狂妄輙草奏章欲叫帝閽而排閶闔中危母老而焚狂藁壬寅備員諫垣癸卯例同詔獄時有江西劉工部煥吾君三人一飯必同惟予與君之罪為重五載萬死不二惟君與劉之徳是依吉㓙同患生死曷忘清源之别慷慨西行固冝有再聚也涿鹿之分痛哭東門已兆為永訣乎怡罪逆獨深天所不宥至家旬餘老母長逝泣血三年時猶有江東渭北之思夣魂千里豈期斷閩海秦雲之望嗟此訃音胡為乎來哉七夕前期得全椒戚南𤣥之報云變在去夏予則得公七月七日之書手澤宛然直訝其非也又七日得通州胡倉使之報云變在十月之十四日則不能無驚疑矣人莫不願公夀考無疆霖雨蒼生盤石宗社植立元氣炳煥斯文而孰忍無故哭公耶嗟嗟我公今果止於是耶公有仁人君子之心有丈夫豪傑之氣有春風之和有秋霜之烈有河海之大有大華之竒公今果化乎當為雲漢之昭囬當為日月之照耀當為霖雨之霶霈當為雷霆之震動當為龍見當為虎變當為鳳徳當為麟仁當騎箕尾而正列星當座紫府而宰司平是皆有可信乎精一之學必底純粹尚有渣滓不妨澄徹幽明無間其尚牗予愚而撤予蔽吾有斗酒藏之三年以待君開今西望傾酹神其旨飲臨風痛哭此情無盡嗚呼痛哉嗚呼痛哉怡自庚戌春聞訃哭公是夏晴川翁自㤗和來吊予約明年過㤗和同入闗予有家難不果又明年壬子春予始徃㤗和至則晴翁先棄予一月矣葢正月十二日其諱辰也予痛哭不勝嗟我踽踽數年之間山崩川逝我生何為遂徃㤗和西行今四月二十五日始得哭公墓下又改月為端午節憶徃嵗幽中泛蒲酌酒傷今懷古意殊不樂今日乃奠公之墓情復何如見公之鄉與廬見其孫子見其比隣親友而公獨不可見痛復如何公間世之英河嶽之靈邦之司直學者法程斯人之亡天下之屯逺近之人咸謂公未死而尚在公之正直浩然真充天地昭日月亘百世而獨存人之為言豈其無徵予兹東歸沽酒一􅎆烹鷄一盂以為公别神其鍳歆劉魁號晴川泰和人官工部郎中公同難講學者嗚呼吾兄歸化又將及期矣近得令郎子勉書謂于去嵗臘月已歸窆于祖塋之側臨終自作墓誌書銘旌以示無忘國恩之意更無一語及家事古人戰兢之學至啓手足然後知免若吾兄清明不亂感恩不忘平日篤志力行至是乃見葢棺論定真無愧于古人矣五月間徃吊訥溪兄母太孺人于宛陵相約明春拜于墓下以謝五六年教愛之私以致千萬里存殁之感然人世風燈不敢期必兹因舍親朱武功人便謹具束香薄賻再申鄙詞寄付子勉代為奠告嗚呼南山崒嵂渭水悠揚孰謂先生竟爾云亡哀哉馬理嗚呼惟靈質兮如䋲又童蒙兮養貞縁貧窶兮傳逺羌挾册兮薅耕值縣令兮求胥爰辭役兮入黌繼齎糧兮從師遂時就兮雪螢乃邁征兮大畜歛彚進兮顯名載弹冠兮豸角却甘節兮蘖氷思尊主兮堯舜犯天顔兮用情忽雷霆兮震怒分捐身兮捨生鐡獄深兮孔嚴夕桎梏兮朝荆援者戕兮孔多子慟傷兮屢傾仍學思兮有常忘春秋兮數更在縲絏兮八載荷天明兮爾瞠帝浩蕩兮施仁赦出鷄兮未鳴子感恩兮圖報約麗澤兮心勍胡彼蒼兮弗吊殞吾良兮葉輕眺涇川兮疇語向邰言兮誰聆瞻斛山兮無人遺予獨兮焉盟嵗既宴兮臨除送靈即兮佳城酹一觴兮祖筵淚隨墮兮雨零姚一元號闕御史人官河嶽精英乾坤正氣素履清修介操剛毅抗忠言而砥柱中流安靖節而浮雲富貴威震風雷心存涇渭皇恩浩蕩與物同春優游暇豫絶世離塵方期仰斯人以作範詎意還造化以歸真名垂信史徳載貞珉予也持節代廵道經斯地敬仰休風有懷髙誼聊陳清庶之儀用表瞻馳之意靈如有知洋洋來賁嗚呼覩北山兮岐嶷西風日夕兮暮雲迷暮雲迷兮有時散此恨悠悠兮無絶期王天爵號闕西御史人官陜嗟嗟先生華嶽鍾秀卓犖匪常黄甲翹楚節義文章周孔寤寐稷契羮墻行行且止逺避豺狼天織雲錦期補衮裳躬逢明聖要見虞唐二本盈懷萬巻濟康其生也有為而其出也曷嘗故炤耀今古轟烈宇宙為生民幟忠孝為天地扶綱常身畎畝而服勤仲素對皋陶而嘗卧羲皇其中解易解發所未發無愧于闗西夫子足以示訓無疆且其身後春秋騷人墨客取之公論竝美三楊先儒所謂一世之短萬世之長是當與凌烟大室相為低昻非特鄉先生没可祭于社者耳某生也職忝同道竊取縹緗執鞭願切未得星軺側侍道傍幸司觀風逖眺西方東望先生鄉井有淚盈眶緬惟先生正氣涇渭湯湯尚兾斛嶺山靈呵䕶後嗣允昌無計臨風讚誄凌渡飄揚今頼私淑末艾遣人墓祭庶乎發潜徳之幽光嗚呼銘在太常董狐流芳象魏五鳳并州故鄉栢臺墮淚萬古甘棠神遊八表來格洋洋劉光國號闕西御史人陜嗟嗟先生其道猶龍河華耀采喆人篤生氣培浩然光分列星昔我肅皇神聖英明御下凛凛日月雷霆公為柱史義氣稜層草奏萬言顯諫彤庭萬言伊何貴戚勲庸顯諌伊何方技縱横帝乃震怒械繫獄中衆皆失色公獨從容繫更九載飯􅀈藜羹嗚呼艱哉日益窮經蒙難正志遇坎心亨范滂勁節比干孤忠帝曰惜哉釋之歸農優㳺林麓鳳舉冥鴻大用未果梁木其傾雖則既傾正氣愈崇帝曰嗟哉恩錫斯隆羽化郊坰川原底平㤗山北斗大節完名子承上命廵視西京爰思哲人蘇蘓淚零我牲既㓗我酒亦清英靈不寐牖我顓䝉胡松號栢泉滁洲人官闕同年嗟嗟先生葢可謂明室忠貞之臣四海豪傑之士不獨闗中一代人物而已始松讀前史至主聖臣直之説竊喜當時二子之有遭其言傳至今人士徃徃誦説稱引之然豈若吾斛山之遭赫焉光宇宙塞四海動天地而感鬼神若此之烈耶信非主上之聖無以明先生之直而微先生之直抑何以光揚主上之大聖耶今其事徃矣先生之神陟降下上與日星河岳同流而竝著矣獨恨松起廢入闗弗克及仁賢之存而事焉以匡翼不逮而敦年好則豈非子孟子之所謂命耶然人如先生要之未死所望泠泠然來通精誠明啓佑以佑公之鄉人也翹跂中山想像拱木何時展拜一副瞻馳嗚呼鍳哉王廷號闕副使人官嗚呼天地正氣為道紀綱物得其正麟遊鳳翔人得其正至大至剛為忠為孝為賢為良要皆闗宇宙之氣運與𤣥化而翕張不待生而謂之存不隨死而謂之亡惟公天資英邁志氣激昻弱冠抱成人之忠讀書得體認之方謂學以希聖為凖則而功以治心為康莊言行本由一致終始念罔弗臧既而主司以明經膺薦里閈以廬墓表揚其入也為鄉俊乂其出也為國禎祥及其茂登甲科峩峩廟廊目擊時事志切贊相食芹效野人之獻徙薪抗徐福之章斥兇豺於當道效鳴鳳於朝陽天下聞公之風恨不能摳衣面炙而請益予也誦公之文亦不覺義氣填胸而慨慷真足以羞未死之奸䛕激立朝之冠裳壯國家之元氣增河嶽之精光扶聖學之正脉續折檻之餘芳跡雖潜於草野望實重于朝堂夫何一夕西風玉樹凋瘁曰正人亡矣豈四蛇之盤足抑二竪之為殃何報施之乖舛慨天道之茫茫予也始以中國有人為朝廷賀繼以斯文早䘮為吾道悲復以斯人闕斯民不獲被其澤而致怨於彼蒼嗚呼闕可矣茍余行之不迷雖顛沛其何傷况乎正論闕聖徳昭宣公之志得矣不禄而禄名滿天下聲播朝陽公之志行矣亡而未亡有肴在豆有酒在觴知我生芻之奠冀來格之洋洋林道楠號闕西御史人官陜嗚呼天地正氣既大且剛至人涵之手握倫常方其現身而偶出則為逢比之忠曾閔之孝夷齊之亷九死不悔而百折何妨及其體受而歸全則為説之騎箕胥之怒濤𢎞之碧光委形可滅而浩氣非亡試睥睨乎千古非我公乎誰當故其少甘窮約晩録膠庠帶耕鋤耒穿壁借光束脩其心金玉其相覺獶虎之易執慨求忮之非臧嗣觀光兮上國漸驟足兮康莊秉素絲於終始嚴一介於藩王迨其進秩柱史奮筆皂嚢徒為政母而身未敢許遂執親䘮而廬守墓傍既應特召而赴闕即矢初志之終償盟心補衮捐軀抗章精忠貫日烈氣凌霜一則以汾隂之鼎百寢之器乞碎之於堂下一則以采狗之當沽齊鼠之依社願得請於上方讀公之疏者且暗然而痛哭流涕公身處之者毅然於赴火蹈湯尊足錐存剥膚備嘗圜扉八載囚服累箱每釋經而談易視囹圄如福堂天啓聖明箕仙降祥青鞋布襪終歸故鄉隱居教授泌水洋洋四海望公以祥麟瑞鳳何日一呈其儀彩奈造化厭溷濁之世不足辱公之翶翔故收其神明以還大化之無盡徒留其芳軌以示後人之永望楠越在南海仰止不忘幸列西臺猥側班行按接秦中式公門墻嘆儀刑之在目想顔色於屋梁赤𠂻耿耿亦有剛膓每懐學歩未卜行藏謹穆卜布茲拜公祠下而述此生平之念於彷彿之觴靈如不昧來格洋洋趙桐號嶧山綘州人富平知縣惟靈河嶽之精日月之光性天純㓗氣節軒昻妙齡秀發賢聖行藏秉筆入官經世文章陳謨帝前震聲廟廊人曰先生允忠且剛權邪竟于散落善類卒頼以康惟明哲炳燭于幾先故是非自爾不爽青天白日心事明彰當宁將大須于柄用姑晦養以至成其所長盛徳大業益為禎祥人方期待行將明揚胡玉樓而驟起遽屬付于大望匪直斯民無禄實為吾道之䘮是雖不可易者穹蒼之數而終不可諼者秉彛之良予也景仰髙風未獲升堂叨治貴邑幸親餘芳望神堂以肅顒感莫禁夫存亡願言永懷情托椒漿靈其有知來格洋洋墓表李楨號闕寳司卿人官尚斛山先生身久而名彌白寰宇中有知之士莫不仰之如泰山喬嶽垂首屏息率望而走也先生姓楊氏諱爵字伯修陜之富平縣党林里獨户村人世居萬斛山陽因為號故學者稱為斛山先生云先生家素貧𢎞治癸丑冬十月二十四日母氏誕先生婣氏家婣隣目火光起駭來視則懸弧室也長美姿容身滿七尺頴脱剛方慎取與嚬笑絶不假人葢其性然也年二十始發篋讀書苦無繼晷資嘗以薪代燈夙夜罔或不勤每之隴上耕即挾書竝耕而讀意欣欣也念人以聖賢為師不為人下力行孝弟言行秉之忠誠兄靖少叅邑掾惡段令申置重典至是十越年所直指使緝捕孔棘靖逸去先生徒歩百里外申厥寃被逮械逓犴狴署邑事丞繫辱之先生從獄中上書辭意激烈尹見而驚禮曰竒郎也胡至是耶立出之給油薪費督之學年二十八嵗聞朝邑汝節韓先生講性理學躬輦米徃拜其門韓先生睇先生貌行行壯也欲郤束脩禮父蓮峯老人謂曰意若非凡人數日叩其學詫曰縱宿學老儒莫是過吾幾失人矣既審語言踐履錚錚多古人節嘆曰畏友也同門傳習者皆自以為不及督學使唐虞佐公校藝連置首列嘉靖戊子秋應試長安就食館中突一嚢金在候焉遺金郎至持館人急先生詰其實舉金付之遺金郎謝寡取先生峻不允敦請家止宿焉是秋以書經掇第三名詰嵗己丑登羅洪先榜第授行人司行人職維天子使將宗伯封祭儀􅉨宗藩行禮舊藩王重天子使來豐縟饋送以為常先生行役三年徃雍之肅府中州伊府楚吉府且三儀物俱堅讓不受嘗自語曰為士餓死不食人非禮之食凍死不衣人非禮之衣彼雖禮來名重天子使吾獨不重天子使耶昔世宗肅皇帝議尊親禮薦紳譴斥者甚衆先生上疏臣奉使湖廣地方眼睹百姓多菜色挈筐操刀割莩肉鬻啖道傍假令周公禮文盡行抑何補於老羸饑饉之艱上之司舍待罪獲下民部發廪賑救一時全活者萬計壬辰秋授山東道監察御史見枋臣㺯威福拊心嘆曰古人朝拜官而夕上書吾寜尸臺端位譽耀榮耶草奏鄉人有闚之者偕親眤來環視莫可措手閧以恚白母止之於是浩然請告歸母嬰疾尫重脆養醫不可瘳癸巳正月卒躃踊號泣柴毁骨立䘮葬一遵家禮廬墓傍三年屩弗躡城市冬月竹筍生兎馴繞其徑人咸詡為純孝所感云逺近聞公夙學牽率就廬野受業於是讀䘮祭禮為諸求教者解惑奄有終焉之志服闋堅卧不起簡牘不謁公府再六年行部使者交章薦之剡厥行不可已庚子秋詔起其家憣然戒行曰曩母故不盡言今何拽戀乎大丈夫學周孔之道懷匡濟之術必想乃勲區區策此駑鈍少樹猷為報國家尺寸與此長栖莵裘孰若耶是年九月任河南道監察御史廵視南城權貴歛手以避辛丑春二月初四日上封事娓娓數千言大約天下大事内而腹心外而百骸皆受病足以失人心而致危亂者五一則今之輔政者䛕郭翊國虣為巨蠧二則凍餒民閔不憂恤逺為方士修雷壇為媚竈事三則大小臣工久弗覩朝儀之一冝乗時慰其望四則名器濫及道流出入禁内非制五則挫折諫臣讒諂乘隙競進辭具載原疏中見者錯愕失色莫敢正視上赫然震電馮怒命錦衣使執北鎮撫司監候究竟其説十三日夜榜四十又三日訊鞫復榜三十拷掠備至追交搆者言先生一無詘是日都市風大作人面不相覷京人呼為楊御史風其感動天地如此先生身晝夜㭱鎻中尻肉綻若懸珠少焉手割之血淋漓滴地成池氣息奄奄日眯惑不自省守者以為死矣被覆之半夜忽然一聲汗如雨甦矣守者乃戒嚴不少弛右脛㭱木轉合成瘡自分必死圜土冀速斃為幸東厰日更迭伺言􅏒以上蘓校尉宣來心惻苦楚狀不忍耐拾重瓦間合處瘡自此尋愈宵人有譛蘓提督者笞禠辦事役筦司者沮供食不進屢瀕危殆時有張子者同室職納槖饘焉得緩死數月形體孱欒動輙仆地户部主事周天佐御史浦鋐相繼申救俱箠死獄中守益戒嚴闇􅘈而無誰語踰年工部郎劉魁再踰年吏科給事中周怡先後下獄驩焉降心以相從也劘摩修詣繹四子諸經百家研精于易著周易辨録及中庸解若干巻詩文賡歌身世頓忘如是者五年乙巳秋八月十四日上祝紫姑仙箕釋放田里同坐周劉舫由潞水逾臨清閘西去曾不意厰衛之施其後也抵家甫十日錦衣將駕帖至拜手遂行親朋揮淚送别不為動十月二十四日下厰獄旋轉鎮撫司禁苦楚復初得章勺力厰使楊棟言獲自供米物繫復三年丁未冬十一月五日先日籌易與周劉飲謂曰今須盡此杯中物明日吾儕囏滿出矣恐弗似此時也是夕上建醮大髙𤣥殿火肆發不可嚮邇火圍中恍聞呼先生三人名氏者次日釋歸為民人服其先知云先生兩繫詔獄寒暑八易既出人情交慶主聖臣直世希覯其所以蕃祉老夀者當復柱礎棟梁為後人楷模先生曰纍臣得歸骨于秦幸也敢不拜賜自是專教授生徒為事解凍而耕暴背而耨與農人同甘苦乏儋石儲瀟然常樂無憂謖謖泠松下風視變浮雲倘來之富貴罔芥蔕目睫矣己酉冬十月九日猝大鳥集居處村北先生杖藜逍遥其處不樂曰漢楊震之鳥至矣兆在我乎十四日午時而殁年五十有七易簀之日援筆題旌云五十餘年生長人世未盡聖賢之道兩受天禄還形地下難忘君父之恩其自立誌拳拳子孫從善為言無煩辭北地李楨氏曰余歴相州每至商羑里城未嘗不展拜文王祠下登演卦臺徘徊四顧而去噫嘻此大聖人所為也讀漢書蕭望之從夏侯勝獄中受書事又未嘗不賢其人視死不二利害不怵也大凡人之身罹大難慷慨殺身易若虺蜴其身卼􅀈其行方悲號籲天乞延斯須假借而惴不可得獨非具大材力大涵養視患難遝來如蟁蝱過耳烏能坦然由之與之化而齊哉先生苦人所不能苦甘人所不能甘求仁得仁無纎芥尤怨念䕫䕫齊栗惟願國底寜謐而工夫愈久愈邃韋編數絶天地人物吉㓙得失之理探討淵㣲暢為辨義一書與合志友交警身心比老于家動履真確不媿百年身後之名豈非日月爭光川嶽競秀冝人之仰之不能終諼也已穆宗莊皇帝肇極復其官追贈光禄寺少卿廕其嗣先生父攀母李氏祖通整其曾祖也上世無考配張氏生男子四人長偲教諭以嫡孫恒官贈文林郎上林苑左監丞次仕偉俁俱庠生孫男十人長即上林君恒偲出承先生廕悌開㤗慎愉仕出鳳麟偉出效節俁出曾孫十人𤣥孫一人恒遹追先生事命楨表竪阡道楊休烈示來許用申之辭歌以祀先生焉其辭曰漢季清白太尉公曜靈烱烱照丹𠂻蝌蚪狼籍紛磨礱手披六萟方庠洪鸛鱣暮夜燭雙瞳錯落銀浦羅胸中􅀈見欃槍輪翅炵千秋顥盵摩蒼穹萬斛威㽔晃曨曈騎龍寥廓下鴻濛焻輝伯僑趾雌雄虬鱗虎背揺青驄封狐杉鷄竹兎馮排雲閶闔叫不通岸室可作蓬萊宫霹靂神珠走霧雺文章何處覓頽風氷壺玉衡緝熈功脱畧縲絏罔自恫八年厭見赭衣紅霜重皷寒藴氋氃海翻霆走焰燒空儵忽赤鏡聞海東金距唱送襏襫翁黄㡌火耨㵼藥籠一日鵩鳥過林叢石裂天驚逗前蹤苾芬孝祀嵗禋崇黒衣白馬囬闗潼朝陽孤鳳泣梧桐依然沆瀣吸長虹楊忠介集附録巻四

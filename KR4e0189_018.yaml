body:
  text: 楊忠介集附録卷五贈詩奉贈楊斛山先生羅欽順號闕吏部尚人歷官書眼看榮利獨超然家學關西故有傳直擬重隂當晝泯肯虞喬木受風偏雲開月朗誰能卜義重身輕我自權老氣為君增十培願言加飯更鑽堅乙己清源舟中同劉晴川别楊斛山周怡以下共二十三首小小負狂態嘐嘐古之人每談古人事恨不生同辰關西楊夫子心貌上古淳長孺誠往友仲淹乃前生孔未見此剛孟復醇乎醇報主一封疏幽犴五秋春顧豫䝉恩同相對慚非倫蘭薰每荷德濡毫難具陳秋風賦歸與同舟復浹旬長川東到吳明月西入秦獨有盈樽酒共醉清源濵投贈解龍泉精光期日新别斛山晴川二首此日别誠别把袂心如割數年生死情一旦西南隔停雲望漸逺飛鴈聲偏惻蓬室移芝蘭餘芳猶未歇孤舟宿新堤征鞍照初月仰視縱橫星耿耿不泯沒彼美西方人何以慰饑渴江上阻風有懷斛山涉川三缺月鼓楫無長風一葦縱所如漂泊蘆花叢俯觀江水流仰視雲中鴻孤鴻飛漸逺兩鴻遵渚東相顧飛且鳴惻然感豫𠂻彼美西方人華嶽爭巃嵸懷哉鬱方結悠然夕照中何時濯江漢一豁此心胸獄中同楊斛山劉晴川言志勿欺幼所學先憂古何人可以報明主敢不致微身殺身非所惜報主義未伸馳驅縱不獲詭道羞仲嬰白日甚昭昭庶幾照此心吁嗟幽谷蘭飄風遞餘芬鬱彼灌木隂交交黃鳥鳴西圜晚坐呈楊斛山席地簷前趂晚凉幽懷相與嘆流光思危自覺一念折行逺空深雙鬢蒼風景久成人玩習卷舒堪笑此顛狂從今世事都休道只可堅吾百錬剛乙己釋罪三人共舟至臨清别共喜生還出帝州潮平月滿正清秋數年竊領夏黃義千里歸同李郭舟楚澤風煙停望眼秦山雲樹結離憂君恩友愛心無已努力還期到白頭數載艱危同死生寬恩更許共舟行蕭蕭岸柳橫秋色汩汩江流咽别聲苦口難忘藥石語醉心不覺醇醪情壯懷欲上華峯頂石凍春應識富平浩然之氣日日生昏後方知平旦清心苟無忘何有助知誰能致始為誠眼中塵玉俱難著鏡裏妍媸本自明莫謂太虛無障礙青天擾擾亂雲橫奉劉晴川楊斛山用牧之九日韻四十光隂似箭飛因循深愧道心微年來夜氣虛生息何日春風共詠歸掘井未深洙泗水揮戈莫挽魯陽暉泰山頂上空翹首安得乘風一振衣風髙露下白雲飛之子流離嘆式微逆旅天涯終嵗滯扁舟江上幾時歸孤臣自合投幽谷慈母誰憐倚落暉衮職虛期山甫補斑斕竟負老萊衣次斛山韻二首克己工夫問只今廓然灑落此胸襟兢兢朝夕嚴憂惕戰戰淵氷日履臨真妄兩端昭獨見聖狂一念决危心本來面目還無隱忽後瞻前莫浪尋直道難容匪自今賈生痛哭涕霑襟民碞岋岋方危殆天視夢夢不監臨桎梏兩年援溺手焦勞一疏救焚心馳驅範我寧無獲肯枉區區欲直尋書扇送斛山先生乙己臨清分别患難相逢情不朽臨别那堪酌杯酒安能化作隨扇風長得先生一握手斛山巽峯同酌秦醪酌罷亂鄉愁愁逐雲飛天際頭壯志年來還突兀二毛蕭颯笑悠悠中夜惕然呈斛山二首聖人作易憂患中氣象和平自不同萬古斯文昭日月讀來無處不春融天則才踰便是愆良知在我自昭然幾回月夜尋思看展轉何能貼枕眠用韻請益楊劉二公未發求中發自和相資麗澤不妨多詠公引咎惜隂句深愧無能挽魯戈責善楊公直諒心虛咸夫子豈聲音古人友道蕭條盡莫訝迂狂感慨深次采石用晴川韻寄斛山二首秦雲縹眇美人家此夜銀缸爛放花更有滄浪髙興客夕陽時引海西霞聚散尋常肯浪嗟艱虞情境别來賖何時共鼓東吳棹風雨連床㑹更嘉坐斛山先生家槐下萬斛山前柱史家貽謀忠孝里生花庭槐蔽芾諸賢護青䕃留為世世遮日坐槐隂究此心清風似聽斛山吟共期雨露滋新意更長孫枝數十尋斛山先生復同舟浹旬兩有别言用韻奉贈劉魁以下共二十七首秦山千里月楚水一帆風幸出艱虞外同歸畎畝中聖恩真浩蕩天意本穹窿珍重别時語真堪慰轉蓬次楊斛山錢緒山論學韻二首萬物備於我然惟强恕行水流原不息鑑照自能明昏塞非常性開通盡此生功夫能致一本體即澄清又學問無他道惟求德性尊豈無枝葉茂須是本根存內外合非合知行分未分聖狂惟一念吾亦復相敦讀斛山除日懷舊之作其於死生之際念之熟矣次韻紀之讀公詩句識公心臺柏空懷幾夕隂自古友朋情最重而今生死念尤深人間莫嘆無長夀地下懸知有好音此夕聞來增感慨西風老淚倍沾襟斛山用杜工部韻一首見教和答之家住雲津月一溪倚門南望豈終迷駑駘可出冀之北鷗鷺還尋江以西萬死尚留今嵗月一生空歎昔輪蹄牀頭酒在堪同醉有德來將肯似泥和斛山春日韻圜居誰謂日如年也有羲皇到枕邊禮樂原非身外物雲雷亦是性中天風雩沂浴人何在水曲長歌事可憐此日此時隨所寓閒愁莫遣上眉巔囚榻再遷用韻呈斛山捲席為窩不用茅非朝非市亦非郊頗知病骨移囚榻猶勝飛禽宿樹稍塵世於人皆寄寓萍踪隨處即吾巢德鄰自古真難買聊向先生一解嘲夏至和斛山韻八月圜居書滿牀時來數墨復尋行隂陽正玩羲文易風雨俄聞黍稷香周室豈無新典禮楚囚原有舊冠裳窮愁只覺時光短客夢翻憐夜漏長時獄禁加嚴斛山欲絶粒有詩問意次韻吾儒只養此天真飲食原非尺寸身事若到頭惟有死終為宇宙一完人又次韻答周訥溪來問偶同斛山可生可死尋常事此理還須實見之自靖固知無此日殺身何忍纍明時次斛山見答韻萬心原自一心觀人已何嘗有兩般若到必誠還必信果然非易亦非難斛山因有感復欲絶粒次韻答之憂患何堪風雨頻加餐幸愛百年身閉關不患無竒術只恐厄臺來笑人過德州次訥溪韻寄斛山才過滄州又德州緑楊堤岸菊花秋未論秦楚萬餘里且共風波一葉舟農圃漁樵俱是學江湖廊廟敢忘憂獨憐老腳還堪走擬約同登華嶽頭斛山訥溪有作見貽次韻奉謝患難同居俄五載敢於罪禁憶家鄉每勞此日傷懷切愈覺斯文氣味長萬死難回明主意一生多負好時光蘭薰澤麗亦何幸似此餘齡托上蒼斛山先生亦以是月二十四五旬用韻奉祝萬斛山頭人玉立關西夫子又同鄉叢蘭共訝六年久古柏爭看百尺長坤道時行成化育聖𠂻天啓慶明良吾儒真夀原無極炯炯雙瞳鬢未蒼次訥溪懷斛山韻羣居豈不久私心正難割一朝秦楚分萬里雲山隔追悔已遲遲瞻望徒惻惻丈夫志四方茲焉誠小歇至難得者人無情此嵗月靈光本自然萬古常不沒倬彼華山髙慰我傾心渴和斛山韻世上誰青眼人間我白頭惟尋顔氏樂不學杜陵愁裒痛思難報原貧給尚周白駒誰氏子皎皎薄公侯斛山於聚講異同頗覺動心即席口占解之先生豁逹本天然近覺音容不似前口角異同寧有定眼前風月正無邊迂踈老去誠無補內外年來似頗忘不問回琴與㸃瑟但看雲影共天光和韻答斛山此身之外任窮通不問夭桃與澗松天地盈虛無别道聖賢學術只求中千般變態尋常事萬古幽期志業穹狐貉羊裘何損益山林朝市本來同答斛山論學二首每領無言教殊聞有覺天觀磨真受益默識信非禪正直剛柔克危微精一傳古人維此學君亦庶幾焉又司馬坐忘論伊川謂坐馳多言非所貴主靜是吾師四勿真由已八條只致知此關若不守倀倀欲何之次斛山韻别緒山易道如公已久明旦隨時止復時行操持常見主翁醒念慮渾無客感生君子憂虞隨所寓明時刑罰自然清從來不信别離苦今日方知離别情次斛山韻奉蔡洨濵道長學術平生只一誠夢中還見友朋情王臣在我無中外吾道於人有重輕月到蒲臺天自曉洨從洙泗水常清當年驄馬行春處此日猶覺景氣明用斛山韻答白樓十畝寧無桑柘隂倉庚時復㺯春音功名已了癡兒事南北何堪異日心珍重趨庭詩禮訓行歌擊壤短長吟山林事業無拘束端坐從容一正襟追悼周磧山次斛山韻人生誰不死而肯為身謀但覺君恩重難將諌草酬空懷千古恨未了百年愁回首生前事能無老淚流和斛山韻絃誦餘千載今猶說武城古人不可見至樂本無聲宇宙吾儒事舟車盡日行共憐陳迹逺誰識此時情馬理明月山前水帶圍葉花開盡果花飛山川誰為爭光采太宰莊東有繡衣太宰張鸚庵也龔湜不見關西楊伯起壬辰丁酉六年間為問平生心衮闕如何今日卧商顔簞瓢陋巷同誰樂野水孤舟盡日閒海內生民多困病應須膏澤下塵寰赴獄門哭贈我愛關西楊伯起青天白日照丹心可憐相慕不相見翹首天門恩澤深謝東山字闕人髙泉北寺原知禍南冠總解醒燕臺朝閉日豐劍夜衝星主聖諳忠直名髙重汗青手扶慚薄力腸斷憶空囹又驪頷探珠拙圜扉坐石堅乾坤三益友饑凍幾經年玉汝天機密金吾地主賢緇衣人不見授粲益悽然梅守德字闕御史人都天下竒男子關西老鳳翎孤忠懸日月直氣犯雷霆漢獄傳經滿元城睡夢寧陽和不擇地指日到深扄又吾愛關西子丰采天下竒峩峩鐡豸冠詎肯狥狐狸有言剴以切有志苦以悲生平報國心耿耿方在茲吁嗟丈夫身百年苦易馳生逢堯與舜肉食將何為斛山歌孫繼魯字闕御史諡人官副都清愍我聞萬斛之山在富平凌雲倚漢自崢嶸俯瞰黃河下底柱遙瞻華嶽參長庚出雲觸石幾萬載千里秦川成陸海鍾靈育秀人絶奇獨立巉巖對真宰收拾清風入穴中阜財解愠禆重瞳髦頭却顧伊吾北赤子長懸渤海東補天不用五色石浴日全憑一片赤祗求鎮定棟乾坤未與浮沉論堅白淹留天理忽過關孤髙無謝首陽山薇生太平且莫採至今永久當賜環賜環非為重青紫滿眼繁華誠敝屣殿邦直擬太山安大猷共濟虞周美虞周濟美竟如何維嶽降神海不波象成作樂昭明德馨香不盡山之阿聶豹字闕尚永豐人官兵部書諡貞襄三人五載同幽拘講易談詩更授書眚災肆赦自天下愚忠狂直皆蠲除鴻冥鳳覽杳然去我來聲影不知處關西夫子氷玉姿風月襟懷返星渚耕雲釣月有餘閒醉後元城冝鼾睡嗟哉主聖未可忘酒醒鼓腹歌虞唐趙正學字闕亷使人官天門日射雙龍闕雲净春歸萬斛山千載幾人推伯起髙風隨處可亷頑戴經字闕鎮撫人先生希聖只求中不似禪家認色空抗疏力能回化日廬居心欲變淳風憲臺驄馬千人避犴狴芳葵兩度紅大道豈違憂患處徐行細數落花叢韓二憲字闕繫朝邑人寄贈錦衣獄聞說天朝釋罪人迢迢消息恐難真只期名照他年史豈料生全此日身耿耿丹心惟報國紛紛白首愧為臣故緣聖主多恩澤益顯髙皇有救神夢裡分明見故人云云心事對吾真但求無愧非要譽只欲成仁肯顧身感悟幾時回聖主拘囚何日釋忠臣東床不寄平安信極目燕雲益愴神趙桐字嶧山綘州人富平知縣慷慨殺身易從容就義難誰知千載後獨有一斛山忠義抗疏直奸諛盡骨寒聖明恩德厚委曲放歸還趙卿字闕總兵人官耿耿孤忠出性成抗疏朝奏動神京長孺未得專前美柱史于今擅後名補過拾遺臣子分用賢逺佞聖王明惟知望主同堯舜此是先生一念誠先是慕公者競為詩以銘其節而余和之書京邸二首李應策字蒼門蒲城人官太常中流聳峙壁孤超耿耿寸𠂻思欲焦霆觸軒墀來震撼風生臺閣退炎熇旌名禁葺朱雲檻納約勉從薛德橋九死一生言不諱千秋正氣碧冲霄易學精微按象爻胸中涇渭幾曾淆陽城憂國麻從裂古弼匡時奕任拋曉色龍螭回聖霽春光犴狴荷天包匪躬一代嘉忠鯁歸去猶崇洗耳巢馮守千古孤忠羡責難先生丰采動朝端玉階碎首心曾剖不愧龍逢與比干原寀字方畦蒲城人官刑部員外抗節七年答聖主孤風一代屬英豪三杯桑落乾坤闊萬斛山頭日月高去君逺也劉質字闕城夀張人蒲主簿含淚憂時憶賈生危言正氣兩相成只因當道豺狼振竟奮朝陽彩鳳鳴補衮天庭匡國重批鱗龍頷為身輕葵心已動君威霽青史樂傳聖直名僧孤松夫子當朝傑孤忠振古今九重收諫草四海仰規針直氣天人護髙風魑魅欽行看起宣室日月自光臨僧無著憐君當日事天地晝常隂萬代昭青史一時見赤心亡名氏書于陜州鋪中不知其人元旦僅雪非瑞祥輔臣阿譽諂君王關西夫子真能諫不說昌黎佛骨章挽詩周宇字子大號槐村咸寧人關西此地歸夫子薄海都知抗疏危正氣朝綱長不死完名丘首更何悲髙原多長批風草直本應無戀劍枝道上莫橫三尺碣恐防過客走車旗周怡奠墓關西夫子楊伯修萬里修途遽蚤休聖恩蕩蕩竟莫報後學貿貿將焉求一代聲光齊華嶽百年骸骨首山丘知君英爽應常在閩海還期神共遊壯志嘐嘐欲進修罪餘衰病意全休關西大鳥來何迫白下孤雲杳莫求絮酒不堪澆宿草吳鈎空自掛荒丘兩年奔走傷心地拄杖從誰話逺遊幽居君遇端陽七幾度蒲觴眉共顰多懼不知淹節序先憂早已致殘身聨詩尚憶花間句對酌時懷石凍春富平酒名此日生芻投墓下徘徊悽愴倍傷神馬理石川御史鐡肝腸萬死不回道直方曾子學從魯有得仲由聞過勇非常一封書奏扶堯舜八載天隨轉聖皇詔獄放歸期望逺德星零落智愚傷金粟山前報國臣精忠直上比干鄰乾坤知多就寓者得似從容有幾人李應策謁墓不說臺端豸錦榮英標直節慕生平文章霄漢垂丹筆儀度巖廊著白珩浴日兩疏風烈烈掀天一臂氣轟轟絲羅猥結潘楊好餘韻夕郎兾鳳鳴當朝鐡漢獨依公遺趾斛南正鬱葱那有嚴霜回徑草依然赤日抱丹楓十郎宅第燕山近塋距家咫尺伯起陵園華嶽崇氷玉世承清白約濃沾渥露别精忠時方結㛰謝瑶字闕人泰和駭聞華嶽斛峯頺失望蒼生血淚哀墮宿光芒驚烈地扶天筋力震鳴雷七年幽禁風中燭萬古清香雪裏梅全德死生無愧怍聖賢相對好顔開程九萬號嶽峯汝南人有序斛山先生豫未識面辛丑春㑹試禮闈適公疏言朝政豫聞而重焉次日有持公全稿見示見其憫流民之失業因陳時事之大不韙者五皆言人所不敢言當時一且為公慶一且為公悲焉悲其首忤權奸卒犯聖怒繫獄者前後八年慶則為有先物之智有憂時之仁有愛君之忠土木方士于清朝不無少纍其言如燭照數計無一不驗不數載權奸俱以罪死智而且仁忠莫大焉近與公之鄉人稅使王子憲談往事知公正終牖下二子力學是天佑其全而歸之也且有昌後之祉焉豫汝人也生雖不同鄉而心同官雖不同御而道同萬亦有憂時之策愛君之書又未知得達宸聰否故于斛山之殁重有感而為詩以弔之正氣塞天地棟隆憶罕存古今更幾世把握在敦根有本斯蕃葉無松不翠園寒霜凋萬卉闕秀後春繁惟君能善養窮達無夷險釋褐猶寒士鐡冠不知諂行人改直指驄馬誰敢犯日繫窮民苦封章胡肯掩元凶為國柱跡隱無人論闕氷壺外疏明肝膽真黃冠與土木時弊是闕千餘言無非愛國仁天王豈不知藥石苦難忍闕黃霸拘終為緑野簮龍逢固自况刀鋸何足臨羑里闕再入豈畏深章綸罹楚毒國是盡亞卿黃鞏曾留駕今皇贈爵榮聞君已正斃白鶴兆兩楹誓死如烈日褒贈奚關情忠臣死無愧孝子乂當羡廬墓在親側六年未嘗變平生甘淡薄咬菜勝粱膳家國原一道順寧吾自遣鄉賢有張公虛位待君席後進追先達富平土再赤我朝養士久屈指幾人奕國史未盡公芳名萬古赫薛敷政字闕有序嘉靖中有三楊而侍御公爵以直諫忤旨上震怒下之獄户部主政周公天佐為九廟災抗章陳救錮死獄中楊公為立傳并哭以詩余固聞二公之忠而㑹周公孫一騏官胄學豫僚誼又大父舉乙未榜公之同年也因得所刻傳疏次楊公韻以志髙山景行之懷嗚呼士固有心豈隨時變公之精誠貫日月慷愾泣鬼神况余通家能忘惋惻因含淚而書之漢傅三年慟湘魂萬古愁感時俱有淚未忍向誰流又丈夫非願死羞作强顔生國定堪酬念身捐豈賴名雙忠他日事一疏此時誠莫怨逢辰急繇來命可輕天王收震怒一死一還生落落交非厚悠悠逺共名清標心目耿直節意何誠但使劻勷濟榮華寸縷輕又每逢孤亮慨偏深况是通家激寸心千里間關蕭寺夜不知清淚墮誰襟國子先生振祖風惠余編帙讀曾終長沙莫恨新來謫珍重清時有路逢楊雲玖師以先忠介公集見示慨然有作翁𦙍春字克生永嘉人每於青史吊忠魂清白傳家古照存短疏千章能悟主遺書一架此詒孫關西孔子名常在吳闕童譽自尊花滿江城春雨足應知豐芑緑隂繁楊忠介集附録卷五

body:
  text: 楊忠介集巻六明楊爵撰語錄論道天命謂性性原于天也率性謂道動以天也修道謂教求盡其天也戒懼慎獨自修之極至於中與和也中和性命本然之則也能致之則動以天矣故其效至於天地位萬物育道不可須臾離可離非道是言當戒懼之意莫見乎隠莫顯乎微是言當謹獨之意應酬是有睹有聞不睹不聞是無所應酬之際也如出門使民是有所應酬則有睹有聞或問程子未出門使民之時當何如曰此儼若思時也儼若思即是戒慎恐懼之意為功夫尚未説到極至處故又提慎獨二字使人雖在暗室屋漏之中一念發動之際凜然畏懼不可少怠不敢少息則天理常存私意不萌純一不已而合乎天矣中和心之本體也未發之中萬物皆備故為天下之大本已發之和大經大法所在而不可違故為天下之達道怒與哀中節皆謂之和致中和止至善之云也天地之位我位之也萬物之育我育之也君子之中庸中庸人理之常也小人反中庸豈人理哉時中者黙識其理而妙宰物之權也若非禮之禮非義之義豈時中之道哉小人則率意妄為而已天下之道至中庸而極理得其㑹同義至於入神非至明不能察其幾非至徤不能致其決故民鮮能之矣董常問文中子聖人有憂乎言天下皆憂吾何獨不憂又謂樂天知命吾何憂何必如此説聖人固未易及然常人一念之發得其本心則與聖人之心無以異但聖人純亦不已衆人則或存或亡而已憂樂皆人情之常而本於性也豈聖人獨有樂而無憂乎若曰樂天知命吾何憂不成父母病聖人亦樂天知命而不憂乎豈人理也哉漫錄夜初静坐少檢㸃日間言行因司馬温公論盡心行己之要自不妄言始夫不妄言所言必皆當理非心有定主豈能至此故輕躁鄙悖及事務瑣屑無益身心而信口談論者皆妄言也因書以自戒作一好事必要向人稱述使人知之此心不定也不知所作好事乃吾分所當為雖事皆中理纔能免於過惡耳豈可自以為美才以為美便是矜心禹之不矜不伐顔淵無伐善無施勞此聖賢切己之學也與人論事辭氣欠平乃客氣也所論之事雖當於理即此客氣之動便已流於惡矣可不戒哉書以自警予久處獄中麄鄙忿戾畧無貶損麄鄙忿戾乃剛惡也負以終身而不能變真可哀也因思横渠貧賤憂戚玉汝於成乃惕然驚省嚴然愧耻今日患難安知非皇天玉我進修之地乎不知省愆思咎而有怨尤之心是背天也背天之罪可不畏哉予繫此四十一月矣邏者日在側覘予動作有甚厚予攜壺酌以伸問者後一人來甚横逆予卧於舊門板上阻之以席其人皆扯毁之謂予罪人不宜如此又往往發其厚予者使人知之曰某日某皆潜獻其處者葢令其得罪以見巳薄之為是有蘓喬二人皆厚予者乃忿忿不平揚罵曰是固無傷也予非私交化外人雖得罪亦何憾予與劉子煥吾周子順之同飯後因論人才各有所宜予謂二公自度宜何責任劉子曰吾為孟公綽可周子曰今日府州外任勉强幾分予曰滕薛大夫聖人固不許公綽在春秋時欲盡其職亦非易事觀於子産相鄭可見然則孟公綽亦不可輕㸔一人因狂病迷謬入朝立御座上捕下法司擬重獄成未決其母詣登聞皷稱寃順之在吏科時直受皷狀遇此事未為准理順之因問予使公遇此事當何如處之予曰當論其狂病誤犯不可加罪但罪守門者失於防禦則可矣劉子曰當封進皷狀使朝廷知其以病迷下法司從末减可也順之曰此固皆是但如此為之必得罪以此小事得罪吾不欲也劉子謂論人無罪不當殺恐非小事予曰此皆論利害未説到義理處若論義理則當為即為當止即止豈計得罪順之以為然好議論人長短亦學者之大病也若真有為己之心便惟日不足戒懼乎其所不睹恐懼乎其所不聞時時刻刻防檢不暇豈暇論人學所以成性而已人有寸長取為己有於其所短且置勿論輕肆辨折而無疑難涵蓄之心謂之喪徳可也此予之深患不能自克可愧可愧道心人心只以是與不是求之一念發動的不是則為人心道心極難體認擴充戒謹恐懼之功少有間斷則蔽錮冺滅而存焉者寡矣故曰惟微人心一動即在凶險路上行矣喪徳滅身亡國敗家由於此故曰惟危所謂卿士有一於身家必喪邦君有一於身國必亡内作色荒外作禽荒酣酒嗜音峻宇雕牆有一於此未或不亡則人心之危真可畏哉易謂險以說困而不失其所亨其惟君子乎予久處困難亦時以此自慰但罪惡深重為世道之損者甚大仰愧於天俯怍於人襟懐滯礙鬱抑不安之時常多心静則能知幾方寸擾亂則安其危利其災禍幾顯著而不能察矣況於幾乎幾者動之微而吉凶之先見者也所謂先見亦察吾動是與不是而已所動者是吉即闗於此矣所動者不是凶即萌於此矣意向少離於道則步履反戾差之毫釐謬以千里矣故學者以慎獨為貴予稟性麄鄙動輒乖謬夜間静坐思此身過惡真不自堪真難自容可謂虚負此生矣年踰五十血氣漸衰老景將至始自知過則已晩矣可勝嘆哉尚幸殘生未冺欲自克勵求免於惡終耳書以自警顔孟二大賢雖氣象不同而學則未始有異顔子之學在非禮勿視聴言動不違仁不遷怒不貳過孟子之集義養氣擴充四端求放心存心養性以事天則亦顔子克己復禮之學也天下萬變真妄二字可以盡之偏蔽者妄也本體則真也學所以去偏蔽之妄全本體之真全則道本於性性純乎天立人之道始無愧矣天地亘古亘今但有此一箇大道理則亘古亘今之聖賢不容更有兩様學問也見獄中或有警擾呼左右問何事久而思之此動心也身居此地須要置生死於度外刀鋸臨之從容以受致命遂志可也此正是為學用功處因思劉元城鼾睡是何等胸懐可謂毅然大丈夫矣今日蚤起朗誦君子之所以異於人者一章即覺襟懷開洒心廣體胖有西銘與物同體之氣象此心易至昬惰須常以聖賢格言輔養之便日有進益士之處世須振拔特立把持得定方能有為見得義理必直前為之不為利害所怵不為流俗所惑可也如子思辭鼎肉孟子却齊王之召剛毅氣象今可想見真可為獨立不懼者若曰事姑委曲我心自别即自欺也始或以小善放過且不可為小惡放過且可為之日漸月磨墮落俗坑必至變剛為柔刓方為圓大善或亦不為大惡或亦為之因循苟且可賤可恥將以惡終而不知矣此由辨之不早持之不固也書以自戒涇野吕先生過某府太守侍坐太守子讀書樓上聲徹于樓下太守令止之曰當微誦恐損傷既又促左右以時進食曰勿令饑又戒之曰當為掖之恐或蹉跌先生謂太守曰公之愛子可謂至矣願推此心以愛百姓可也遇順徳府太守餞于門外餞所近養濟院先生以饌食一卓令二吏送院中謂太守曰以公佳饌與無告者共之願公體我此心以惠恤鰥寡可也訥溪周子述以告余余為嘆息者久之古人以離羣索居為深戒子貢問為仁孔子告以事其大夫之賢者友其士之仁者使志道君子常得與先生相親焉獲覩徳容聞至論以自警省不患徳之不修而政之不善也嗚呼仁人君子之言其利溥哉智者自以為不足愚者自以為有餘自以為不足則以虚受人進善其無窮矣自以為有餘必無孜孜求進之心以一善自滿而他善無可入之隙終亦必亡而已矣書之以自勵焉平時所為得失相半求欲寡過而不可得幽囚坑久繋中頗覺省悟始有向學之心然殘損餘息血氣衰減策勵不前虚生人世與草木同腐矣可愧哉蚤起散步圜階日升東隅晴空萬里鳶鳥交飛不覺襟懐開灑萬慮皆空因思曽晳沂水氣象亦是如此癸卯嵗季冬十三日書古人立已甚嚴其責人甚恕今人立已甚恕其責人甚嚴孜孜為己不求人知方始是學夫子答顔淵為仁之功在非禮勿視聽言動居髙位有高位的視聴言動居下位有下位的視聴言動處患難有患難的視聴言動臨死時有臨死時的視聴言動道無不在予與劉周二公倚圜墻北向坐一人解於北墻下相去甚近二公訝之曰何不少避予曰此鄭瞽人旋於宋朝之意葢謂我無所問也因置一甎奠食碗置之未安之處此心不已必欲既安然後已將一箇身心不㑹置之安穏之地如箇無稍工之舟漂蕩於風波之上東風來則西去西風來則東去是何道理則是置此身心不如置此甎之敬慎也六月初八日夜初寢夢一男子長身少鬚鬚間白呼爵相拜曰予王陽明也數談論未嘗自言其所學語未畢忽驚寤予瞿然曰是何先聖先賢來此以教我乎或慷慨殺身於此地如劉忠愍之類者相與邂逅於夢寐乎明早當焚香拜謝之俄而屋脊墜一小甎塊於卧傍木板上聲震屋中守者驚起初九日早辰記初九日夜夢一廟中塑伏羲像所服甚古雜以洪荒草服一人講易十三卦制器尚象之義於廟問之乃程先生也聴有儒士二人予入獄中四十一月夢闗義勇武安王與予遇者三亦有無言時亦有數相語時連日天雨獄中木板皆濕予體弱少食因思小兒在外父子五年不能相見衣食不能相顧時張道全伍天夀二生皆在外候予與小兒同處數日消息未聞為之戚戚又思素患難行乎患難事至於此皆天命也當安受之陳少陽歐陽徹二公未嘗傳贄為臣以言語自任而殺其身況予論思之職敢不盡臣子一日之心乎盡此心以求自慊則或死或生豈可逆料予居此四年邏者候予有言日必録予頗聞之毎見未嘗一言相答有以予不言回報者必笞之有以其言作予言以回報者又以不似笞之於是邏者窮矣多以情相告求予言以免其笞且曰事關於忠義者願得數語子應之曰吾奏章數千言字字是忠義句句是忠義乃以為非所當言而深罪之今若以忠義騰口舌於爾輩之前是吾羞也一邏者求予有言情甚切至予應之曰語出於無心者公記去則予心無愧若出於有心是故為巧語轉移天聴以苟免罪難也予實羞焉況一有此心是即機變之智巧舉平生而盡棄之天必誅絶使即死于此其人慘然曰公之心如此子再不復求公言矣又一邏者告予曰今日好言語上之矣問之乃太甲篇天作孽猶可違自作孽不可活又繼之曰我乃自作孽者故罪至于此予應之曰吾為言官天下事皆所當言往時一疏上為朝廷下為蒼生宗廟社稷萬萬年深長之慮豈自作孽者其人黙然晴川劉公陞工部將之任冢宰羅整菴翁家居劉公辭行整菴贈之以詩既劉公下獄與予誦之予與藴山錢子皆依韻和之後人傳其詩於整菴處近一士夫來京整菴公語相告曰向日得詩和答已具但欠推敲未可寄去予曰此非欠推敲也元老大臣家食十年未嘗以書簡通權貴乃以一詩交罪人可乎此老可以為法甲辰年六月十二日記癸卯年二月内馬主政拯以事下獄馬十九嵗發解廣東二十舉進士任工部主政器度識見人未易及告予曰聞近士大夫言自古人主有本事者惟秦皇漢武兩君而已予應之曰否自古人主有本事者惟堯舜文王而已堯在位百年萬邦時雍治極當亂之時而子丹朱又不肖堯乃尋一個舜將天下分付與他愈至於治舜在位五十年四方風動亦治極當亂之時其子商均亦不肖舜乃尋一個禹將天下分付與他亦愈至於治文王深仁厚澤延周家之基業至八百年堯舜文王以天自處氣運興衰不在於天而在我所謂通其變使民不倦神而化之使民宜之者此其本事何大哉秦皇剪除六國焚棄詩書掃滅先王之迹而惟任一己之私一夫作難而七廟隳身死人手為天下笑漢武承文景之富庶若委任賢俊取法先王則禮樂可興顧以多欲亂政窮兵黷武至於海内虛耗幾致顛覆非有昭宣繼之則漢之天下未可知也若二君之所為適足覆宗絶祀而已烏在其所謂有本事哉且使人主不法堯舜文王而法秦皇漢武是啟其殺伐之心而欲以亂天下也其所言謬妄亦甚矣馬出獄數月以病卒予甚悼之閒步垣中井上日色慘淡光景寂寥下視井水湛然清澈因思井渫不食為我心惻為之戚然嘉靖乙巳年九月初五日朝發濬縣晩宿林清店店主醜惡買麵食用醋其人吝從者曰此不過費銅錢一文其人應之曰雖與十文吾亦不賣又欲買小米次蚤作粥其人亦固拒之予聞矣呼從者止之曰再勿與語此數家之隙地或有賢者無招客屋而有屋者又非賢因思昔人言堯舜以天下讓而世之匹夫爭半錢之利人品相去何啻九牛毛易曰初六童觀小人道也此市井之常度其識見止此無足怪也大人當治安之時為危亂小人以危亂之時為治安皆此小闕文也有大人之向慕有小人之向慕有大人之識度有小人之識度有大人之作用有小人之作用此天地生物之不齊教化之施固有要而以宇宙間事為己責者不可不慎也乙巳年九月五日燈下書論文文章以理為主以氣為輔所論純是一段義理是以理為主辭氣充盛渾厚不覺軟弱是以氣為輔須胸中正大不以偏曲邪小之見亂其心又廣讀聖賢格言以充養之如此則舉筆造語皆自胸中流出其吐辭立論愈出愈新而無窮也如取之左右逢其源也其騰匯洩蓄流轉渾厚波瀾汪洋如決江河沛然莫之能禦也其光燄發揚照耀昭灼如日月中天深谷窮崖之幽花石草木之微青者自青白者自白仰之以生輝觸之而成色也馮司空語錄附馮先生曰吾闗中如王端懿之事功楊斛山之節義吕涇野之理學李空同之文章足稱國朝闗中四絶然事功節義係於所遇文章係乎天資三者俱不可必所可必者惟理學耳吾輩惟從事于理學則事功節義文章隨其所遇當自有可觀處不必逐件去學而後謂之學四先生也先生曰事功如端懿節義如斛山真為國朝第一然學端懿者不當學事功學斛山者不當學節義何也假如端懿當日上疏後即觸怒逮獄遭譴被播如斛山則端懿當以節義名不得以事功名矣如斛山當日上疏後䝉温㫖嘉納陟華躋膴則斛山又當以事功名不得以節義名矣可見吾輩只當就二公同道二公易地皆然處學不當在事功節義上學但不知二公同道處何在易地皆然處何在願共思之母草草㸔過問楊斛山先生大節凜凜一代不知何修至此曰先生學問亦從鷄鳴孶孶為善一念來觀其詩有曰病潜隠處最難醫拔去深根思匪夷舜蹠相懸初未逺差之千里自毫釐又云一原萬象皆同有要把心從此處知善到公時多少大須知無我是無私觀此則先生生平大節葢有所本云楊忠介集巻六

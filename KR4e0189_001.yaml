body:
  text: 楊忠介集巻一明楊爵撰奏議固邦本䟽題為彌災變安黎庶以固邦本事臣于嘉靖八年十月内承制往湖廣公幹即今事完回還臣知陛下哀憫斯民之心懸于閭閻之下凡四民利病民間休戚必欲聞之故今謹述所過地方災傷生民可痛之状為陛下言之南北直𨽻河南山西陜西等處地方當禾苖成熟之日蝗蝻盛生彌空蔽日積于地者至三四寸厚将禾根食之皆盡居民往往率婦子将蝗蝻所食禾苖痛哭収割以為草芻之用其他蝗蝻稍少之地禾苖食有未盡者頗有秋成之望矣未及成熟嚴霜大降一時盡皆枯槁遭此災變民失依倚去年冬月民所資以為食者皆其先時所捕曬之蝗蝻與木葉木皮等物當此之時民之形色顛悴雖甚可哀而死于道路者尚未多見比及今春臣復經此地每見餓死尸骸積于道路者不可勝數又見行者往往割死者之肉即道傍烹食之又聞有父子相食者井陘縣一日而縣官獲殺人食者三人臣聞之拊膺大痛食不下咽自謂有司必能具奏聖明在上聞有是事必至流涕比臣到京聞廟堂之上救民之死非其所急而所議者郊社之禮耳㣲臣憂國愛君之心切於中而不能不有所言也昔者漢文帝之時家給人足海内富庻賈誼上書猶曰可為痛哭謂抱火厝之積薪之下而寢其上不可謂安况於今日時勢當何如耶古賢王之治天下也生養遂而後教化行教化行而後禮樂興方今災傷之地生民死亡十有六七存者起而為盗賊雖稍有積蓄之家亦難保於自食其勢渙㪚不可收拾朝廷之上舍此不之憂而議合祀分祀之禮是所謂不能三年之䘮而緦小功之察放飯流歠而問無齒决也夫民惟邦本本固邦寧民心離散邦本不固土崩之勢可以立待縱使周公所制禮文盡行於今日亦何補于天下之亂乎深念及此可為寒心不知陛下宵旰之際亦甞慮及于此乎左右謀國之臣亦甞言及於此乎且南北分祀以復先王之禮非不可也但今日救民死亡之日而非興禮樂之時也自古國家衰亂未有不由民窮盗起而為上者不知憂恤遂至人心離叛而天命亦去宗社不可復保矣故臣之所憂者不在府庫之財不能徧濟天下而但恐陛下無憂勤斯民之心也夫憂民即所以憂國治民即所以治國也陛下日事經筵雖隆寒盛暑未甞少怠臣知陛下鋭志太平而欲為堯舜之君矣盖堯舜之心急于救民一民饑曰我饑之也一民寒曰我寒之也假使當時餓死之民滿于溝壑有如今日堯舜之心當何如哉臣願陛下上畏天心之儆戒下憫斯民之死亡不遑他務專廣仁恩移此議禮之心區畫賑濟之䇿以長沃民生則皇恩浩蕩孰不頌明明天子深仁廣被在在戴生我父母向之枵腹待哺者今有飽食之慶矣向之妻子離㪚者今有室家之樂矣民心已渙而復収邦本雖揺而轉固縱值天時之災鮮不以人力勝之也海宇蒼生享太平之福聖子神孫纘萬年之緒者端在此矣臣不勝戰慄儆惕恐懼之至隆治道疏題為慰人心以隆治道事臣惟人主一身萬化本原履至尊之位膺艱大之責用人行政是非得失方在㡬㣲而闗于民心之向背天命之去留者即甚可畏也是以聖帝明王深察乎此制治必於未亂保邦必於未危事無㣲而不謹時無暫而不懼㡬無隠而不飭為大於其細而圗難于其易然後天人交與而可以延國祚於永久矣方今天下大勢如人衰病之極内而腹心外而百骸莫不受病即欲拯之無措手之地以臣觀之其危亂之形将成目前之憂甚大也大抵因仍苟且兵戎廢弛奢侈妄費公私困竭奔競成俗賄賂通行遇災變而不憂非祥瑞而稱賀讒諂面䛕公肆欺罔士風民俗于此大壞而國之所恃以為國者掃地盡矣撥危亂而反之治安此在陛下所以轉移率勵之者何如耳况當朝覲大比之期有司多士濟濟来趨延頸思化人人切仰極重不可反㡬失則難濟伏願陛下汲汲於此時留心焉以為善後之圗也臣以病居林下者八九年誤䝉聖恩賜之起用擢以耳目之官任以糾劾之責受命以來蚤夜耿耿每思國事日非而臣於國恩有未報至於痛心流涕者有之臣請畧舉目前所見其大要足以失人心而致危亂以貽聖心之憂者為陛下告誠不忍黙黙保位以上負陛下之洪恩下負生平之所學也伏願聖明垂聴焉臣竊惟天下之患莫大于以危為安以菑為利實則可憂而以為大可樂法家拂士日益逺而快意肆情之事無敢有齟齬于其間積弊而至于蠱則不可得而救矣此實天下之大患也往年夏末入秋恒暘不雨畿輔千里已無秋禾既又立冬無雪暖氣如春元旦僅雪即止民失所望洶洶無聊憂旱之切逺近所同此正陛下撤樂减膳率臣下以祈恵寕之時也而在廷之臣如大學士夏言數人者乃以為靈瑞而稱頌之其欺天罔人不亦甚乎其不㡬于安危利菑而以大可憂者為樂耶孔子告顔淵為邦在逺佞人若是而謂之佞人者非耶大臣之職輔君當道志于仁而先天下以為憂者也無忠君體國之心而居人臣之極位所謂小人而乘君子之器也欲天下之治安可得耶又如翊國公郭勛者中外皆知其為天下之大惡朝廷之大蠧也勛之舉動蹤跡豈能逃于聖鍳雖陛下盛徳優容不忍即罪神謀逺慮自有所處臣愚以為奸不可近惡不可長若止之于㣲遏之於漸則朝廷優禮人臣之體貌未失而勲戚之餘裔亦得以保全而善終也或使稔惡肆毒潜干政柄則羣狡趨赴善類退處其為天下國家之禍日益深矣治道去其太甚者此其為害治之人之甚所當急去而不可緩也凡此任用匪人足以失人心而致危亂者一也天生斯民立之司牧君人者奉天以安民而使之各得其所也民不得所則其心不能無怨民心怨則天意可知矣古者民勤于食則百作廢今民勤食不可得而至於離散離散無所歸而至于死亡臣近廵視南城兩月中凍餒死者八十人此特南城一廓耳共計五城未知有㡬目所不及見而在于千萬里之逺者又未知其有㡬孰非陛下之赤子也而顛連無告委命溝壑盖望一豆羮蔬食以延湏臾之生而不可得也此正陛下愛民惜財與天下休息之時也而土木之功十年于此矣而尚未止工部屬官添設者至數十員又差部官逺修雷壇以一方士之故浚民膏血而不知恤則民何以得其所哉民惟邦本本固邦寧窮民之力盡民之財是自蹷其本根也而國何以為國乎昔漢文帝惜百金之費不營一臺故海内富庶隋氏以盛修宫室而至于亡國願陛下以為鍳戒則宇内生靈之慶也况今倭寇跳梁内寇竊發警報日聞加以頻年災沴上下一空百計取之愈為不足而興作未已以結怨于天下此其足以失人心而致危亂者二也唐虞三代之世君臣毎以勤敬之道交相警戒其見于經傳者如堯舜兢兢業業無怠無荒禹惜寸隂湯坐以待旦文王日不暇食武王以敬而勝怠故能壽躋耋朝治隆熈泰是數聖人所以崇年益壽善政和民之道不外乎敬與勤而已矣周公召公之相成王也周公則以逸而戒之召公則以敬而勉之盖敬逸之間身之修否政之理亂所由分此固周召忠君懇惻之心也陛下即位之初勵精有為不遑寧處甞以敬一箴通示天下其于堯舜三王之道盖已心得之矣近年以来因聖體違和朝儀間闕經筵未講大小臣庻朝叅辭謝未得一覩聖容敷奏復逆未得一聆天語若是者今已久矣夫天位者艱難之器非逸樂之具也陛下一身天地百神賴以享六軍萬民賴以安一日二日有萬㡬之繁近聞聖躬調頥大獲福履中外臣民罔不歡慶况此春氣漸和人思新化庶官入覲雝雝肅肅来自萬里之逺者孰不欲鞠躬垂委北面舞蹈望龍顔以慰快覩之心乎易曰聖人作而萬物覩正今日之事也若未得瞻於咫尺天顔之下以伸有孚顒若之敬臣恐人心日益怠惰中外日益渙散非隆古君臣同寅協恭以臻太平之氣象也此其足以失人心而致危亂者三也執左道以惑衆聖世所必誅而不宥者也今巧言令色列於庭苑金紫赤紱賞及于方外之士臣不意陛下睿哲先物明見萬里而所為乃至于此夫保傅之職坐而論道古人謂官不必備惟其人故非道隆徳盛極天下之選者不足以任此責今舉而畀諸迂怪之徒輕之若流品之末則名器之濫至此極矣且陛下以天縱之聖資為上天之元子若逺宗帝王之道近守祖宗之法細旃廣厦之下與公卿賢士講論治道則心正身脩與天地合其徳與日月合其明和氣致祥罔有天災而山川鬼神莫不寕矣安用假此妖誕邪妄之術列諸法禁之地而藉之以為聖躬之福耶甚非聖天子所以崇正逺邪平平蕩蕩奉三無私以化天下之之道也臣恐風聲所及人起異議豪傑之士聞而解體貽四方之笑取百世之譏于聖徳國政所損不細此其足以失人心而致危亂者四也古人有言君聖則臣直陛下臨御之初延訪忠謀虚懷納諫其于狂直敢言之士往往矜宥故一時臣工恃陛下之能容敢以直言冒干天聴言過激切而獲罪亦多有之自此以来臣下懷危慮禍未聞敢有犯顔直諫而為匡救逆心之論者昔人論求言之益以為勉強以聼不若恱而從之悦而從之不若道之使言盖人臣持禄保位者多而㤀身以狥國者少雖識見有明暗言論有得失在陛下明目達聰鍳别取舍于黜陟賞罰付之公論則可矣若震之以天威加之以危禍如往年太僕卿楊最者言出而身即死近日翰林院左贊善兼修撰羅洪先等皆以言罷斥此於國體治道所損甚多伏願聖明少致思焉成湯大聖人也仲虺稱其改過不吝從諌弗咈髙宗有商之令主也傅說告以木從䋲則正后從諌則聖此二君作聖之功為萬世人王之龜鑑也臣非區區為一楊最等惜也但歴觀古今以來有天下國家者未有不以任諌而興以拒諌而亡者也今而後雖有素懷忠義之心者非灰心仕進甘退丘園亦必深自晦藏為保身計矣孰敢發口以論天下之事哉臣恐忠藎杜口則讒䛕交進上徳不能下逹下情不能上通安危休戚無由以見而堂陛之近即逺于萬里矣此其足以失人心而致危亂者五也凡此數者闗於天下之治亂國勢之安危貽聖心之憂誠未已也伏望皇上念祖宗創業之艱難思今日守成為不易察臣忠悃覧臣所陳賜之施行戒飭夏言務篤忠貞之道以報國家眷顧禮遇之恩於郭勛則豫有以裁抑而保全之止土木之功開諌諍之路屏邪妄之術陛下仍以慎獨養天徳以天徳達王道以慰人心以祈天祐則荘敬日強而彌壽永于千億虚靈照物而忠邪莫可遁逃其為宗廟社稷萬萬年無疆之福聖子神孫萬萬年無疆之規者端在此矣臣不勝戰慄懇切之至獄中諫書臣聞明王之治天下也上畏昊天之鑒臨下畏臣民之瞻仰雖徳盛功髙而其惟日不足之心未甞不求賢納諌以盡事天撫民之誠而制治于未亂保邦于未危焉忠臣之事君也雖當道化熈洽之時猶不㤀訓誥保恵之勤而防㣲杜漸之惟謹惟恐一念一事之差謬而貽生民無窮之害也古今稱舜者孰不以為天下之大聖乎其聰明睿智出于天性若無賴於臣下之匡輔取善以自益矣然舜命禹曰予違汝弼汝無面從退有後言又曰臣作朕股肱耳目不以己徳為已至而從事于咨諏察納之無遺盖知一念之趨向則聖狂治亂所由分而不可以不慎焉是聖人不自滿足終日乾乾之心也禹戒舜曰毋若丹朱傲惟慢遊是好傲虐是作益戒舜曰罔違道以干百姓之譽罔咈百姓以從己之欲夫舜豈至違道干譽咈民從己者哉又豈至好慢逰作傲虐如丹朱者哉禹益不以其君道隆徳盛而㤀儆戒之勤懇如此是人臣保治無窮之心而為尊君敬君之至也虞廷君臣都俞吁咈之相與如手足腹心之一體而成文明熈皥之治後有作者弗能及也伊尹告太甲曰有言逆于汝心必求諸道有言遜於汝志必求諸非道召公告武王曰志以道寧言以道接周公訓成王亦曰小人怨汝詈汝則皇自敬徳厥愆曰朕之愆允若時不啻不敢含怒古聖哲之臣所以輔飬君徳而成功業之盛者孰不切切焉欲其君以聴言納諌為心乎漢武帝之臣有汲黯者自言有狗馬之忠願出入禁闥以補過拾遺又曰天子置公卿輔弼之臣寧令阿譽順從以䧟主上於不義乎且已在其位縱不言奈辱朝廷何魏徴疏唐太宗漸不克終十事以諌諍為己任君不及堯舜其心未肯以自已也故汲黯魏徴號稱古之遺直而太宗貞觀之治㡬于三代者有由然也歴代聖賢之君莫不樂聞規諌以来天下之善以防壅蔽之奸至秦始皇父子惡間過失忠諌者謂之誹謗深計者謂之妖言遂至上下判隔逺近乖離匹夫一呼天下土崩不二世而國不守矣我朝孝宗皇帝時主事李夢陽以言事下獄中鎮撫司本上孝宗皇帝問左右當何如批行左右對曰此人狂妄當笞之以示懲戒孝宗皇帝特批釋放因語輔臣曰李夢陽本内事干戚畹朕不得已下之獄左右欲朕笞之者朕知左右之意矣盖既得㫖必宻喻重笞置之死地以快中官之心而使朕有殺直臣之名左右之不忠一至于此輔臣對曰陛下此心即堯舜之仁也是故逺而虞夏商周之聖君及漢唐以来之賢主近而孝宗皇帝皆陛下所當取以為法而秦以誹謗二字箝天下之口以自取覆亡之禍者又萬世所當深戒也以任諌而興以拒諌而亡臣往年疏中亦甞為陛下言之矣不知聖明亦曽埀覧否乎天下猶人之一身焉人之血氣不周流者必死天下之勢上下之情不相通而不亡者未之有也諌者使下情得以上通上情得以下達而免於覆亡之禍焉昔人以為功多於汗馬之勞者謂能消禍于未萌也孔子曰臣之事上也進思盡忠退思補過将順其美匡救其惡又曰天子有諍臣七人雖無道不失其天下諸侯有諍臣五人雖無道不失其國大夫有諍臣三人雖無道不失其家當不義則臣不可以弗諍于君子不可以弗諍于父孟子曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊其語齊臣曰齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢陳於王前故齊人莫如我敬王也大哉孔孟之言真萬世致治之道也伏願聖明留心焉臣自嘉靖十一年以病居田里者八年餘量能度分安身退處已絶無用世之心矣朝廷起臣於畎畝之中而授之職既又以罪下獄臣一時所着衣服非度聖明不即誅死而惟笞以戒之此猶天地之於萬物一於長養生成而已栽培傾覆之殊用天無私喜私怒于其間也風雨霜露無非上帝之敎笞以戒臣而全臣之生孰非陛下之仁乎陛下于臣已廢而復起之當死而又生之其浩蕩無涯之恩徳始終于臣者可謂至矣此臣於垂死之餘猶哀鳴之而欲陛下納諌容直以成君徳以廣君道與唐虞三代兼美比隆欲竊效古人屍諌之忠而盡臣犬馬之報於萬一也伏願聖明留心焉臣又尚記東厰使記臣衣服然其来者二人焉臣未知其姓氏自此以後或一二人或三四人更迭往来未甞不日在臣之左右凡為臣所經遇者将百人焉臣心知其為東厰使以覘臣者而口未敢言臣又察其意向似有記臣言語動作以傳聞于天聴之下之意焉不知果有此事否子若誠有之臣不勝惻怛悲感之切至而願昧死以有言此非陛下盛徳所冝為也古人有言君道貴明不貴察陛下以睿智居尊中天下而立定四海之民當以正大光明之道化成天下平平蕩蕩毋意毋必毋固毋我股肱耳目托諸臣佐生殺予奪付之公論不冝偏有視聴作為之私心而使羣下得以窺聖衷之淺深也况今邊隅屡警兵政廢弛工役浩繁財用匱竭暑雨祈寒生民嗷嗷君子小人孰為當進孰為當退朝政敷理孰為當廢孰為當興一日二日有萬㡬之繁孰非陛下所當深察而逺覧者乎釋此不慮而注意一狂言獲罪之囚犯此何心哉若陛下以此察臣之心移之於兵政之廢弛財用之匱竭生民之嗷嗷君子小人之當進當退朝政之敷理當廢當興念兹在兹與公卿賢士日講論之而圗處之心常如此實為宗廟社稷之福萬方生靈之慶也况臣當日所言雖出臣愚昧之見而一時芹曝之誠亦未必無可採擇而施行者若聖明留意而臣言有補于聖政萬一雖誅死即不朽矣泰山不讓土壤故能成其髙河海不擇細流故能就其深王者不棄芻蕘故能極其聖伏願聖明留心焉又臣初下獄時鎮撫司官倪民孫綱以聖怒赫然之下臣罪深重一時不令臣自通飲食惟日給臣以官米臣又不便所食又病㡬死後陶某等許臣家人自送淡粥麫湯日得二飡今四十五日有餘矣延此一息尚未死滅此實陛下好生之徳覆載之恩之所及而諸臣不欲置臣於死使朝廷有殺諌臣之名其心未必不為忠于陛下者也近東厰復三四人来獄中鎮撫司自官吏以至守獄校卒皆戰慄儆懼日夜戒嚴復絶臣飲食似有欲臣速死之意臣今一死雖無所惜誠無所難但臣愚慮謂絶飲食以置臣于死决非聖心所欲為竊恐有譸張為幻者過為訛言恐動衆心使至于此則事未可知伏望皇上洞開日月之明照此幽隠之地若臣罪當誅即明正典刑肆諸市朝以為人臣事君不忠者之戒若察臣忠悃憫臣狂愚罪從未减或逺謫邊戍放歸田里此又聖主宥罪赦過之洪恩非臣負罪深重者所敢望也惟聖明蚤賜裁處臣不勝兢惕懇切之至楊忠介集巻一

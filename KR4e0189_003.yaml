body:
  text: 楊忠介集巻三明楊爵撰傳周主事傳原疏附周主事名天佐字宇弼號磧山福建晉江縣人登嘉靖乙未進士授戸部廣東司主事以言得罪死於獄中楊爵曰凢天佐其他行實爵未能詳知今不記姑記其死之歳月日時與其所由以死焉耳辛丑年春爵以監察御史上封事大畧謂雪雨不可爲祥瑞而頌之謂權奸不可爲忠信而邇之謂土木之工不可不止謂朝講之禮不可不脩謂邪說之妨政害治者不可不斥謂讜言之益國與民者不可不聽凢此皆爵一時愚昧之見狂妄之詞信有罪矣二月初四日干冐宸聰初五日械繫下獄十二日夜蒙笞十七日夜復蒙笞且備極拷掠血淋漓衣前襟盡成赤紫色桎梏㭱鎻晝夜困苦間伺驚惕㒺敢疎寛至臥處血流地上可手抔之履襪衾苫之類爲血所沾若滯於水中然天威震動之下人人悚懼謂爵必死而不可救矣延兩月餘夏四月初九日九廟災天子詔百官使言時政闕失天佐應詔上疏其畧曰陛下以宗廟災變痛自修省凢政事闕失許各衙門條陳且欲務關國體民瘼不許泛濫彌文虚應故事仰見皇上畏天之誠求言之切治道更新之㑹轉災爲祥之機也大小臣工孰不感惕思効其愚乃今闕政猶有在而忠言未盡聞此何故與實以聖明采察之度不宣而臣下畏望之心猶存也葢示人以言未若示人以政求言之切乃示人以言耳而御史楊爵之獄未釋是未示人以政也臣時即欲冐昧上陳但聞詔書且下意曠蕩之恩必首及楊爵今復不蒙恩宥臣展轉思之心實未安况明㫖既許條陳苟有所見寧忍終黙國家置言官以言爲職楊爵所言之事豈逃睿見惟以過直犯怒誠可矜察而爵今在獄中已經數月且聖怒之下一則曰小人一則曰囚犯以盡言極諫爲小人則爲緘黙逢迎之君子不難也以奉職納忠爲囚犯又孰不能爲容恱寡過之臣哉言行君子之所以動天地也人君一喜一怒上帝臨之陛下試一思焉其所以怒爵而罪之者果合於天心否耶昔人謂雷霆之所摧折萬鈞之所覆壓者爵既遭矣身非木石命且不測萬一先朝露而殞是使諍臣飲恨直士寒心楊爵一身之利害不足深惜而所關係聖德之損益不細也方今陛下恭黙思道畏天勤政聖心洞然臣願察爵之疏原爵之心特賜釋放仍乞明示嘉納不吝採行旌爵之忠讜以風天下之直則聖徳如天地之廣如日月之明由此而天意不回未之有也疏上有詔周天佐笞六十下鎮撫司獄牢固㭱囚天佐體幹細弱其手梏微寛可自脱出守者以鉄鍊貫梏目中令不能轉側絶其飲食三日死夫當此九重赫然之際爵實延一息以待旦暮之盡而人孰不以爵為戒哉天佐以未信疏遠之小臣執以是非好惡之常理奮筆於言論之間而納其區區之忠欵焉宜其言出而身即死也故法凢死獄中者司官必具題死者日時縁故請監察御史刑部主事各一員騐其屍然後出之葢慮有不得其死所以重人命廣德愛也天佐笞之甚重兩臀爛裂腹上俱青黑色騐者御史主事立屍傍吏騐屍訖髙告曰遍身上下竝無他故止因急病身死御史主事即㨿其所言題請出屍未騐屍時天晴日皦俄而雲靄横空震雷微雨屍既出雷已天佐妻某氏候於門外見屍出以頭觸地幾死柩寘寺無不悲痛民有張弼者祭於柩前而哭之人曰子與舊相識乎曰否吾傷公以忠諌而死是以痛之深也嗚呼可痛哉可痛哉爵與天佐未嘗一相識亦未嘗以名相通天佐初下獄爵不知天佐爲何許人亦不知其言何許事也既而知之思欲以識其面貌然各閉於幽室中困以㭱鎻又天佐以救爵故下獄故獄戒愈甚嚴凢厠所徃來必間其期未得一相遇焉然爵一念惻惻洒泣恐天佐不能堪其困苦之甚而思有以寛觧之呼一人即膝上手作困卦二字以濳慰天佐乃示以困亨貞大人吉无咎之義也聞天佐首之且微有笑顔獄中人有以宜自寛心語爲天佐慰者天佐應之曰事吾所自爲則死吾所當安吾心何不寛乎五月初六日下獄初八日未時死爵亦未得親哭其屍終不得一見其形容也死之次年福建一士夫來獄中爵問以天佐事其人曰天佐年甚少丰神清秀當謂其少年柔順而已不知其心之剛烈能作如此事傳聞其無子死時一女在既死遺腹又生一女未知是否又聞其父母兄弟俱在家甚貧亦未知是否柩停數月其妻歸𦵏於閩中嗚呼遭際之不易葢自古皆然也士當總丱藏而修之於家塾焉承師模執典訓必明與心誓而期以終身之踐履事親無或有不孝焉事君無或有不忠焉及名登仕版身荷天工此心所在君恩所在固造次顚沛而罔敢易也顧以脂韋依阿之風勝而三極大中之矩泯然於流靡波蕩之洶湧而承以孑然獨立之一身斯時也必欲上不負吾君下不負所學其不殺身而成人世之恨者鮮矣天佐之死天地爲之震動萬人爲之流淚焉嗚呼天也命也不肖爵之罪也復何尤户部廣東清吏司主事臣周天佐奏爲奉㫖陳言乞宥諌臣以光聖德以囬天意事近該河南道御史黨承賜等題爲答天戒嚴交修以隆聖治事奉聖㫖是宗廟災變朕心震驚所宜痛加脩省以實事天兩京文武大臣都着自陳時政缺失着各該衙門條奏務切民瘼國體不許虚應故事汎濫彌文欽此仰見皇上畏天之誠求言之切治道更新之㑹轉災爲祥之機也大小臣工誰不感惕思効其愚廼今闕政猶有在而忠言未盡聞此何故歟實以聖明采納之度未宣臣下畏望之心未免也葢求言之道示人以言未若示人以政明㫖云時政闕失着各該衙門條奏此示人以言耳御史楊爵之獄未釋是未示人以政也臣時即欲冐昧上陳但聞詔書且下曠蕩之恩必首及楊爵今復不䝉陛下恩宥臣展轉思之甚不能安况明㫖既許條奏苟有所見寜忍終黙夫國家置言官以言爲職楊爵言之是非莫逃於睿鑑惟以過直犯怒誠可矜察古者帝王求諌至立毁謗之木毁謗非臣事君之義矣帝王且不避以命天下亦恐言者有不直居民上不幸不聞過耳漢至文帝駸駸治安賈誼方痛哭流涕長太息以進言誼豈好爲是不祥哉憂治世危明主忠愛之不能已也承平之乆天子之尊威福之重所少者不在於唯諾稱頌之滿庭正在於憂治世危明主之一士在廷之臣不負此義獨楊爵而逮獄已經數月且聖怒之下一則曰小人一則曰囚犯夫以盡言極諫爲小人則爲緘黙逢迎之君子不難也以奉職納忠爲囚犯孰不能爲容恱寡過之臣哉言行君子之所以動天地也人君一喜一怒上帝臨之陛下誠一思焉其所以怒爵而罪之者果合天心否耶昔人謂雷霆之所摧折萬鈞之所覆壓爵既遭之矣身非木石命且不測萬一先朝露而殞是使諍臣飲恨直士寒心楊爵一身之利害不足深惜所關係聖徳損益不細也方今陛下恭黙思道畏災勤政聖心洞然臣願察爵之疏原爵之心勅下鎮撫司早賜寛釋仍乞明㫖加納不吝採行旌爵忠讜以來天下之直之則聖德如天地之廣日月之明由此而天意不回未有也臣學術短淺不敢泛濫彌文旁論凟聽區區愚悃先以釋楊爵之獄爲庶幾求言彌災之義伏惟皇上埀察爵幸甚臣幸甚天下幸甚浦御史傳原疏附浦御史名鋐字汝器號竹塘山東文登縣人登正德丁丑進士授山西洪洞縣知縣擢監察御史以親老乞終飬服闋復御史職値六年考核京官鋐以職當與聞其事有論鋐專擅考核而不與衆共者於是鋐與監察御史張禄同考功司郎中俞𦙍緒皆得冠帶閒住是時爵亦病謝御史職家居嘉靖己亥上以吏部薦鋐才不可廢與爵同詔起用授浙江道監察御史次年冬奉命廵按陜西遍歴州郡逺渉邊疆激揚伸理務為平易又集其政務之大總成一書以見其施爲緩急之序名曰全陜政要集辛丑春爵以言得罪下錦衣獄濵於死者屢矣戸部主事周公天佐疏救之死於獄中鋐自陜復上疏申救謂天下之治亂係言路之開閉言路開則忠言讜論得以上逹而化理成言路閉則奸巧邪佞得以下恣而治道隳比見河南道監察御史楊爵以言得罪下獄既乆懲創必深臣願陛下廣天地之量開日月之明將爵特賜釋放寘諸朝署之列使布靖共之才爵必能進思盡忠退思補過上不負明時下不負所學庶幾廣納諫之門作敢言之氣言路開而太平之盛治可臻矣疏奏有㫖御史浦鋐着錦衣衛差官校械提來京下鎮撫司擬以不當救爵之罪詔笞一百與爵同㭱鎻七日而死鋐初在陜被徴秦民聞之如失父母行之日逺近奔送扶老携㓜滿其車下至車不能行所過州縣民皆先期相約候於道左毎止舎處常萬餘人皆號哭祝頌曰願使君復到秦地以活我百姓檻車過華隂鋐登樓望嶽題詩其上有多難來遊懷抱存晩雲孤鶴㪚塵襟之句出秦境父老送者遮道號泣不忍遽别鋐以詩慰之有滄溟釣石聞相待収拾絲綸向水邊之句當時差徃官校既歸皆能道其事夫當顚沛危迫之際應語從容不撓可以想見其胷次矣葢鋐爲人磊落光明與人交有懷必吐務盡其誠施爲闊大畧無𤨏細苛刻之態故徳善所及民輙感恱初下獄與爵别處一室同垣數歩間未得相見一校卒事鋐頗慎爵朝呼之以問起居因脱二句以贈校者既笞後始得同處爵之剛忿麄惡不自斂戢見守者或不遜即不能堪鋐語之曰處此大難中必學古人内文明而外柔順何必與較時有間使來獄中以伺鋐起居其人遇鋐甚謹且開懷相與鋐感其誠口占七言律以贈之傷瘡甚惨草苫木板之上流血成池見者不忍正視獄卒軰亦有泣下者鋐氣象毅然畧無喔嚅卑下語嗚呼可謂難矣十二月十四日下獄中三十日蒙笞踰年正月初六日子時卒臨歿顧爵諄諄訣别雖語氣漸微猶強呼之大抵多慷慨慰喻之詞謂爵展轉困迫之狀皆人不可堪其死在旦暮未可知也何痛我之深也嗚呼可痛哉可痛哉死之明年御史昝子學來獄中子學嘗爲洪洞縣知縣言前治洪洞者惟浦公政事獨優葢民到今懷思焉其庚子歳秋爵被詔北上取道於山西榆次周春坊汝威者晉陽之豪傑也爲御史時嘗廵按山東時謝病家食爵過謁之因訪以齊魯人才汝威首以鋐爲對且言今已起用矣比爵至京鋐至已奉命監順天府郷試矣事畢後得與同官數月今則親見其死而哭其屍於獄中焉嗚呼鋐既死而爵之罪愈益重矣顧爵庸愚不肖豈足輕重使烈夫志士相繼而死今而後雖以刀鋸鼎鑊正爵之罪然仁賢之禍世道之損已無及矣葢至此而爵之罪始不可以輕宥矣古人有言平居無直言敢諌之士臨難無仗節死義之臣又言求忠臣於孝子之門葢爲人子而不能孝則爲人臣而能以忠自樹者未之有也鋐以親老即不仕言者已死而又敢言此又可以見其操履之大要矣危難窘迫之際處之裕如百鍊之剛至死不回庶幾乎險以說困而不失其所亨者矣即其志趨才猷始終節槩振奮炳朗葢卓卓乎為當世之竒英而不可議者矣惜其以救爵之故而即至殺身也廵按陜西監察御史臣浦鋐題爲廣聖恩宥愚直以開言路事臣謂天下治亂之機係言路之開閉言路開則忠言直諌得以上聞而治道興言路閉則奷巧謟佞得以下恣而治道壊此古今不易之常論也近見邸報刑科都給事中髙時上言劾翊國公郭勛違法事情陛下將郭勛拿問髙時加俸一級臣仰見聖明天縱睿知神授昭如日月威若雷霆不以勛平日眷愛之臣而法少屈也天下聞之人心聳然大奸大詐之徒聞風震疊潜消屏息埀首隱伏而不敢作矣臣竊思河南道監察御史今見監楊爵春初所奏中間一槩舉郭勛之事陛下不加斥譴薄示懲責只下獄監禁者臣亦仰窺聖心葢將爵之言觀人之行察之眞而後發之如時之言也抑將察爵之心試言之忠置之獄而欲使之悟而後喻也葢楊爵之爲人臣初不知其何如人也近出廵歴過耀州冨平縣一入其境察其平日儉素之性忠直之心外無狡詐郷里服其誠恪素稱孝友風俗藉爲觀法兄亡而棄官飬母母䘮而廬墓致思耕田讀書足跡不入城市之内俟時守正請謁不造府縣之門其行如此去年荷蒙陛下錄用起廢入官今春感恩圗報積思陳諫乃移事親之孝而爲事君之忠也古人求忠臣必於孝子之門有臣如爵可輕棄之乎况楊爵與髙時建言之事不同事君之忠則一在髙時既得䝉加俸在楊爵亦當䝉寛宥且在獄已踰半年悔悟亦非一日矣伏乞陛下擴天地之量溥生成之恩察其愚直宥其狂妄將楊爵或從輕釋放仍留供職置之朝廷之間使得展布靖共之才進思盡忠退思補過㫁不上負吾君下負所學也庶幾闢納諌之門作敢言之氣言路大開臣下孰不効忠思奮竭力熈載以觀太平之盛歟臣逺處關陜干冐天威下情不勝恐懼戰慄戴罪之至蘓宣傳蘓宣字廷詔大名府南樂縣人以校尉供東厰辦事役能以左手書左字右手書右字筆迹皆竒特予初下獄東厰使人更迭覘伺日具予言動及囚繫狀積五日一上奏四月初一日宣來時予晝夜㭱鎻右脛前爲㭱木轉磕成瘡宣自以手起㭱上木以重瓦間合脛處使相去寸許瘡自此愈後宣數來時緒山錢子繫獄恐宣以厚予遭譛數以語予當令防慮予以告宣宣曰使公而富於財則誠如所慮今公一貧如洗食且不給雖有譛者必不能行乙巳年春果有譛宣者謂私與予交通下宣獄笞五十奪其辦事役予聞之即獄中書片帖使問宣宣答書云勿以我爲慮當開廣心胸是年秋予䝉恩歸田里宣送予至通州同宿客舎中次日各以詩相贈而别夫天威嚴震之下人人恐懼宣能以厚道相與可謂難矣繼之者楊棟也棟字國用霸州人其母王氏病棟割其股肉煑羹食母予與劉周二子復繋獄不能自食棟以東厰使來覘予力言於司官得自供米物孔子言十室之邑必有忠信信然哉若宣與棟使有學校之飬師保之訓何善之不可爲劉處士傳觀庵劉處士諱充字飬吾號觀庵世居泰和縣之城西十世祖諱某宋嘉定間逮今雲津書院觀庵子即其遺址緝理之曽祖諱某祖諱某皆隱德不仕父諱某以鄉舉歴典金華麗水績溪教事陞永福縣尹轉賔州守未之任卒母蕭宜人生觀庵子兄弟四人觀庵其長子也㨿狀觀庵子多懿行今不詳述述其所難能之一事焉觀庵子母蕭宜人病觀庵子割其股肉煑羹以進母不知其爲何物食之而病愈嗚呼其心可謂至矣其行亦人所不易及也觀庵子之事親可謂病致其憂而篤於孝思者矣其德善爲邑侯所禮重諸名公所歌詠而於風教之助不淺也配歐陽氏二子師洋皆縣學生女二人長適生員某次適某觀庵子生成化己亥八月十八日嘉靖癸邜正月十二日卒夀六十五歳卒時其弟工部員外晴川子以諫止工役下獄中聞訃哭稱先生曰先生素多病豈非聞吾憂難重其憂心而至此耶即痛恨不食時予與吏科給事中太平周子同繫獄相與吊慰之乙巳闕指爲謗毁貼註以聞械繫下獄擬以叔明大肆譏謗無忠敬心詔於午門外笞八十發原籍爲民卒於道其提調監試考試官十有三人以不能校正皆下獄初山東試録成將獻之考試官有言録中文字論及時事者稍宜删改否則禍出不測或未可知叔明不聽卒以此得罪死先是辛丑年春爵以監察御史上封事詔下錦衣獄以負罪深重一時同處者多戒心惟叔明屡有通問爵不以得其通問爲可幸而以叔明敢於通問者爲人所難也至是叔明以山東事來獄中相見甚歡是時泰和劉子煥吾工部貟外郎也太平周子順之吏科給事中也皆叔明舊交而先叔明以言下獄邂逅間敘平生以勞苦之狀而各禁不言得罪事又先以事逮獄者章生勺與叔明同里居爵使以間處問叔明以山東事叔明言職在監臨宜自當其辜又問胸中如何若不知有所謂恐懼者俄有命下叔明罪當笞爵與三子者相謂曰葉子心志定笞雖多不死嗚呼今乃死矣使叔明聽其考試官所言於文字議論間稍爲遷就豈其得罪之深而至於死乎然叔明不憚殺身之惨禍而憚爲䛕言以欺君上則叔明平生之所尚亦可以槩見矣人孰不死同一死也而有輕於鴻毛者有重於丘山者人言叔明非以異事死而以修辭立誠直吐所見不自顧忌而至於死也嗚呼其所係亦甚重矣世之憸夫壬人習爲乾沒媚恱之計於利害所關則揺首閉目禁於出一言以相正甚至迂曲隱避譸張爲幻以上欺君父下欺此心者徃徃而然視叔明所爲則何如然則叔明雖死猶不死也古之人如朱雲折檻陳禾落裾完名保身光昭簡册而不至遺憾後世者叔明亦得以擬迹矣嗚呼叔明以山東試録之故即至於死矣死時年三十有九歳葉烈婦傳葉烈婦京師人許紳妻也紳家貧不能自存徃投其故携葉氏以行病死於通州城西之道葉氏年二十歳跪於屍傍晝夜哭不絶勺飲不入口四方來觀者以萬計婦人徃者率爲致飲食羅置左右葉氏一無所視百方欵喻以冀其全生葉氏一無所應積十四日而死有司以事上聞詔表其節通州人爲具棺斂與紳合𦵏立祠以祀之嗚呼烈哉嗚呼烈哉揚子雲號稱儒者而爲莽大夫媿於葉氏多矣他何足道哉孤麋傳去年甲辰秋九月望日予三人同筮得剥之初六剥床以足滅貞㓙十月初一日守獄卒一校者來予不能堪其毒惟忍以待之十一月初一日復一人來代校者甚厚予每戒其屬曰此爲國忠臣當善遇之愼勿無禮以相犯予感其厚贈以詩曰剥床曽有應天道最無私記此坎中得一陽出地時然此厚予者於他犯處求或未得亦徃徃肆虐他犯有氣力者寄語於所司所司制此厚予者戒勿復守獄此軰以守獄求賄爲生理既爲所阻即窮迫之甚惟數寄懇於余欲念已舊好爲觧之予難於發言作孤麋傳寄所司以逹意乙巳年夏四月廿九日大谷中有孤麋爲獵者所傷不能逺馳去遇白額猛者欲食之孤麋懇以求免白額未之許須臾一黒額猛者至見孤麋而憐之謂白額曰彼君子麋也日飲食惟水草傷又甚肉殊瘦未可食且食君子麋不祥子盍舎諸白額以爲然即棄去不食黒額又恐他白額至而食孤麋乃乆爲之衞然黑額於他羣麋亦徃徃掩而食之特於孤麋則終哀之以全其生他羣麋之畏黑額亦若孤麋之畏白額也乃相與訴黑額於社壇公社壇公放黑額於蕭林中而制其出黑額乆未食麋飢餓之甚惟數懇求於孤麋欲念已舊德之社壇公祝而宥其罪社壇公信他羣麋謂黒額爲物害甚而終治之孤麋不得已乃喻羣麋曰彼君子額也子盍反其詞俾遂所欲羣麋艴然曰子迂物也於額類中而求君子不以難乎彼遇子孤麋固黒額而遇羣麋則亦子之白額也若社壇公肯以一言戒使遇孤麋固爲黒額而遇羣麋亦黒額焉則雖日與之遇所願也於是孤麋謹述羣麋意以告社壇公且乞他來者皆孤麋之黒額也楊忠介集巻三

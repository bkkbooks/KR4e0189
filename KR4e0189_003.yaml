body:
  text: 楊忠介集卷三明楊爵撰傳周主事傳原疏附周主事名天佐字宇弼號磧山福建晉江縣人登嘉靖乙未進士授戶部廣東司主事以言得罪死於獄中楊爵曰凡天佐其他行實爵未能詳知今不記姑記其死之歲月日時與其所由以死焉耳辛丑年春爵以監察御史上封事大略謂雪雨不可為祥瑞而頌之謂權奸不可為忠信而邇之謂土木之工不可不止謂朝講之禮不可不修謂邪說之妨政害治者不可不斥謂讜言之益國與民者不可不聽凡此皆爵一時愚昧之見狂妄之詞信有罪矣二月初四日干冒宸聰初五日械繫下獄十二日夜蒙笞十七日夜復蒙笞且備極拷掠血淋漓衣前襟盡成赤紫色桎梏㭱鎖晝夜困苦間伺驚惕罔敢疏寬至臥處血流地上可手抔之履襪衾苫之類為血所沾若滯於水中然天威震動之下人人悚懼謂爵必死而不可救矣延兩月餘夏四月初九日九廟災天子詔百官使言時政闕失天佐應詔上疏其略曰陛下以宗廟災變痛自修省凡政事闕失許各衙門條陳且欲務關國體民瘼不許泛濫彌文虛應故事仰見皇上畏天之誠求言之切治道更新之㑹轉災為祥之機也大小臣工孰不感惕思效其愚乃今闕政猶有在而忠言未盡聞此何故與實以聖明采察之度不宣而臣下畏望之心猶存也蓋示人以言未若示人以政求言之切乃示人以言耳而御史楊爵之獄未釋是未示人以政也臣時即欲冒昧上陳但聞詔書且下意曠蕩之恩必首及楊爵今復不蒙恩宥臣展轉思之心實未安况明㫖既許條陳苟有所見寧忍終默國家置言官以言為職楊爵所言之事豈逃睿見惟以過直犯怒誠可矜察而爵今在獄中已經數月且聖怒之下一則曰小人一則曰囚犯以盡言極諫為小人則為緘默逢迎之君子不難也以奉職納忠為囚犯又孰不能為容恱寡過之臣哉言行君子之所以動天地也人君一喜一怒上帝臨之陛下試一思焉其所以怒爵而罪之者果合於天心否耶昔人謂雷霆之所摧折萬鈞之所覆壓者爵既遭矣身非木石命且不測萬一先朝露而殞是使諍臣飲恨直士寒心楊爵一身之利害不足深惜而所關係聖德之損益不細也方今陛下恭默思道畏天勤政聖心洞然臣願察爵之疏原爵之心特賜釋放仍乞明示嘉納不吝採行旌爵之忠讜以風天下之直則聖德如天地之廣如日月之明由此而天意不回未之有也疏上有詔周天佐笞六十下鎮撫司獄牢固㭱囚天佐體幹細弱其手梏微寬可自脫出守者以鐵鍊貫梏目中令不能轉側絶其飲食三日死夫當此九重赫然之際爵實延一息以待旦暮之盡而人孰不以爵為戒哉天佐以未信疏遠之小臣執以是非好惡之常理奮筆於言論之間而納其區區之忠欵焉宜其言出而身即死也故法凡死獄中者司官必具題死者日時緣故請監察御史刑部主事各一員驗其尸然後出之蓋慮有不得其死所以重人命廣德愛也天佐笞之甚重兩臀爛裂腹上俱青黑色驗者御史主事立尸傍吏驗尸訖髙告曰遍身上下竝無他故止因急病身死御史主事即據其所言題請出尸未驗尸時天晴日皎俄而雲靄橫空震雷微雨尸既出雷已天佐妻某氏候於門外見尸出以頭觸地幾死柩置寺無不悲痛民有張弼者祭於柩前而哭之人曰子與舊相識乎曰否吾傷公以忠諌而死是以痛之深也嗚呼可痛哉可痛哉爵與天佐未嘗一相識亦未嘗以名相通天佐初下獄爵不知天佐為何許人亦不知其言何許事也既而知之思欲以識其面貌然各閉於幽室中困以㭱鎖又天佐以救爵故下獄故獄戒愈甚嚴凡厠所往來必間其期未得一相遇焉然爵一念惻惻灑泣恐天佐不能堪其困苦之甚而思有以寬解之呼一人即膝上手作困卦二字以濳慰天佐乃示以困亨貞大人吉無咎之義也聞天佐首之且微有笑顔獄中人有以宜自寬心語為天佐慰者天佐應之曰事吾所自為則死吾所當安吾心何不寬乎五月初六日下獄初八日未時死爵亦未得親哭其尸終不得一見其形容也死之次年福建一士夫來獄中爵問以天佐事其人曰天佐年甚少丰神清秀當謂其少年柔順而已不知其心之剛烈能作如此事傳聞其無子死時一女在既死遺腹又生一女未知是否又聞其父母兄弟俱在家甚貧亦未知是否柩停數月其妻歸葬於閩中嗚呼遭際之不易蓋自古皆然也士當總丱藏而修之於家孰焉承師模執典訓必明與心誓而期以終身之踐履事親無或有不孝焉事君無或有不忠焉及名登仕版身荷天工此心所在君恩所在固造次顚沛而罔敢易也顧以脂韋依阿之風勝而三極大中之矩泯然於流靡波蕩之洶湧而承以孑然獨立之一身斯時也必欲上不負吾君下不負所學其不殺身而成人世之恨者鮮矣天佐之死天地為之震動萬人為之流淚焉嗚呼天也命也不肖爵之罪也復何尤户部廣東清吏司主事臣周天佐奏為奉㫖陳言乞宥諌臣以光聖德以回天意事近該河南道御史黨承賜等題為答天戒嚴交修以隆聖治事奉聖㫖是宗廟災變朕心震驚所宜痛加修省以實事天兩京文武大臣都著自陳時政缺失著各該衙門條奏務切民瘼國體不許虛應故事泛濫彌文欽此仰見皇上畏天之誠求言之切治道更新之㑹轉災為祥之機也大小臣工誰不感惕思效其愚乃今闕政猶有在而忠言未盡聞此何故歟實以聖明采納之度未宣臣下畏望之心未免也蓋求言之道示人以言未若示人以政明㫖云時政闕失著各該衙門條奏此示人以言耳御史楊爵之獄未釋是未示人以政也臣時即欲冒昧上陳但聞詔書且下曠蕩之恩必首及楊爵今復不䝉陛下恩宥臣展轉思之甚不能安况明㫖既許條奏苟有所見寧忍終默夫國家置言官以言為職楊爵言之是非莫逃於睿鑑惟以過直犯怒誠可矜察古者帝王求諌至立毁謗之木毁謗非臣事君之義矣帝王且不避以命天下亦恐言者有不直居民上不幸不聞過耳漢至文帝駸駸治安賈誼方痛哭流涕長太息以進言誼豈好為是不祥哉憂治世危明主忠愛之不能已也承平之久天子之尊威福之重所少者不在於唯諾稱頌之滿庭正在於憂治世危明主之一士在廷之臣不負此義獨楊爵而逮獄已經數月且聖怒之下一則曰小人一則曰囚犯夫以盡言極諫為小人則為緘默逢迎之君子不難也以奉職納忠為囚犯孰不能為容恱寡過之臣哉言行君子之所以動天地也人君一喜一怒上帝臨之陛下誠一思焉其所以怒爵而罪之者果合天心否耶昔人謂雷霆之所摧折萬鈞之所覆壓爵既遭之矣身非木石命且不測萬一先朝露而殞是使諍臣飲恨直士寒心楊爵一身之利害不足深惜所關係聖德損益不細也方今陛下恭默思道畏災勤政聖心洞然臣願察爵之疏原爵之心敕下鎮撫司早賜寬釋仍乞明㫖加納不吝採行旌爵忠讜以來天下之直之則聖德如天地之廣日月之明由此而天意不回未有也臣學術短淺不敢泛濫彌文旁論瀆聽區區愚悃先以釋楊爵之獄為庶幾求言彌災之義伏惟皇上埀察爵幸甚臣幸甚天下幸甚浦御史傳原疏附浦御史名鋐字汝器號竹塘山東文登縣人登正德丁丑進士授山西洪洞縣知縣擢監察御史以親老乞終飬服闋復御史職值六年考核京官鋐以職當與聞其事有論鋐專擅考核而不與衆共者於是鋐與監察御史張祿同考功司郎中俞𦙍緒皆得冠帶閒住是時爵亦病謝御史職家居嘉靖己亥上以吏部薦鋐才不可廢與爵同詔起用授浙江道監察御史次年冬奉命巡按陜西遍歷州郡逺涉邊疆激揚伸理務為平易又集其政務之大總成一書以見其施為緩急之序名曰全陜政要集辛丑春爵以言得罪下錦衣獄濵於死者屢矣戶部主事周公天佐疏救之死於獄中鋐自陜復上疏申救謂天下之治亂係言路之開閉言路開則忠言讜論得以上逹而化理成言路閉則奸巧邪佞得以下恣而治道隳比見河南道監察御史楊爵以言得罪下獄既久懲創必深臣願陛下廣天地之量開日月之明將爵特賜釋放置諸朝署之列使布靖共之才爵必能進思盡忠退思補過上不負明時下不負所學庶幾廣納諫之門作敢言之氣言路開而太平之盛治可臻矣疏奏有㫖御史浦鋐著錦衣衛差官校械提來京下鎮撫司擬以不當救爵之罪詔笞一百與爵同㭱鎖七日而死鋐初在陜被徴秦民聞之如失父母行之日逺近奔送扶老携幼滿其車下至車不能行所過州縣民皆先期相約候於道左每止舍處常萬餘人皆號哭祝頌曰願使君復到秦地以活我百姓檻車過華隂鋐登樓望嶽題詩其上有多難來遊懷抱存晚雲孤鶴散塵襟之句出秦境父老送者遮道號泣不忍遽别鋐以詩慰之有滄溟釣石聞相待收拾絲綸向水邊之句當時差往官校既歸皆能道其事夫當顚沛危迫之際應語從容不撓可以想見其胸次矣蓋鋐為人磊落光明與人交有懷必吐務盡其誠施為闊大略無瑣細苛刻之態故德善所及民輒感恱初下獄與爵别處一室同垣數步間未得相見一校卒事鋐頗慎爵朝呼之以問起居因脫二句以贈校者既笞後始得同處爵之剛忿粗惡不自斂戢見守者或不遜即不能堪鋐語之曰處此大難中必學古人內文明而外柔順何必與較時有間使來獄中以伺鋐起居其人遇鋐甚謹且開懷相與鋐感其誠口占七言律以贈之傷瘡甚慘草苫木板之上流血成池見者不忍正視獄卒輩亦有泣下者鋐氣象毅然略無喔嚅卑下語嗚呼可謂難矣十二月十四日下獄中三十日蒙笞踰年正月初六日子時卒臨歿顧爵諄諄訣别雖語氣漸微猶強呼之大抵多慷慨慰喻之詞謂爵展轉困迫之狀皆人不可堪其死在旦暮未可知也何痛我之深也嗚呼可痛哉可痛哉死之明年御史咱子學來獄中子學嘗為洪洞縣知縣言前治洪洞者惟浦公政事獨優蓋民到今懷思焉其庚子歲秋爵被詔北上取道於山西榆次周春坊汝威者晉陽之豪傑也為御史時嘗巡按山東時謝病家食爵過謁之因訪以齊魯人才汝威首以鋐為對且言今已起用矣比爵至京鋐至已奉命監順天府鄉試矣事畢後得與同官數月今則親見其死而哭其尸於獄中焉嗚呼鋐既死而爵之罪愈益重矣顧爵庸愚不肖豈足輕重使烈夫志士相繼而死今而後雖以刀鋸鼎鑊正爵之罪然仁賢之禍世道之損已無及矣蓋至此而爵之罪始不可以輕宥矣古人有言平居無直言敢諌之士臨難無仗節死義之臣又言求忠臣於孝子之門蓋為人子而不能孝則為人臣而能以忠自樹者未之有也鋐以親老即不仕言者已死而又敢言此又可以見其操履之大要矣危難窘迫之際處之裕如百鍊之剛至死不回庶幾乎險以說困而不失其所亨者矣即其志趨才猷始終節槩振奮炳朗蓋卓卓乎為當世之竒英而不可議者矣惜其以救爵之故而即至殺身也巡按陜西監察御史臣浦鋐題為廣聖恩宥愚直以開言路事臣謂天下治亂之機係言路之開閉言路開則忠言直諌得以上聞而治道興言路閉則奷巧諂佞得以下恣而治道壞此古今不易之常論也近見邸報刑科都給事中髙時上言劾翊國公郭勛違法事情陛下將郭勛拿問髙時加俸一級臣仰見聖明天縱睿知神授昭如日月威若雷霆不以勛平日眷愛之臣而法少屈也天下聞之人心聳然大奸大詐之徒聞風震疊潜消屏息埀首隱伏而不敢作矣臣竊思河南道監察御史今見監楊爵春初所奏中間一槩舉郭勛之事陛下不加斥譴薄示懲責只下獄監禁者臣亦仰窺聖心蓋將爵之言觀人之行察之真而後發之如時之言也抑將察爵之心試言之忠置之獄而欲使之悟而後喻也蓋楊爵之為人臣初不知其何如人也近出巡歷過耀州冨平縣一入其境察其平日儉素之性忠直之心外無狡詐鄉里服其誠恪素稱孝友風俗藉為觀法兄亡而棄官飬母母喪而廬墓致思耕田讀書足跡不入城市之內俟時守正請謁不造府縣之門其行如此去年荷蒙陛下録用起廢入官今春感恩圗報積思陳諫乃移事親之孝而為事君之忠也古人求忠臣必於孝子之門有臣如爵可輕棄之乎况楊爵與髙時建言之事不同事君之忠則一在髙時既得䝉加俸在楊爵亦當䝉寬宥且在獄已踰半年悔悟亦非一日矣伏乞陛下擴天地之量溥生成之恩察其愚直宥其狂妄將楊爵或從輕釋放仍留供職置之朝廷之間使得展布靖共之才進思盡忠退思補過斷不上負吾君下負所學也庶幾闢納諌之門作敢言之氣言路大開臣下孰不效忠思奮竭力熙載以觀太平之盛歟臣逺處關陜干冒天威下情不勝恐懼戰栗戴罪之至蘇宣傳蘇宣字廷詔大名府南樂縣人以校尉供東厰辦事役能以左手書左字右手書右字筆迹皆竒特豫初下獄東厰使人更迭覘伺日具豫言動及囚繫狀積五日一上奏四月初一日宣來時豫晝夜㭱鎖右脛前為㭱木轉磕成瘡宣自以手起㭱上木以重瓦間合脛處使相去寸許瘡自此愈後宣數來時緒山錢子繫獄恐宣以厚豫遭譛數以語豫當令防慮豫以告宣宣曰使公而富於財則誠如所慮今公一貧如洗食且不給雖有譛者必不能行乙巳年春果有譛宣者謂私與豫交通下宣獄笞五十奪其辦事役豫聞之即獄中書片帖使問宣宣答書云勿以我為慮當開廣心胸是年秋豫䝉恩歸田里宣送豫至通州同宿客舍中次日各以詩相贈而别夫天威嚴震之下人人恐懼宣能以厚道相與可謂難矣繼之者楊棟也棟字國用霸州人其母王氏病棟割其股肉煮羹食母豫與劉周二子復繫獄不能自食棟以東厰使來覘豫力言於司官得自供米物孔子言十室之邑必有忠信信然哉若宣與棟使有學校之飬師保之訓何善之不可為劉處士傳觀庵劉處士諱充字飬吾號觀庵世居泰和縣之城西十世祖諱某宋嘉定間逮今雲津書院觀庵子即其遺址緝理之曽祖諱某祖諱某皆隱德不仕父諱某以鄉舉歷典金華麗水績溪教事升永福縣尹轉賔州守未之任卒母蕭宜人生觀庵子兄弟四人觀庵其長子也據狀觀庵子多懿行今不詳述述其所難能之一事焉觀庵子母蕭宜人病觀庵子割其股肉煮羹以進母不知其為何物食之而病愈嗚呼其心可謂至矣其行亦人所不易及也觀庵子之事親可謂病致其憂而篤於孝思者矣其德善為邑侯所禮重諸名公所歌詠而於風教之助不淺也配歐陽氏二子師洋皆縣學生女二人長適生員某次適某觀庵子生成化己亥八月十八日嘉靖癸邜正月十二日卒夀六十五歲卒時其弟工部員外晴川子以諫止工役下獄中聞訃哭稱先生曰先生素多病豈非聞吾憂難重其憂心而至此耶即痛恨不食時豫與吏科給事中太平周子同繫獄相與吊慰之乙巳闕指為謗毁貼注以聞械繫下獄擬以叔明大肆譏謗無忠敬心詔於午門外笞八十發原籍為民卒於道其提調監試考試官十有三人以不能校正皆下獄初山東試録成將獻之考試官有言録中文字論及時事者稍宜删改否則禍出不測或未可知叔明不聽卒以此得罪死先是辛丑年春爵以監察御史上封事詔下錦衣獄以負罪深重一時同處者多戒心惟叔明屢有通問爵不以得其通問為可幸而以叔明敢於通問者為人所難也至是叔明以山東事來獄中相見甚歡是時泰和劉子煥吾工部貟外郎也太平周子順之吏科給事中也皆叔明舊交而先叔明以言下獄邂逅間敘平生以勞苦之狀而各禁不言得罪事又先以事逮獄者章生勺與叔明同里居爵使以間處問叔明以山東事叔明言職在監臨宜自當其辜又問胸中如何若不知有所謂恐懼者俄有命下叔明罪當笞爵與三子者相謂曰葉子心志定笞雖多不死嗚呼今乃死矣使叔明聽其考試官所言於文字議論間稍為遷就豈其得罪之深而至於死乎然叔明不憚殺身之慘禍而憚為諛言以欺君上則叔明平生之所尚亦可以槩見矣人孰不死同一死也而有輕於鴻毛者有重於丘山者人言叔明非以異事死而以修辭立誠直吐所見不自顧忌而至於死也嗚呼其所係亦甚重矣世之憸夫壬人習為乾沒媚恱之計於利害所關則搖首閉目禁於出一言以相正甚至迂曲隱避譸張為幻以上欺君父下欺此心者往往而然視叔明所為則何如然則叔明雖死猶不死也古之人如朱雲折檻陳禾落裾完名保身光昭簡册而不至遺憾後世者叔明亦得以擬迹矣嗚呼叔明以山東試録之故即至於死矣死時年三十有九歲葉烈婦傳葉烈婦京師人許紳妻也紳家貧不能自存往投其故携葉氏以行病死於通州城西之道葉氏年二十歲跪於尸傍晝夜哭不絶勺飲不入口四方來觀者以萬計婦人往者率為致飲食羅置左右葉氏一無所視百方欵喻以冀其全生葉氏一無所應積十四日而死有司以事上聞詔表其節通州人為具棺斂與紳合葬立祠以祀之嗚呼烈哉嗚呼烈哉揚子雲號稱儒者而為莽大夫愧於葉氏多矣他何足道哉孤麋傳去年甲辰秋九月望日豫三人同筮得剝之初六剝床以足滅貞凶十月初一日守獄卒一校者來豫不能堪其毒惟忍以待之十一月初一日復一人來代校者甚厚豫每戒其屬曰此為國忠臣當善遇之愼勿無禮以相犯豫感其厚贈以詩曰剝床曽有應天道最無私記此坎中得一陽出地時然此厚豫者於他犯處求或未得亦往往肆虐他犯有氣力者寄語於所司所司制此厚豫者戒勿復守獄此輩以守獄求賄為生理既為所阻即窮迫之甚惟數寄懇於余欲念已舊好為解之豫難於發言作孤麋傳寄所司以逹意乙巳年夏四月草九日大谷中有孤麋為獵者所傷不能逺馳去遇白額猛者欲食之孤麋懇以求免白額未之許須臾一黑額猛者至見孤麋而憐之謂白額曰彼君子麋也日飲食惟水草傷又甚肉殊瘦未可食且食君子麋不祥子盍舍諸白額以為然即棄去不食黑額又恐他白額至而食孤麋乃久為之衛然黑額於他羣麋亦往往掩而食之特於孤麋則終哀之以全其生他羣麋之畏黑額亦若孤麋之畏白額也乃相與訴黑額於社壇公社壇公放黑額於蕭林中而制其出黑額久未食麋飢餓之甚惟數懇求於孤麋欲念已舊德之社壇公祝而宥其罪社壇公信他羣麋謂黑額為物害甚而終治之孤麋不得已乃喻羣麋曰彼君子額也子盍反其詞俾遂所欲羣麋艴然曰子迂物也於額類中而求君子不以難乎彼遇子孤麋固黑額而遇羣麋則亦子之白額也若社壇公肯以一言戒使遇孤麋固為黑額而遇羣麋亦黑額焉則雖日與之遇所願也於是孤麋謹述羣麋意以告社壇公且乞他來者皆孤麋之黑額也楊忠介集卷三

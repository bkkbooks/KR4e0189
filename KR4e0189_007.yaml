body:
  text: 楊忠介集巻七明楊爵撰祭文祭原方畦先生文先生蚤棄軒冕樂道力田視不義之富貴如浮雲之漠然惟欲窮討古今之典籍以擴充其未盡之天踐履方正胸次高逺其超乎塵外也如鳯凰之高逝必千仭而翔其確乎不拔也如松栢之挺翠貫四運以獨芳慨君子之存歿為人世之否臧何皇天之憗遺俾逺邇其感傷某沗為知友聞訃奔走心懷永悼匪言可盡敬陳薄奠先生享之祭次女文嘉靖二十二年三月初一日父在獄中以書告石氏女子秋之墓曰嗚呼痛哉女子秋汝有知乎其聴父三千里外哭汝之言去年三月某日汝偲兄到京以書告我言汝疾病秋九月汝休兄復告汝病日深吾見其詞語悽愴若有隠不盡告之意今年二月内仕自家鄉來吾以書問汝存殁且言當以實告休等始言壬寅嵗夏四月十五日丑時分汝以疾終於汝家是時偲仕皆在京師休與汝母共送輀車𦵏汝於盤月村之南嗚呼子秋汝果死矣不知是何等病乃即死也吾數汝死期在吾下獄一年零二月之後將無以吾得罪之深惶懼不寧即成病以死乎果若此吾心不能不汝咎也吾觀古今以來為人臣者豈無狂愚妄論時政身陷罪戾如我今日者乎為其女子者或有天性仁孝篤於愛親而不解於心者豈皆憂戚成病淹焉莫救以殞其生乎嗚呼痛哉子秋汝何至於斯也汝何至於斯也吾尚記汝童稚時吾教之使讀孝經論論及女訓諸篇汝又數向予索讀烈女傳吾見性資聰敏多能曉悟但過於剛烈不能含容忍耐以成中和之徳此等氣象與汝父絶相類也汝父罪難悠悠自分冝死死而䝉恩歸𦵏故里吾欲汝姊妹兄弟懸棺而窆封以馬鬛樹以荆梓共成一哭從此朝夕朔望再勿流涕豈意汝即蚤死使我於囚繫顛危中反哭汝痛汝弗能已耶嗚呼子秋犴門深鎻今已三年汝父一念白日青天忽聞汝死雙淚漣漣西望茫茫未得洒汝墓前念之窮極一至斯焉乃十九年庚子嵗秋予始北行汝與汝姊送我中庭視我漸逺顧瞻徘徊容顔戚惨兩淚盈腮汝父不徳天毒降災乃汝姊妹淪胥以推二三年間黄土兩堆我心匪石胡不痛哀今我冩此傷悼之情命汝休兄以家釀一盞麥飯一盂歸告汝靈父若得荷主上再生之恩歸來有期念汝長逝心抱無涯之悲即於汝姊汝墓次第哭之嗚呼子秋汝來顧此誌銘兄安之翁墓碣嗚呼痛哉此吾兄安之之墓也吾兄諱靖字安之我先君豐山處士長子也處士君配吾母李夫人生我兄弟二人吾兄生千成化丙午十一月二十二日卒于嘉靖壬辰三月十一日享年僅四十有七嗚呼天其何奪之速耶意者爵之不徳昊天降災故使至于此極耶不然彼令兄弟騂騂怡怡相與而耄期于一門者世多有之我何㷀㷀孑孑形隻影單而無以為倚耶嗚呼痛哉吾兄生而聰敏早嵗欲以儒術自鳴不果遂舉為縣掾非其志也後罷歸力田養母暇惟讀書無他好也嵗嘉靖戊子爵領鄉薦將赴試禮闈行有期吾兄戒之曰弟必舉進士可出仕慎勿汲汲也越明年爵舉進士授行人司行人嘉靖十年奉使河南便道歸省時吾兄已嬰疾矣聞爵至喜甚自謂疾若脫體身衣袍布以帛裹帽起俟于門内爵拜見尚能答拜吾母哭之曰吾兒汝兄今日復得見汝矣於是母子兄弟相與流涕者久之爵見吾兄疾未瘥吾母在堂年已七十即欲事畢後告歸既抵京吾兄以書止之曰我病全可慎勿憂慮又曰弟當盡忠報國亦不必歸來時壬辰年三月十五日也爵獲書方以母兄平康為慶不知吾兄之卒已五日矣嗚呼痛哉吾兄平日好讀史臨歿遺言以通鑑斂棺中病之革也自正衣冠辭母與叔母皆四拜自為書屬爵以後事甚詳又戒子姪且勿以凶訃告爵云恐吾弟不堪傷痛故諸子遵其命至是年秋爵始得聞訃是時爵已陞試監察御史吾兄不及聞矣嗚呼痛哉如吾兄者其處人已親疎之間亦可謂善矣奈何其不夀也嗚呼痛哉昔我先君之捐世也我兄弟同哭之及吾兄卒踰年尚未𦵏吾母亦以天年棄養爵哭母又哭兄天其何使我遭此㐫之極耶嗚呼痛哉吾兄配王氏生于𢎞治丁巳八月十八日卒于嘉靖癸巳正月十一日得年三十有九是年四月十三日合𦵏於先塋之次龍又有側室劉氏有子二人長曰休王氏所生學儒次曰佶劉氏所生今尚幼不知二子者有能立身揚名為吾兄之光否乎臨終自書墓誌銘旌今存壙中吾平生所期欲做天下第一等人而行不逮欲幹天下第一等事而績未成今臨終書此以誌墓願吾子孫當吾身後擇吾善者從之其不善者改之此其意也在人世五十七年亦不可謂不夀但懿行不足垂萬世功業未能裨當時是謂與草木同腐朽墓誌五十餘年生長人世未盡聖賢之道兩受天祿還形地下難忘君父之恩銘旌京來壙誌銘京來御史楊某伯修之第三子也生八嵗死某誌其壙曰京來形貌清奇心性慧朗兩目炯炯年五六嵗能詠古詩數十篇吾視之如麟角鳯毛以為他日大吾之門者必此子也抑孰知其至于斯乎故其死也吾哭之痛痛不已哭之以詩曰仰視旻天秋夜深西風推却老來心世間唯有子喪父何我哭兒淚滿襟嗚呼傷哉先嘉靖十五年冬京來患瘡疹既瘥咳𠻳未已予謂疹後餘毒尋常自止及至次年夏益甚百藥不效至八月十九日黎明時竟不救以死是其賦于天者修短有數一定而不可易歟其諸人事感召之未善也奈之何吾不感于心乎是年九月六日以下殤禮𦵏于先塋之前龍嗚呼死矣不可復生也托銘石上涕泣而納諸土周之所銘曰吾兒有生何不穀汝父汝母哭汝兮痛徹心骨有樹有封是兒之先羽機送汝兒其歸焉雜著讀易余既久在罪難中自念君子存仁造次顛沛未嘗少懈嵗月云邁百年易失頃刻光陰未可以若醉若夣而玩處之也即卧側障之以􅀢盥手焚香凝神清慮讀易于其間客有謂予者曰其名此為安樂窩可乎余應之曰不然也余之罪多矣奚以安樂為哉人之處世非安樂則困辱二者而已世之人或以富貴為安樂以患難為困辱此固未然而謂吾之處困為安樂亦非也夫其所為慊於心而合乎義理之中正則雖日在患難此心未嘗不安樂也夫其所謂愧于心而戾乎義理之中正則雖日處富貴而此心未嘗不困辱也吾之所為質於古人之作用為何如其愧於四聖亦多矣然則名我所處為困辱窩可也又奚以安樂為哉況易之為書廣大悉備天地萬物之理具於此損益困節中孚習坎則切于處憂患之道也因銘以自警銘曰安樂安樂由心之作展轉困辱惟吾所速四聖垂訓炳炳簡編議之而後動擬之而後言或可以觀玩象辭而補吾之愆清明清明節人以栁絮一枝贈予予即謝之以詩有知君憐我圜中久故送乾坤生意來之句既而觀之不覺心曠神怡動静坦夷欝抑百結之愁膓忽變而為廓然無涯之胸次矣於是喟然嘆曰天地生生不已之理仁者渾然同物之心即此可以黙識而旁通之矣吾意此時當風景清和百彚亨通芳隄曲岸之間賢人君子攜酒賦詩相與更唱迭和而賞此栁者或有之賢人君子葢賞物之得其所也物之得所由人之得所也人物得所豈易言哉予乃持以歌之歌曰春遲遲兮日融融飽雨露兮舞東風感物類兮動吾中動吾中兮憂卭卭七月七日世傳七月七日天孫出嫁人間女子乘時乞巧唐人栁子厚亦有乞巧文嗚呼女子所乞者刺繡中饋之能耳丈夫之巧欲何為哉予今日獄中所乞則異於是他人乞巧予惟求拙他人乞榮顯予惟以罪自安於困辱焉予素所畜者欲退則躬耕畎畆以全微軀進則勞心以利天下此平生之志至拙之術也庚子嵗以愚拙應徴任職五月食君之祿未敢苟安但知為宗廟社稷萬萬年深長之慮而不知為子孫身家一日計此非拙之尤甚者乎當是時予之拙見謂天下之事吾當拙為之不可為當以拙退之不能退當以拙死之以拙求死不可得而今當以拙坐監故展轉凶危苟延殘息於五年而不自悔皆拙之騐也願天孫鑒臨下土照我衷曲即我素所欲而未能自盡者以増益之使我抱此迂拙終身不易生為拙人死為拙鬼無使我忘身狥國之拙或變而為苟生利家之巧焉乙巳年七月初七日爵焚香再拜祝宋忠簡公像贊建炎之初皇綱解紐二宗北轅一帝南走寤寐思賢宜不敢後而於公忠猷棄如糞土事至於此天實為之於人何尤嗟夫使公回鑾北征之疏得一舉行則仗義揚威經營四方根本之慮付之李綱將相協力國勢以昌燕雲以北我圉我疆神京可復鐘簴不改而徽欽父子可生反於大梁惜其為羣小阻抑懷恨而歿使中原流血宇内分割鬼哭神憤莫可救藥相縁相習而多自戕伐保養奸諛賊殺忠良奔播危促退而渡江遂至奕世統緒閩海一舫焚香就溺以告滅亡而為志士仁人所痛傷然則公一身之存歿豈特為宋人國歩之隆替而實萬世名義綱常之所係也劉秀才字說泰和劉秀才名年字以時予為之說曰年統四時春夏秋冬不失其序天之道也性具四徳仁義禮智出當其可人之道也以人道合天道惟其時而已性焉安焉者謂之聖復焉執焉者謂之賢士希賢賢希聖則純乎天矣吾敢以志此人道而亹亹不怠者有望於年焉香灰解予復下獄半載為丙午年三月初七日晨旦東厰使邏者來覘即予卧側以殘甎藉囚板上相與偶坐者久之獄中穢氣欝蒸久在内者習不自知從外乍進則臭不可堪乃以棒香一莖插坐前甎縫中焚之須臾香盡灰不㪚宛如一完香焉予取而懸諸壁上至第五日猶未㪚因思其故為作解以㪚之夫是物也其將中抱憾積憤凝滯於此而有不釋然耶抑焚猶未焚而托此以為永久耶二者雖有間焉而其精誠感致則一也遭世乖變人定勝天即一物之微而其用之所措固有幸不幸焉耳葢賔筵廣設幄錦幃羅庖翟薦徳恪舉殊儀叶五和切音哦上肅環冕下列笙歌君臣交慶委佩鳴珂旅語之際嘉謀孔多聞善即聽若決江河王猷下降枯槁滂沱雍容揖遜永息干戈上安下順宇内沖和則唐虞三代之境界也燒異薰以昭明徳固已有之舍彼其處而來焚吾獄中焉此何等氣象也墐櫳掩户日影不通塵留負鼠隙引汚風一息淹淹百慮忡忡其與吾環列而偕坐者不過三五囚徒東西南北偶此相逢或十三四齡口尚乳臭之豎子或八九十嵗鬚眉皓然之老翁身披帶索首冒飛蓬額蹙氣喪肌削腸空縱蓄百金一動即窮荷校滅耳罪彼不聰手梏足械膿白血紅俯就坎窞仰叫穹窿使聞之者皺眉見之者戚恫甚至於不能為心則閉目掩耳佯為瞽聾爾來焚此可謂擇地擇人之未審怱於所入而謬于所從者矣久而不化疑有神明類彼志士之死不瞑嗚呼其劉忠愍耶抑周後山浦竹塘耶不死正寢死此福堂名垂不朽同彼霄壤與我國家為龍為光雖然陵谷有時而變遷金石亦至於消泐故凡全氣成質寓形宇内而為人為物者終歸於盡天地如此其大也古今如此其逺也其孰不蕩為灰塵而揚為飄風乎爾其欲外消息盈虛之常道觀反覆無窮之世變以後天而終乎是固無此理也吾為爾摩㪚之再拜而祝之曰匪人焚爾惟爾自焚爾不馨香與物常存煆以烈火騰為氤氲上而不下聚而不分直衝霄漢變為奇雲餘香不斷苾苾芬芬龍逢比干相與為羣爾宜自慊胡為云云理無二致吾以喻人事苟可死何憚殺身願爾速化歸彼蒼旻樂天委運還爾之真拜起悽愴雙淚盈襟嗚呼易化者一時之形難化者萬世之心形化而心終不化吾其何時焉與爾乎得一相尋也楊忠介集巻七

body:
  text: 楊忠介集附録卷一誥命奉天承運皇帝制曰臣子志切效忠危其身而不顧朝廷恩頒恤死論其世而不遺豈徒備乎彛章實以樹乎風教爾故原任河南道監察御史楊爵剛貞成性𢎞毅為心兩疏叩閽聞者為之悚懼而氣不少衰五年繫獄見者為之悲酸而節乃益勵被逮則握粟就道囊無僦舍之金放還則杜門讀書室有生塵之甑胡未及于召用乃遽至于淪亡是用悼傷特加褒恤茲贈爾奉議大夫光祿寺少卿錫之誥命嗚呼死而不朽允惟正氣之長存久以彌光所願英風之永賁服兹寵命慰爾明靈隆慶元年二月初二日奉天承運皇帝制曰國家於直言敢諌之臣常不吝貤贈追封之典所以磨世且用褒忠爾原任山東道監察御史贈奉議大夫光祿寺少卿楊爵志慮堅貞行操清鯁爰從廷擢拔置憲臺爾能正色陳規犯顔明諍激談危論偶觸雷霆徑氣直聲增光日月囹圄益明其志獻畝不忘乎君天監純忠人稱孤介第副卿渙寵差足慰此幽貞而名號靳揚似尚羈乎輿望茲特諡爾曰忠介錫之誥命夫危身奉上實副乎忠執一不遷允符乎介足稱不朽真可以風祗服命詞永光來世萬厯二十年十月十八日奏疏乞宥言官疏周天佐號磧山晉江人户部廣東司主事疏載本傳下浦鋐字汝竒登州人陜西道巡按疏載本傳下請恤典疏楊博字闕太蒲州人厯官太子保吏部尚書題為開讀事驗封清吏司案呈伏睹大行皇帝遺詔內開建言得罪諸臣存者召用殁者恤録見監者即先釋放復職欽此又覩詔書內開正德十六年四月以後至嘉靖四十五年十二月以前建言得罪諸臣遵奉遺詔存者召用殁者恤録吏禮兵部作速查開職名議擬具奏欽此臣看得建言得罪諸臣蒙先帝恤録之恩遺詔開載甚明際聖主亨嘉之會新詔申諭更切雖身先朝露不幸殞殁九原有知均當結草但其死不同大略有三典刑者上也合當復其原職特贈一官厚加諭祭仍廕一子廷杖而死者次也合當復其原職特贈一官廕一子或久繫囹圄或逺戍邊野漂沒孤魂不得死于牖下者又其次也合當復其原職特贈一官內尚書熊法正言正色古道古心諌止仙亭侃侃得大臣之體優遊林壑揚揚有逹士之風御史楊爵敷陳一疏義膽忠肝前後奏議自當稱首繫獄十年困心衡慮始終氣節原無與雙以上二臣又應與杖死者一體恤録以示優異通乞聖明俯賜裁定敕下遵行此外如有遺漏聽兩京科道官并各處撫按官查理明白各另議奏緣係節奉開讀事理臣等未敢擅便開坐謹題請旨請諡典疏髙儀字子象錢塘人歷官翰林院學士禮部尚書諡文端題為大臣晚節不終易名輿論未協懇乞聖明追回成命特録遺賢以光恤典以勵世風事祠祭清吏司案呈奉本部送準都察院咨據陜西巡按孫珫呈奉本部勘札準禮部咨該本部員外郎于孔謙奏論已故都御史闕晚節不終乞要追奪諡號并議先朝御史楊爵補諡等奉聖旨既有疵議著將諡號追奪楊爵準補諡以後大臣有奉命與諡的你部裡還備查素履博採公評詳議可否請旨裁定毋得徇私濫給致亂名實有纍盛典欽此合咨貴院煩為通行各該巡按御史一體欽遵仍行陜西巡按御史轉行先任山東道御史楊爵原籍官司備查本官存日鄉評宦迹有無疵議逐一采訪的確作速開報本部以憑覆請施行等因備札前來依奉轉行陜西布政司行查去後今據該司呈據西安府申據儒學查得已故鄉官原任山東道御史楊爵存日鄉行言動不苟聖賢自期嘗曰人皆可以為堯舜粗衣惡食不以為恥周人之急不吝所有遇貧生嘗脫衣以濟人有所與一介不受以致窮乏之極家人告煮粥無米而誦讀欣欣若罔聞知居親喪廬墓三年時玉兔往來廬中冬月竹笋叢生人以為誠孝所感憮諸姪逾于所生事兄長有若嚴父教生徒無異己子足迹不入城市請謁不至州縣蓋自儒生以至通顯安貧樂道君子謂其不愧屋漏云筮仕行人奉使不受餽遺差回請賑飢民拜官御史即上疏陳言上怒重責久繫囹圄誦讀不輟再釋再繫忠誠動天完名全節獄中辨易君子謂其效羑里之為放歸以來却掃塵俗惟是教授生徒並無子孫室家之念自做秀才以至殁年一貧如洗志無所憾迄今不惟學士大夫稱為關西夫子即兒童走卒亦皆目為當代正人而學識純正力行無愧古人忠肝義膽精誠可貫天日鄉評久已論定縣學府學正學與列爼豆之間鄉人竊有私議為聖為賢為仙尚聞未死之謡即此沒世已久人猶思慕不忘亦可概其生平允為純全無玷申詳到府看得本官行誼既真于鄉評而宦情益定于沒世當時獨推其完名髙節至今更仰之若景星慶雲名節始終無玷公論翕然共稱訪採真確毫無疵議相應補諡以光忠魂備申到司為照御史楊爵生前學識純正動履端方耿耿精忠可貫天日亭亭髙節足師鄉邦既經府學縣學查勘有據相應呈請合無轉逹題請贈諡等因呈詳到職看得冨平縣已故鄉官原任山東道御史楊爵稜稜大節耿耿孤忠有聖賢可學之心有堯舜吾君之志立朝之讜言百折不替居鄉之德望歷世彌彰查無疵議補諡允冝等因咨部送司案查本年二月內該本部員外郎于孔謙奏論已故都御史闕晚節不終乞要追奪諡號并及先任山東道御史楊爵補諡等因該本部覆奉欽依已經移咨都察院轉行本官原籍官司查看去後今該前因查呈到部看得御史楊爵精忠可貫天日德行不愧古人鄉評與朝議咸孚易名當操定擬巡按御史核實前來相應題請伏候聖裁楊御史傳孫丕揚斛山楊先生余富平人也名爵字伯修官御史時以直諌顯世之人毋論識與不識咸稱為斛山先生云當先生之生火光起自室中觀者咸驚異之長而伉傸自立不苟為同異則嶄然頭角矣家世清修先生又頴悟絶倫以故不具束脯從授經每耕之壠上輒挾册以從且讀且田欣然無厭而其意則謂人當以聖賢為師取豫去就不稟古昔何所稱宇宙間時苑洛韓大司馬方以理學倡明關陜先生獨師事之韓觀其貌行朴如也已而叩其𠂻避席斂栣同時學者皆自以為不及云伯兄靖故以掾中法無赦先生徒步百里外為伸其寃械繫獄中吏卒苦之甚先生從獄中上書邑令見而竒之出與語甚恭推之食辭解之衣被則又辭亡何以弟子員舉省試第三人明年成進士授行人司行人出使藩國饋遺一無所受其亷潔不汚蓋天性然已而授監察御史時權臣擅柄義所不可乃移疾歸會其母老且病侍湯藥不解衣帶母卒毁瘠踰禮廬于墓者三年有冬笋馴兔之瑞服闋復起為御史稜稜氣節諸貴近莫敢于以私者而所覩時事不勝憤抗疏言天下大計有五其要謂方今災沴頻仍歲惡不稔輔近侍從之臣爭為軟語以媚上勳戚若郭翊侯輩又魚肉小民以取大利土木之工十年不息司衡錢嵗費不止億萬計朝儀間闊大小臣工無有奉顔色聆天語者緇黃末流至濫充保傅之選其餘言事諸臣若楊最羅洪先輩非死即斥去人人以言為諱國家所以隆盛治答天意者似不冝此疏入上大怒即命鎮撫司窮治其詞拷訊備至定死矣竟不死户部主事周天佐御史浦鋐俱以救先生箠死獄中而先生身幽囹圄者凡五年適上以受釐故放先生歸里間密旨命司𨽻踵其後甫至家而逮繫者又至先生無幾微見顔面即日從容赴北鎮司獄又三年而始還上之聖明保全諫臣如此教授里中貴人莫得見其面疏粥敝履怡然自適五十七嵗而卒卒之前有大鳥集于庭公指以語人此其楊震鳥乎兆且在我援筆自志又惓惓以作一等事做一等人教其子孫無他辭蓋先生死若干年莊皇帝以世廟遺詔贈先生光祿寺少卿并録其後生稱大忠沒有遺榮矣先生為人硜直不阿意而內實忠淳一切所行務合道理故身履危地遇每坦途當先生被逮之日天乃風晦冥不辨色都士人驚相告語以為楊御史風及火災玄壇聞空中言冝釋先生上乃憶先生疏釋之得歸里比再逮出關濵危甚矣晉義士匾夀亭侯祝先生老牖下仇上者負匾持士竟匾遭回祿而鄰屋宛然夫精誠通天地而忠信格九重此與區區口舌費皂囊中薄蹄者可同日語乎孫氏曰自余先大夫與余言及余所覩楊先生行事之概其孤忠徑節爛然耳目無容論己方先生繫北司而所著周易録及中庸解俱的然可傳世諸所吟詠無憤惋㤞瘵語即漢所稱黃霸何以逺過讀獄中疏草陳壅蔽勸寬容雖被萬死心無悔余爽然自失矣吳時來字闕院仙居人歷官都察左都御史斛山楊先生諱爵字伯修陜之富平人家故貧母誕先生於姻家姻鄰以火起羣赴之則懸弧室也長美姿容身滿七尺年二十始發篋讀書無燈嘗以薪代夙夜攻苦有時之隴上耕即挾書而讀意欣欣也兄靖少參邑掾與前段令相惡為直指使所捕先生徒步百里外申厥寃遂并被逮獄中上書辭意激烮後尹見之曰竒士也胡纍至是耶立出之給油薪費督之學年二十八聞朝邑韓先生講性理學躬輦米往拜其門韓先生睇詞氣行行壯也欲却之父蓮峯老人謂曰意若非凡人數日叩其學詫曰幾失之既省語言踐履錚錚多古人節嘆曰畏友也督學使唐公校萟首拔之嘉靖戊子秋應試長安就食館中客有遺金者先生守之客至持館人急先生詰其實還其金客謝弗取請至其家舍焉以書經舉第三名己丑登第授行人司行人奉使之肅府伊府吉府贄贈俱讓不受世宗肅皇帝議禮多制作薦紳譴斥者甚衆先生上疏臣奉使湖廣地方眼睹百姓多菜色挈筐操刀割莩肉鬻啖道傍假今周公禮文盡行抑何補於老羸飢饉之艱上之司舍待罪得旨下民部發賑全活以萬計壬辰秋授山東道監察御史見枋臣弄威福草奉將劾之為鄉人親昵以有垂白母在于是浩然請告歸居母喪一遵家禮廬墓三年冬月竹笋生兔馴繞人咸以為純孝所感云服闋堅卧不起行部使者交章薦之庚子秋詔起其家幡然戒行曰曩以母故不得舒吾志此一時也何為區區䇿駑􅀈為復補河南道監察御史辛丑春二月初四日上封事娓娓數千言大約天下大事內而腹心外而百骸皆受病足以失人心而致危亂者五一則輔政者諛郭翊國暴為巨蠧二則凍餒民閔不憂恤而為方士修雷壇三則大小臣工弗覩朝儀宜慰其望四則名器濫及道流出入禁內五則挫折諫臣辭具載疏中上震怒命錦衣使逮北鎮撫司推究考掠備至先生一無詘被創匣鎖中尻肉綻若懸珠手割之血淋漓下氣息奄奄眯惑不自省守者以為死矣被覆之半夜汗如雨復蘇東厰日更伺言􅏒以上有蘇校尉宣來心惻苦楚狀拾重瓦間合處尋被笞禠辦事役矣時有張子者同室職納槖饘得緩死部郎周天佐侍御浦鋐以申救箠死獄中守益嚴踰年工部郎劉魁再踰年吏科給事中周怡咸以抗疏下獄歡焉降心相與劘摩修詣繹四子諸經百家研精于易著周易辨録及中庸解若干卷詩文賡歌如是者五年乙巳秋八月十四日上虔修萬靈明庭之儀祝釐得仙箕釋此三人者遂與周劉由潞水逾臨清别而歸上雖放此三人者其時熊太宰以諫仙箕忤旨終未釋然復詔逮之抵家甫十日也十月二十四日下詔獄與三人俱繫復三年丁未冬十一月五日先生籌易與周劉飲謂曰今須盡此杯明日出矣是夕大髙玄殿火四發不可嚮邇火圍中恍聞呼三人名氏者次日釋歸為民先生兩繫詔獄寒暑八易其初苦楚若不耐久之而鼎鑊湯火飴如食飲抵家以教授生徒為事解凍而耕暴背而耨與農人同甘苦雖乏儋石之儲而瀟然無憂蓋圜扉中研心學問磨礲精光展拓胸次真有渺人寰空宇宙者而世上儻來富貴曾足以芥蒂其目睫乎己酉冬十月九日猝大鳥集居處先生不樂曰漢楊伯起之鳥至矣兆在我乎十四日午時而殁年五十有七隆慶元年穆宗莊皇帝肇極復其官追贈光祿寺少卿廕其孫恆官左監丞馮從吾字少墟長安人歷官工部尚書諡恭定見關學編先生名爵字伯修號斛山富平人初誕時室中如火光起人咸驚異之長美姿容身滿七尺家故貧年二十始發篋讀書苦無繼晷資嘗以薪代夙夜攻苦每之隴上耕即挾册往意欣欣如也居恆念人當以聖賢為師一切不稟古昔何所稱宇宙間兄靖以掾誤罹法先生徒步百里外申厥寃遂並繫獄先生從獄中上書辭意激烮邑令見而驚之曰竒士也胡纍至是耶立出之給油薪費督之學年二十八聞朝邑韓恭簡公講理學躬輦米往拜其門公睇先生貌行行壯也欲却之父蓮峯老人謂曰意若非凡人數日叩其學詫曰縱宿學老儒莫是過吾幾失人矣既省語言踐履錚錚多古人節嘆曰畏友後與楊椒山稱韓門二楊云年踰三十督學漁石唐文襄公始首拔為邑諸生嘉靖戊子秋應試長安就食食館客有遺金者先生守之客至持館人急先生詰實付以金客謝寡取先生峻不允乃敦請家止宿焉是秋即以書舉三名明年成進士授行人三使藩國餽贈俱讓不受或以為矯先生曰彼雖禮來名重天子使吾獨不自重天子使耶聞者嘆服壬辰選山東道監察御史時權臣當國疏將劾之疏且具會鄉人有以垂白在堂止者乃移疾歸歸未幾母殁毁瘠隃禮廬墓三年有冬笋馴兔之瑞服闋家居授徒講學者又五年庚子秋以薦起河南道巡視南城權貴斂避而所覩時事不勝扼腕辛丑春二月初四日上封事娓娓數千言大約天下事內而腹心外而百骸皆受病足以失人心而致危亂者五一則輔臣夏言習為欺罔翊國公郭勛為國巨蠧所當急去二則凍餒民閔不憂恤而為方士修雷壇三則大小臣工弗覩朝儀冝慰其望四則名器濫及緇黃出入大內非制五則言事諸臣若楊最羅洪先輩非死即斥去所損國體不小是時中外頗以言為諱疏入人皆愕然上大怒即逮繫撫司窮究其詞拷掠備至先生無詘是日都城風大作人面不相覷都人呼為楊御史風其感動天地如此先生身晝夜匣鎖中創甚血淋漓下死而復蘇先是士大夫下獄並未有匣鎖者乃自先生始蓋貴溪翊國意也户部主事周公天佐巡按陜西御史浦公鋐相繼申救俱箠死獄中守益戒嚴人益為先生危而先生處之自若刑部郎錢公德洪工部郎劉公魁吏科給事中周公怡皆先生同志舊友先後俱以事下獄相得甚歡然自學問相勸勉外各相戒不得言得罪事錢先釋獄先生願有以為别錢曰靜中收攝精神勿使遊放則心體湛一髙明廣大可馴致矣古人作聖之功其在此乎先生敬識之而乃日與周劉切劘修詣不少輟繹四子諸經百家研精于易著周易辨録及中庸解若干卷諸所著作略無憤惋不平語詩歌唱和身世頓忘如是者五年乙巳秋八月十二日上以受釐故放先生及周劉歸田里而三人者猶相與取道潞水講學舟中逾臨清始别歸會熊太宰以諌箕仙忤旨復逮三人獄先生抵家甫十日聞命即日就道親朋揮淚為别先生無幾微見顔面身幽圜扉者又三年丁未冬十一月五日上建醮髙玄殿災火圍中恍聞呼三人名氏者次日釋歸為民上之聖明保全諫臣如此既歸教授里中貴人莫得見其面疏粥敝履怡然自適己酉冬有大鳥集舍先生曰兆在我矣十月十四日果卒于家年五十七病革時援筆自志又惓惓以作第一等事做第一等人教其子孫無他辭蓋先生為人硜直不阿而內實忠淳自少至老孳孳學問以韓苑雒馬溪田為師以楊椒山周訥溪劉晴川錢緒山蔡洨濵諸君子為友險夷如一初終不二磨礲精光展拓胸次其所涵養者誠深以故鼎鑊湯火百折不回完名全節鏗鍧一代不偶也彼世之淺裏寡蓄耽耽以氣節自多者視先生當愧死矣先生沒若干年莊皇帝以世廟遺詔贈光祿少卿録其後今上用禮官議諡忠介由天性字闕縣富平人禹城縣知公門人也先生姓楊氏諱爵字伯修號斛山富平縣黨林里獨户村人也世居萬斛山之陽因號曰斛山云生而美姿身長七尺頴異剛介取與不苟言笑不妄年二十始奮志讀書終夜不寢家貧苦無繼晷之資恆以薪代之兄靖任縣掾御史案繫獄擬重罪先生徒步數百里訴救甚力被遞械監候在獄讀書未嘗輟也一縣丞因繫辱之楊大尹至見其文驚曰竒郎也何得至是即令在外讀書時給以油薪資助焉年幾乎自立之時尚未入黌聞朝邑苑洛韓先生講明性理之學負笈從之韓叩其學稱之不已督學漁石唐公嵗試連置首列薦之按院慶其得人焉嘉靖戊子秋應試長安於食館中拾遺金一裹食畢待之少頃遺金者來索之館人先生詰之遺金郎以實告即以原裹付之遺金郎分金以謝不允請主於其家是秋中書試第三名連登己丑進士授行人司行人奉使湖廣吉府蘭州肅府河南伊府餽送堅却不受曰為士餓死不食人非禮之食凍死不衣人非禮之衣豈可受此餽耶世宗皇帝議追崇禮被譴者衆上疏云臣奉使湖廣眼見百姓飢餓挈筐執刀即割死者之肉烹食道傍縱使周公禮文盡行於今日亦何補於飢餓之民者疏上待罪蒙旨該部看了來説隨即户部發廪賑救全活者衆任行人三載壬辰秋授山東道監察御史權姦㺯柄嘆曰古人朝拜官而夕上疏吾寧尸其位耶草疏將奏間衆以母老止之遂告歸養抵家母嬰疾迎醫調治不愈癸巳春正月母棄世哀毁骨立廬守墓傍朝夕號泣喪祭遵守家禮在廬教人讀書弟子來學者衆天性亦從門下先生天文性命之學無不淹貫一日講蔡子律吕新書一二日尚未竟究謂人曰蔡子用半生功夫方造此地非後學之可及也今之學者務舉業之外探理學性命者能幾人哉先生所得若此服闋堅卧不起按院薦云守已勵無求之節論事持獨見之明三年廬守墓傍始終秉禮一簡不通官府內外感孚庚子秋應詔起用寄友人書云大丈夫學周孔之道懷匡濟之術必懋勳業於一時垂休光於百世不虛生而虛死斯可矣豈以鄙末之遁避林野稼穡糊口與鳥獸同羣者為見哉區區欲策此駑劣之材少樹尺寸之效報國家養育之恩期不與草木同腐朽此心此念夙夜耿耿但今弱病不瘥未能也是年九月入京復授河南道監察御史任職五月巡視南城不避權貴辛丑春二月初四日上封事數千言備論時政闕失上震怒拏送鎮撫司監候十三日夜笞四十七日復訊鞫笞三十拷掠備至晝夜匣鎖昏惑未醒數日獄卒以為死矣即以厚被覆面上至半夜響一聲通身汗沾被已離身矣先生略蘇夢關聖賢來救云繫獄半載户部廣東司主事周公天佐巡按陜西監察御史浦公鋐上疏申救皆笞死獄中繫及五載乙巳秋八月十二日上符鸞神釋放發原籍為民抵家甫十日九月十一日上密諭東厰拘拿錦衣二人至門拜旨畢即行親朋哭送之臨行詩云白衣黑馬出鄉城飲餞多君揮淚情世上誰無生死路不須分袂嘆危行十月二十四日至京下東厰獄隨即轉鎮撫司照舊監禁復繫三載丁未冬十一月初五日上夜建醮事宫中火起上圍火中救出聞有神言呼及先生之名者上驚悟傳旨釋放次日詔云昨戌刻朕于大髙玄壇夕禮懴文畢少憩總法衆值之四面火起圍處無逃者三十餘未及二三刻宴霄山妥安山右裏氈屋俱燬前嵗仙鸞著放楊爵等諌言以為言我焚修為當者今果中之兹急先釋爵之故召卿等耳先生二次繫獄共計七年出獄人情交慶以為君明臣直盛世所稀覩者也獄中所著有周易辨録中庸解詩文數十卷自丁未出獄歸來以教授生徒為事視不義之富貴漠如也至己酉年十月十四日子時以疾終于正寢臨終自著銘旌墓志以表其心焉嗚呼先生為子盡孝為臣盡忠大倫之篤舉無愧焉若夫生平嘉言善行多矣茲僅於耳目之所見聞者掇拾其一二以備遺忘以俟大君子採擇焉雒于仁字闕評涇陽人官事楊爵字伯修號斛山陜西富平人嘉靖八年進士官御史謝病歸家居九年十九年起用前職二十年春公上封事大略云朝政足以失人心而致危亂者五一大學士夏言數人者不思久旱因元旦僅雪即止稱誦靈瑞正佞人可逺勛戚翊國公郭勛大姦不可近一土木之工十年不已以一方士之故逺修雷壇結怨天下一朝儀間闕經筵不講逸樂日甚一左道惑衆金紫赤紱賞及方外士而不屏邪妄之術一逺賢拒諫如往年太僕卿楊最言出身即死羅洪先等皆以言罷斥而不開諫諍之路令鎮撫杖下公獄血肉淋漓獄戒甚嚴且絶公飲食濵於死夏四月九廟災詔求言户部主事周天佐上疏言當宥笞天佐下獄絶飲食三日死已而巡按陜西御史浦鋐自陜復上疏申救有旨械鋐來京下獄杖一百與公同柙鎖七日而鋐又死公在獄與工部員外劉焕吾給事中周子順日相聚語玩古訓格言日事吟咏著作有周易辨録香灰解等言忘其身在囹圄桎梏中也二十四年八月有旨放三公歸田里上密諭東厰復拘三人使者至抵家甫十日即刻上檻車就道至京仍下獄前後在獄十餘年而後出直聲動天下竟齎志以殁惜哉不獲大用也品曰語云不諫則危君諫則危身故忠臣勵節寧危身而不危君每陳忠讜之言不廢獻替之義公上封事前後居囹圄者十餘年是能為國家計利害犯忌諱蹈危身之禍弗恤也夫有生所甚重者身也得輕用者忠與義也公身可獄志不可奪舌不可禁其忠義蓋出自天性云是時中外頗以言為諱而公所論皆人所不敢者故人皆稱其為讜公性狷介清苦自甘勇于為義以忠讜得罪沒齒無怨言以上俱出兩朝憲章録楊忠介集附録卷一

body:
  text: 楊忠介集别集類五明提要臣等謹案楊忠介集十三卷明楊爵撰爵有周易辨録已著録是編第一卷為奏議二卷為序碑記三卷為傳四卷為書五卷為家書六卷為語録七卷為祭文志銘雜著八卷至十三卷為詩附録五卷則後人所編緝也世宗時齋醮方興士大夫率以青詞取媚而爵獨據理直諫如所陳時雪之不可以為瑞左道之不可以惑衆詞極剴切下獄以後猶疏諫以冀一悟其忠愛悱惻至今如見家書二十五則諄諄以忠孝朂其子孫未嘗一言及私語録不為髙論而篤實明白皆粹然儒者之言按爵與羅洪先錢德洪諸人逰以講學相勗然德洪等源出姚江務闡良知之説爵則以躬行實踐為先關西道學之傳爵實開之迹其生平可謂不負所學者所作詩文大都直抒胸臆雖似傷平易然有本之言不由雕繪其可傳者正不在詞采間矣乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5e40549e8f34b293aece7d1cd27810caf993c3013a439b7731dddad1474eea91

body:
  text: 楊忠介集卷九明楊爵撰七言古風題雲津書屋江南書屋號雲津千卷萬卷皆非新讀書誰解書中意我識劉氏家傳真積德先世有賢哲認得孔顔不是貧開基不肯買附郭惟以典籍貽後人精一肇自唐虞初此是古人心上書後來讀者失其要一生辛勤類蠧魚人心原是書之本㑹尋真趣便能虛心書與道相忘處身居天下之廣居吾聞陋巷顔氏子耕莘伊老翁學發孔聖藴德與昊天同道業千年昭宇宙孰非昔人讀書功繼述逺將源流挹獨立今見水部公匡時不恤觸危機振拔真有古人風正氣雖由衡嶽降修為要自雲津中秦中鄙人願學步蔓草安得比長松嗟我東南有心事耿耿日夜望蒼穹國恩詔許釋狂罪扁舟同過呂梁洪隨君得拜漢髙帝豁然開我此心䝉吊許忠節公泰華巍峩髙且秀難擬許公忠節橫宇宙河海汪洋浩且深難擬許公忠節在人心任人濺我一腔血惟留忠志照日月身可斷為兩截氣渾完其烈烈吁嗟乎許公同天地而始終惻惻行送王大尹出獄惻惻送君幽繫裏天涯回首如千里此歸何以佑斯民直須德化平如水最憐愚昧與饑寒古今失所皆由此受托宜思君父恩同類孰非吾赤子君不見蒲鞭一假好生心天地萬物真同體古柏行送王子言雨秀金吾古柏叢老枝猶解起南風乾坤留眼吾看柏看時聊與子言同看柏豈惟憂自崇看柏還增恨無窮獨不見去冬飛雪滿長空宇內應無桃李紅偶從挺挺寒柏下與爾送出平定公平定公子言同鄉憶昔行贈李石叠憶昔相别蘭若裏而今咫尺如千里嘆我老作放逐臣喜君又為蒼生起我思古人獲我心憂國憂民結念深未說江湖與廊廟惻惻盡是此胸襟何以示之有周道知君不愧此懷抱化理從教險地敷調元應得絲綸早昔聞闕輔試蕭翁今見中州借冦老拜手天庭出帝畿燕街草色映旌旗想像郊堤多楊柳為君無由折此枝到處爭迎舊憲使春雨秋霜遍逺邇吁嗟吾民正倒懸願君此去愛如子山西行吾聞往歲旱魃災赫赫炎暑毒埏垓壠上禾苗盡枯槁茫茫千里赤塵埃疾威均為下土虐山西之民尤可哀閭里餓莩無所告昊天又降酷烈來草茂秋髙敵勢張戎馬南侵混疆場可憐百萬生靈命盡在邊人刀下亡太原城外數千里血流漂杵遍封疆死者縱橫如山積守臣不敢奏朝堂殺氣騰空鬼神愁尸填溝壑水不流舊時邑落數千室而今且無二三留敵情變譎不可測邊將何不蚤為籌廟謀要得良平䇿經略須用韓范儔朔方世為中國患古來誰不事先憂君不見薄伐玁狁勵士馬周王允是中興者當時文武有尹公舉旗一麾清郊野又不見漢帝當年重細柳亞夫軍前無躑躅拊髀思賢一飯切魏尚復作雲中守天生我皇聖且仁區區周漢豈作論常慮一物或失所豈知邊釁瀆蒼旻我願君王目視逺燭沕穆望見山西境上多白骨我願君王耳聰聽幾萬里時聞山西哭聲夜不止鬻子行燕街寡婦淚漣漣自言夫死未期年晝勤織紡為衣食夜撫孤兒不遑眠孤兒幸能學步履我夫有以繼其先成立時遇清明節今將麥飯灑埏前妾身百年歸于室地下逢夫無愧顔奈何我生日惸惸靡依靡怙嘆伶仃旻天不吊此窮苦疾威頻將下土傾往年麥豆皆枯槁晚禾遭霜又未成今春父子不相顧骨肉分離向逺行眼見舊時多富姿而今轉作溝中泥母子困厄何所賴泣抱孤兒走京師誰知京師亦蕭條哀哉艱難無處號街頭死者無人掩多是流民向此逃母寒兒饑日叫哭無力走去但匐匍眼中流淚口中乾只得將兒入市鬻市上紛紛草標待賣者空多買者稀直到日夕才定約破錢百文救我饑思量此錢買黍飯是食吾兒膚與肌抆淚收錢敝裳濕如割心肺痛難支母解懷抱將兒出兒將兩手抱母衣跌腳投地氣欲絶竟將母子强分離買主抱兒色悽慘婦人欲去步難移兒哭聲母哭聲皆哭死者又哭生兒哭母毒舍我去母哭蒼天叫不應鬻妻行何處調饑貧少年將妻匐匍到街前但道誰人肯買去免我身向溝中填婦人雙淚向夫揮勸君莫作苦辛為自從結髮成夫婦共期偕老日相宜此日遇不淑豈肯遽别離願割妾身肉充子一朝饑同我良人死溝壑不忍又縫他人衣送董允恭出獄我送允恭出獄墻徘徊别意各悽愴來逢易水波浪險去見燕山草木黃子之故人周給舍同於幽難久備嘗迪已不肯甘流俗論治必欲尚先王明哲保身雖未得懷此赤心良可傷子實聰明心好古聞其論說輒倣徨我抱困病足如皸眷念時來類臥傍黯然别去消息杳窘迫相與永難忘三尺禁網脫身去一片襏襫到長江有手但執瓦缶物有足莫走聲利場世間棼麗一染著能令耳目充無光丁寧告爾復丁寧此真全身全性之周行吁嗟允恭既去矣送子行行復行行回看世故總茫茫留豫露冷風凉夜漸長圜士送别次巽峯韻秦山越水各東西多難相逢慰我思握手不堪忽别去還將夙願與君期我思故人不可見顛沛終能慎所之翻覆眼底都忘却曠然一笑破愁眉幾微常向靜中察立身難最解真頥多歧荆棘妨步履始知世路有險夷百死一生淹歲序焚香日夜對包犧得君開我心迷謬感悅還惜邂逅遲困厄既非人自取各安天命復何疑他年如得走閩海釣臺髙處揖𡵨嶷酸酒歌君家有酒酒頗酸壺斚不輕設簟莞昨日偶侍几席側一樽將來啓大觀世人往往喜黃流豈知酸味是仙丹平生嵗月酩酊裏况此犴狴風雪寒要向酸中通大道茹飲略不以為難自笑狂惑乖至理滿室流作赤血灘幸此餘生尚未滅肯把宿昔酸興闌安得滌腸酌大斗免我觸眼日常嘆人飲未能成涓滴我飲必須瓦缶乾人飲不覺眉頭皺我飲胸中天地寬世上酸苦任他入方能擴盡此心端酒中酸味真能解勝將周易日空看君不見滄海茫茫總無涯納盡人間萬頃湍微飲行一日未到官屋中恰如十年不相逢周行未見言提耳索居孰啓我心朦問君何所事古訓日研窮室內香靄靄窗外月朣朣更深人靜後朗誦徹蒼穹尚書萬古獄中授周誥殷盤已貫通韋編不知今幾絶逺慕羲文周孔風愧我全無亨通意衰年未見養心功常將一假鬱抑氣噓作雲間千丈虹憂時慨世心獨切半偏深病未消融而今願從君子謀示我脫然登岸頭藉此福堂尋上去莫教空負兩年囚嘆靡靡思悠悠君知否我何求相與采虻無處所安得泮渙日遨遊思量此疾為心患世間惟有酒能瘳昨聞几上樽猶在半實還是舊黃流午間准擬來相訪便須勞君酌大甌但論濁賢清與聖何恤瓶罄作罍羞長啜直到枯腸底一洗胸中萬古愁再進酒歌再進酒再進酒幸我磁樽酒還有昨日一醉憶蓬萊而今要與謫仙偶宿酲猶在枯腸停更下一甌烟灮吼坐忘天邊嵗月長但覺胸中龍蛇走酒遞圜墻恨少來涓滴此間敵數斗人生百年能幾何莫將頭上巾空負再進酒再進酒聽將心事為君剖洪鈞賦此男兒身誰能甘與草木朽三斗竹葉始朝天一車麯糵涎出口古來飲者多聖賢吾舍斯人與誰友莫怪沉酣在憂慮盛時不樂將皓首君不見長索難繫落日飛童顔倐忽成老叟宇宙浩蕩總無涯世上紛紛何足數痛飲本為破愁懷屈指反成中心怮錢君要做羲皇人趙君能文且﨣﨣黼黻折衝間世材此日誰惜縲絏久再進酒再進酒孟軻脫身輕萬鍾孔聖亦類喪家狗無窮世事休閒思但慮酒乾誰復取醉倒玉山隨地眠何必說桎梏在足更在手書白樓詩卷趙總兵號也將軍之居近白樓將軍之才冠帝州胸中自有兵百萬曾出將府舒國憂而今久作圜中客可憐魏尚同幽囚一到囹圄八九月手執周易誦不輟將軍本是儒者流於此可以觀志節雲鳥往時成八陳韋編此地慕三絶每向憂中尋樂處魯史周文日講說談文論武擬虛舟我識將軍豪興優身雖凝坐一室間心在羲皇境上遊嗟子真機久未開狂惑速禍自天來還幸此日成良晤倣佛樂趣散愁懷世上紛紛苦幽滯困亨誰解昔人意幾時各得歸山林毋忘爾我自相遇七歌有手有手手假拙弄得人世紛如雪未宜醒執名利板但可醉撈秋江月忽忽百年成甚事微微一息久將絶嗚呼一歌兮為爾憐要撥雲霧轉晴天有腳有腳腳步錯錯走當年塵世道﨑嶇多是倒人坑一蹶反為魑魅笑未死還餘憂世夢有生堪類霜前草嗚呼再歌兮歌正壯蹈入冥海千層浪有耳從來亶不聰人說宜西我却東萬方愁苦聲堪痛收入無底雙竅中迅雷不顧額前震身禍飄如輪後風嗚呼三歌兮歌愈悲傾聽莫為利口移有目閒將一世愁聚來都放在眉頭肉眶不見羊腸險血淚可增江海流我思哲人瞻萬里乾坤顧眄在雙眸嗚呼四歌兮歌意頻要識人間假與真有身形弗七尺長地維天柱要擔當幾年餓成空皮骨扶杖出門欲仆僵外混塵埃罹羅網內抱赤心與忠腸嗚呼五歌兮歌迫切酒盡天涯一腔血有子有姪未成立音書問我我惻戚跋涉往來六七年千山萬山日灑泣讀書耕稼總難為思量到此喘噓吸嗚呼六歌兮歌未闌父死誰憐汝饑寒有甥生年為我勞往時見我便長號汝母今年將半百骨肉屬我父母毛兄弟往來無了日令我憂中思爾曹嗚呼七歌兮心未已收我殘骸歸故里楊忠介集卷九

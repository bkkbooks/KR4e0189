body:
  text: 楊忠介集巻十一明楊爵撰七言律詩二元旦歲逢元旦覺春還桎梏年年在此間白日應須點殘雪浮雲但此繞燕山顚危喜見淳風轉變態纔知世路艱西望壠埏遙跪拜三千里路是秦關正月二日寄偲兒秦關消息久無傳說與兒曹莫涕漣囹圄暫留今日福聖明定宥往時愆舍南舍北一天雨山後山前百畆田收拾家中舊鋤耒待吾歸老伴餘年次緒山韻三首日轉庭簷春色灮西圜消息意微茫想君每動三秋念笑我常懷一段狂往哲皆從修性作世人誰是為身忙從今各記年前約只恐顚危心易荒從來克己最為難克去超過人鬼關水自流澌山自止火何炎熱水何寒坐㸔百妄渾消盡便是一眞由此還正見胸中好景象天光雲影半空閒剗却紛紛俗務撁襟懷一片自天然行無非與纔成性磨而不磷方是堅霽月想他何氣象光風忘我到衰年洋洋滿目無停息誰向霄壤識秘傳春日誰家煙色鎖樓臺隠隠桃花將半開雲際點空鴻鴈去圜階掃地谷風來天機消息由人尚物運盈虛與化推心目洒然塵世外誤看囹圄作蓬萊和聯翁看花詩紛紛眼底今何時悶到還看此數枝欲向花前發浩歎飄然未入古人思雨多雨少顏如故風去風來根不移安得此花知世事常開聽我賦新詩惹得詩人有所思為憐牆下兩三枝孤忠暗與赤心合直幹應看白首宜戱蝶遊蜂閒作伴朝雲暮雨漫相滋寄語少年休浪采要留真品接東籬看花不厭往來頻花色常從雨後新赤白總非由造作巻舒端是露天真自贏犴側七門鎖却少坊間異様塵此地看花關世道後來還有好看人謝人送米十年分袂去燕臺囹圄今同春酒杯久難應教愁態老逢君暫得好懷開宜時化向秋曹譽淳古風從海岱回廊廟一朝思舊績共看琴鶴覲天來有懷年來奈此遠思何春暖西臺亦到麽好景想從幽處少窮愁偏令我心多半空晴色將人照一點閒雲輕自過幸有吾鄉衆豪杰激懷日與共消磨贈人二首樂老襟懷孰與同逍遙遠志鹿裘翁百年佳趣庭前訓一曲秋簫眼底空共惜幽纍何日解還傷吾道有時窮犴圜讀罷江湖詠若在春風和氣中共羨君家庭桂榮豈知世路一難行倚門鳩杖燕山迥乘夜孤帆江水清骨肉轉關心上重浮雲自覺眼前輕新詩遠為賢郎切多是君臣父子情送曹知府入關中十年交道歎浮萍咫尺而今萬里情安我幽圜老歲月喜君閩越活蒼生旌麾過處山河秀劒氣衝來牛斗横暇日要尋千古秘考亭一脈甚分明送春逢君到此已三年日見圜扉掩半邊照我寒衾共幽榻隔窓白日與晴天千山秦塞音書杳一點孤懷空自憐北徂鴈聲留慰切憶他曾過首陽巔和聯峯喜雨詩二首共慶連朝好雨頻昊天臨下顯諸仁普施原野三農慰一洒長空萬象新豐歲坐占八表盛放勳出自九重勤從今喜得含生類沐我皇王蕩蕩春雨過幽中生意頻乾坤萬古此純仁彌天雲掩千峯暗著地神施一様新出險走防歧路滑歸田耕野老農勤滌腸莫謂吾無樂自有家山石凍春石凍春富平酒名也寄趙白樓總兵細雨空亭絶塞塵長才應許舊交人遙聞煙火山頭熄且喜禾苗壠上新天意已嘗憐志士聖明安肯殺忠臣情關莫恤幽中苦儘有詩書伴此身學得萬人敵已成壯猷獨步冠神京幾年經畧長城固一日聲輝天下名莫道萋菲終貝錦坐看心迹自分明昊天於此出王際照見將軍一念誠次緒山懷友韻二年得與子相親不意知為困裏身心在熟仁狂作聖事求精義道通神化成品彚千山雨消盡寒陰一氣春白髪從今還努力肯辜良友教諄諄初夏聞雷次韻東風吹得乾坤解雷雨作於初夏時田畯暫停南畆耜漁翁應罷水邊絲檢身吾戴囚冠坐宥罪孰為天下悲此日鄉關千萬里有人勤誦召南詩端午用杜工部韻半室還如天様寛詩書聊此與君歡漢廷可少賈生淚晉縶應憐楚客冠舉世從今蒲酒樂普天懷古汨江寒千年屈子心如在角黍將來此地看夢陳寮十載燕京做客鬼今宵入我夢中歡孤兒總髻頭角秀老母痛如心上剜郊外點香人共送墓門啓柩衆同看親朋哭汝靈車罷各贈靑錢紙數竿聞緒山出獄思君不見日三秋忽聽西圜恩詔優承志綵衣應有分倚門白髮可無憂廟堂事業成虛語聖學全功蚤自收待我洒回閩海淚衡南握手與同遊趙白樓有詩見寄次韻答之音問來從北海上故人遙向此相憐難將璞璧投幽室可把長纓濯下泉我自福堂安桎梏君於陋巷誦遺編死生窮達了無事不負男兒此百年聞趙白樓復總兵贈之以詩文武俊才今再用一身萬里此長城詩書本自儒林重韜畧復為麾下驚采芑妙成猷算壯揚旗時掃塞塵淸功成待畫麒麟閣不説燕山山上銘有感天涯風景又將秋想像西周已古丘萬里鄉關驚旅夢百年身世歎幽囚披懷有慮成虛迹觸眼無窮是隠憂解得古人行邁意知吾於此更何求送同鄉王大尹出獄患難相逢此月秋不堪君去我還留丹心廊廟千年慮白首江湖一念憂窻隙為增薄裳冷柝聲偏動旅囚愁有時聖主洪恩詔渭水相將理釣鈎思故人憶我西歸過爾家籬邊秋雨秀黄花百年涅債從頭補一日交情未有涯荷杖未耘秦壠草回身復泛孟津槎傷懷更有難堪處驚出門前問檻車寄田道充二十年前我與君講求五典共三墳長安春酒隨豪興旅館殘燈到夜分國淚應教知己洒直言難使後人聞有時罪了歸田里醉宿閿鄉境上雲贈人二首未能㑹面結良晤但信一心定盍簪天罪老夫宜岸獄人文君子化須南道兼朋友生來伍事有當官幹者三相信相離徒想像只教今日更難堪周道陰濃楊栁風行行不必歎窮通思君毎有交情厚愧我全無補衮功但説天邊一訊别敢云林下再相逢千年楚客心何壯耿耿令人切寸衷送曹子儀令平遥昔日治郡功推最卓邵遺風世所欽古謂聖人皆可學豈於君子讓之深荒陬疾苦懸思慮直道斯民貫古今化此平遙無巧法存吾一念至誠心贈洪百戸有小序守獄官洪百戸以予下獄次年來獄中適事甚洶懼人皆畏近未敢一見洪獨省問至於流涕不能仰視數年間每思其厚今年正月洪復來此追往慨今又至泣下作此贈之以示不忘西風吹得家山杳沆瀣騰成犴户陰天上本無神鬼謬人間難有丈夫心艱危世事百憂切浩蕩君恩十載深此日多君天下淚幾畨為我濕衣襟有感夜初獨坐擁衾裳耿耿丹懷空自傷斜月淡光穿暗户晩風微冷透晴窓一心知有君恩厚九死難回忠義腸漏下旅囚愁不寐數聲寒雁送凄涼送桂道長出獄和其韻四首桂名榮懶乘驄馬泛秋槎去處適逢陶令花五斗王臣皆有事六經作用未為賖暫舒廊廟經綸思且問江湖赤子嗟試罷牛刀謁帝主還成禮樂數千家送出美人去泛槎還從幽地賞葵花毎懷衛足猶有在日抱傾陽誠未賖數載斑毛羞懦腐一生阨蹇半愁嗟念君為我心何切天下斯文本一家蹇難還逢秋氣森幽中無奈感時心世路兩歧夷共險人情一理古猶今安危家念關河杳生死君恩天地深十載釣儔應待我烟蓑何日再相尋西風薄暮景蕭森慷慨昔人折寸心獨念愛身身係國須知懷古古同今一千七百日光遠三十六宫易理深韋巻平生空皓首畫前恍惚竟難尋夢浦竹塘去歲兹辰長别我今宵夢裏再相逢醒來想像音容杳雙淚空流老眼中姓斑靑史心猶在身𦵏黄泉事已終雨洒風吹永難盡總為人世恨無窮送甥張禹卿數載天涯客舍窮憂心為我日忡忡淚添滹易流千丈思斷鄉關幾萬重莫道艱途奔未了須知多難徳堪崇惓惓望爾立身蚤在此叮嚀八句中秋日遣懷俯仰乾坤此棘垣憂來倚杖步西圜忘機雲外鳶猶舞解意牆邊草欲言危難總皆身外事修為但可默中存感時悄悄心猶切難向他人開口論寸心惻惻風塵迥千里迢迢世路傾但比深圜銘上帝肯教之死負平生鄉思漂泊天涯杳音信空聞寒鴈聲不是君王違諫諍孤臣未有動天誠送錢緒山寤寐今猶懷趙子眼看錢子又將行同心良友匆匆去不盡閒愁種種生桎梏逢時風露冷圜階送處雪霜淸憂虞二載忽分袂而我安能己此情與君同難兩年分至道常期日以新時講盡忠兼盡孝共成為子與為臣圜中歲月杞人老天外風塵世路湮耿耿每懷無限思明朝有感向誰陳送人出獄百年身世半塵埃四海斯文於此偕淹淹殘息延旦暮明明宇宙照心懷險需歎我幽囚客宏濟知君匡輔才感别自來情思切况逢多難在天涯寄周給事顛狂老倦下林泉宇宙相關一念牽道在三才終未冺風來四遠總無邊誰教洗硯魚吞墨空憶烹茶鶴避烟殘息久能隨大運紛紛人世任流遷懷緒山先生攜手分離不再逢幽中嘗憶往年冬馬牛顛沛風塵迥童冠逍遙江渚溶人品豈非黄叔度氣根應似郭林宗相違歎此圜牆外更有關山千萬重謝人勞人兩遇北風侵白日豈堪鐡戸深天下自無神鬼謬人間誰是丈夫心顛危每抱忠和義慷慨常思古與今冩此新詩傾至意多君别淚滿衣襟自念狂愚速罪深多君勤為我懷音而今指日將分袂説起當時淚滿襟暫共苦寒向爐火難忘炎暑坐西陰送行縱有詩千首不盡離愁一點心遣偲男歸秦一簡歸音到獄中令吾方寸日憂忡感悲淚滴胸前濕骨肉情關身上恫萬里雲山形眇眇幾年天道鑒懵懵遭逢至此須安命總是艱難未有終又聞汝臨歸血淚流苦情都入我心頭本為世道千年慮適到家門百口憂幽地北風留父久遠山寒雨重兒愁聖朝不易朱雲檻終許殘生遂首丘和紫陽先生韻八首省愆終未敢尤人報國焉知己道真肯向遭時存外慕但須臨難致吾身拙猷未可輕寒士迂恤曾何間小臣莫謂幽圜同永夜天王明鑒說如神歲歲年年一罪人戚懷未得了吾眞日供糲米堪餬口夜展羊裘足掩身塞上風霜寒將士天涯桎梏老孤臣總然不計生和死觸目紛紛也慘神思量宜是犴中人感動君王恐未真十載每懷當世事一軀何惜老來身恩深願作溝渠骨罪重難為草莽臣此日存心都莫道好將餘喘聽明神艱危還作囚繫人之死難忘一念真長路奔尋吾舊處滿門哭送此殘身風高吹冷遼東帽天遠愁勞杞國臣却憶范滂千古上當年不祭獄中神遠寄新詩勞故人為吾點點見情真匡時樂道百年志燕塞秦關萬里深緑水靑山供逸士朝雲暮雨伴囚臣眼前光景眞如夢一望天涯即損神多難悠悠憶美人美人心興出天眞早梅白馬山中興雪夜扁舟物外身可少感懷抽逸思空教流淚惜王臣采苓若到首陽下俯仰乾坤有鬼神十年空擬白頭人淺劣原非見道真祗有狂愚為世指更無明哲以全身動疎自可遭羅網夙好徒勞惜諫臣三木伴中思伐木幽情轉覺一傷神自笑率由異古人冥冥不解巻舒真無勞强自營千慮有補何妨死一身用世總難輕涉世良臣誰願作忠臣枉教晝旦空憂念百代虛盈屬鬼神偶作二首一念心灰萬事休無涯歲月此幽囚九州衰夢從吾息十載長綸偶自收遇可樂天須解樂謂無憂世是深憂遣懷幸有韋編在聊向羲皇境上遊一念心灰萬事休今年不似去年愁亦知天外難懸足豈但獄中能白頭胸次廣無人世狹眼眶明少犴忩幽脱然放下塵寰夢且向圜階歌遠遊端陽次聯翁韻幽居幾度遇端陽萬里關河隔故鄉龍舟扮出湘江恨艾草還為人世芳幾段角團隨俗好一尊緑酒帶蒲香離騷歌罷渾無事真箇圜庭是福堂冬至氣轉初陽覺尚微强吾羸病掩圜扉寂靜真源須探取盈虛妙應自相依兩年長夜獨悲感一點丹懷孰與欷邈想周文幽困裏先天衍作後天機楊忠介集巻十一
